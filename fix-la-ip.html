<!DOCTYPE html>
<html lang="fi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>La ip. korjaus</title></head>
<body>
<div id="app" style="font-family:system-ui;padding:20px">⏳ Haetaan...</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,getDocs,addDoc,deleteDoc,doc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const CFG={apiKey:"AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63UO0",authDomain:"jsailing-f716c.firebaseapp.com",projectId:"jsailing-f716c",storageBucket:"jsailing-f716c.firebasestorage.app",messagingSenderId:"543523103696",appId:"1:543523103696:web:439a312efa6aec398a8fd5"};
const db=getFirestore(initializeApp(CFG));
const UUDET=["Jaana","Markus","Tuomas","Maarit","Sauli"];
const [ss,cs]=await Promise.all([getDocs(collection(db,"sailings")),getDocs(collection(db,"customers"))]);
const sailings=ss.docs.map(d=>({id:d.id,...d.data()}));
const customers=cs.docs.map(d=>({id:d.id,...d.data()}));
const sailing=sailings.find(s=>s.date==="2026-06-06"&&(s.startTime||"").startsWith("14"));
if(!sailing){document.getElementById("app").innerHTML="❌ La ip. sailingia ei löydy";throw new Error();}
const nykyiset=customers.filter(c=>c.sailingId===sailing.id);
const el=document.getElementById("app");
el.innerHTML=`<div style="background:white;border-radius:10px;padding:16px;border:1px solid #ddd;max-width:400px">
  <div style="font-weight:700;color:#0a4272;margin-bottom:10px">La ip. 6.6. — osallistujien vaihto</div>
  <div style="font-size:13px;margin-bottom:6px">Nykyiset: <strong>${nykyiset.map(c=>c.name).join(", ")}</strong></div>
  <div style="font-size:13px;margin-bottom:14px">Uudet: <strong>${UUDET.join(", ")}</strong></div>
  <div style="font-size:12px;color:#c62828;margin-bottom:12px">Rebekka → Maarit</div>
  <button id="go" style="background:#2e7d32;color:white;border:none;border-radius:8px;padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer;width:100%">✅ Vaihda Rebekka → Maarit</button>
  <div id="log" style="font-family:monospace;font-size:12px;margin-top:10px"></div>
</div>`;
document.getElementById("go").onclick=async()=>{
  document.getElementById("go").disabled=true;
  const log=s=>{document.getElementById("log").innerHTML+=s+"<br>";};
  for(const c of nykyiset){await deleteDoc(doc(db,"customers",c.id));log("🗑️ "+c.name);}
  for(const name of UUDET){await addDoc(collection(db,"customers"),{name,phone:"",email:"",sailingId:sailing.id,tutkintoId:"",billTo:"self",companyId:"",reservationStatus:"paid",laskutusosio:"",updatedAt:serverTimestamp()});log("✅ "+name);}
  log("🏁 Valmis!");
};
</script>
</body>
</html>
