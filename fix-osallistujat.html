<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Korjaa osallistujat</title>
<style>
body{font-family:system-ui;background:#f0f4f8;margin:0;padding:16px}
.hdr{background:#0a4272;color:white;border-radius:10px;padding:14px 20px;margin-bottom:14px}
.card{background:white;border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid #ddd}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#0a4272;color:white;padding:6px 10px;text-align:left}
td{padding:5px 10px;border-bottom:1px solid #eee;vertical-align:top}
tr:nth-child(even){background:#f5f8ff}
.btn-go{background:#c62828;color:white;width:100%;padding:14px;font-size:15px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin:8px 0}
.nm{background:#d4af3722;border:1px solid #d4af37;border-radius:8px;display:inline-block;padding:1px 6px;font-size:11px;margin:1px}
.del{background:#ffebee;border:1px solid #f44336;border-radius:8px;display:inline-block;padding:1px 6px;font-size:11px;margin:1px;color:#c62828;text-decoration:line-through}
.log{background:#0d1b2a;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;max-height:300px;overflow-y:auto;margin-top:10px}
.log div{margin-bottom:2px}
.ok{color:#b9f6ca}.warn{color:#ffe082}.err{color:#ff8a80}.info{color:#a8d8ea}
.done-box{background:#e8f5e9;border:2px solid #4caf50;border-radius:10px;padding:14px;margin-top:10px}
</style>
</head>
<body>
<div class="hdr"><strong>🔧 OP Kipparit — duplikaattien poisto ja osallistujien korjaus</strong></div>
<div id="app"><div class="card" style="text-align:center;padding:20px">⏳ Haetaan Firestoresta...</div></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,getDocs,addDoc,deleteDoc,doc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const CFG={apiKey:"AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63UO0",authDomain:"jsailing-f716c.firebaseapp.com",projectId:"jsailing-f716c",storageBucket:"jsailing-f716c.firebasestorage.app",messagingSenderId:"543523103696",appId:"1:543523103696:web:439a312efa6aec398a8fd5"};
const app=initializeApp(CFG);
const db=getFirestore(app);
const el=document.getElementById("app");
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// Oikea lista: päivä + aloitusaika -> nimet
const OIKEAT={
  "2026-06-02_17:00":["Jaana","Petra","Rebekka","Sini","Tuomas"],
  "2026-06-03_17:00":["Annaliina","Arto","Emilia","Liisa","Niina"],
  "2026-06-04_17:00":["Jari","Markus","Miro","Sauli","Timo"],
  "2026-06-05_17:00":[],
  "2026-06-07_10:00":["Annaliina","Antti","Emilia","Liisa","Sauli"],
  "2026-06-07_14:00":["Arto","Jaana","Markus","Rebekka","Tuomas"],
  "2026-06-08_10:00":["Emilia","Liisa","Miro","Nicke","Niina"],
  "2026-06-08_14:00":["Markus","Onni","Petra","Timo","Tuomas"],
};

const sailings=(await getDocs(collection(db,"sailings"))).docs.map(d=>({id:d.id,...d.data()}));
const customers=(await getDocs(collection(db,"customers"))).docs.map(d=>({id:d.id,...d.data()}));

const opS=sailings.filter(s=>(s.name||"").toLowerCase().includes("op kippar"))
  .sort((a,b)=>(a.date+a.startTime).localeCompare(b.date+b.startTime));
const opIds=new Set(opS.map(s=>s.id));
const opC=customers.filter(c=>opIds.has(c.sailingId));

// Per sailing: laske mitä pitää tapahtua
const plan=opS.map(s=>{
  const key=`${s.date}_${(s.startTime||"").substring(0,5)}`;
  const halutut=OIKEAT[key]??null; // null = ei tiedetä mitä pitäisi olla
  const kaikki=opC.filter(c=>c.sailingId===s.id);

  // Poista KAIKKI duplikaatit: pidä vain yksi per nimi (ensimmäinen)
  const seenNames=new Map();
  const poistaDuplikaatit=[];
  kaikki.forEach(c=>{
    if(seenNames.has(c.name)) poistaDuplikaatit.push(c);
    else seenNames.set(c.name,c);
  });
  const uniikitNykyiset=[...seenNames.values()];
  const uniikitNimet=uniikitNykyiset.map(c=>c.name);

  // Jos tiedämme oikean listan: poista väärät, lisää puuttuvat
  const poistoVaarat=halutut!==null ? uniikitNykyiset.filter(c=>!halutut.includes(c.name)) : [];
  const lisattavat=halutut!==null ? halutut.filter(n=>!uniikitNimet.includes(n)) : [];

  return{s,key,halutut,kaikki,poistaDuplikaatit,poistoVaarat,lisattavat,uniikitNykyiset};
});

const totalDup=plan.reduce((n,p)=>n+p.poistaDuplikaatit.length,0);
const totalDel=plan.reduce((n,p)=>n+p.poistoVaarat.length,0);
const totalAdd=plan.reduce((n,p)=>n+p.lisattavat.length,0);

const rows=plan.map(p=>{
  const dupMerkki=p.poistaDuplikaatit.length>0?`<span style="background:#ffebee;color:#c62828;font-size:11px;font-weight:700;padding:1px 6px;border-radius:6px;margin-left:4px">×${p.poistaDuplikaatit.length} duplikaattia</span>`:"";
  const cur=p.kaikki.map(c=>{
    const isDup=p.poistaDuplikaatit.some(x=>x.id===c.id);
    const isWrong=p.poistoVaarat.some(x=>x.id===c.id);
    return`<span class="${isDup||isWrong?'del':'nm'}">${esc(c.name)}</span>`;
  }).join(" ")||"<span style='color:#999'>tyhjä</span>";
  const add=p.lisattavat.map(n=>`<span style="background:#e8f5e9;border:1px solid #4caf50;border-radius:8px;display:inline-block;padding:1px 6px;font-size:11px;margin:1px;color:#2e7d32">+${esc(n)}</span>`).join(" ");
  const muutos=[];
  if(p.poistaDuplikaatit.length) muutos.push(`<span style="color:#c62828;font-weight:700">-${p.poistaDuplikaatit.length} dup</span>`);
  if(p.poistoVaarat.length) muutos.push(`<span style="color:#c62828;font-weight:700">-${p.poistoVaarat.length}</span>`);
  if(p.lisattavat.length) muutos.push(`<span style="color:#2e7d32;font-weight:700">+${p.lisattavat.length}</span>`);
  if(!muutos.length) muutos.push(`<span style="color:#2e7d32">✓</span>`);
  return`<tr>
    <td><strong>${esc(p.s.date||"")}</strong>${dupMerkki}</td>
    <td style="font-family:monospace">${esc(p.s.startTime||"?")}–${esc(p.s.endTime||"?")}</td>
    <td>${cur} ${add}</td>
    <td>${muutos.join(" ")}</td>
  </tr>`;
}).join("");

el.innerHTML=`
<div class="card" style="border:2px solid #f44336">
  <div style="font-weight:700;color:#c62828;margin-bottom:4px;font-size:15px">⚠️ Löytyi ${totalDup} duplikaattia + ${totalDel} väärää osallistujaa</div>
  <div style="font-size:13px;color:#555">Yliviivatut poistetaan, vihreät lisätään</div>
</div>
<div class="card">
  <div style="overflow-x:auto"><table>
    <thead><tr><th>Päivä</th><th>Aika</th><th>Osallistujat</th><th>Muutos</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  <div style="margin-top:10px;font-size:13px;color:#555">
    Poistetaan duplikaatit: <strong style="color:#c62828">${totalDup}</strong> &nbsp;|&nbsp;
    Poistetaan väärät: <strong style="color:#c62828">${totalDel}</strong> &nbsp;|&nbsp;
    Lisätään: <strong style="color:#2e7d32">${totalAdd}</strong>
  </div>
</div>
<button class="btn-go" id="goBtn">🔧 Poista duplikaatit ja korjaa kaikki nyt</button>
<div class="log" id="logBox" style="display:none"></div>`;

document.getElementById("goBtn").onclick=async()=>{
  document.getElementById("goBtn").disabled=true;
  const lb=document.getElementById("logBox");
  lb.style.display="block";
  function log(m,t="info"){const d=document.createElement("div");d.className=t;d.textContent=new Date().toLocaleTimeString("fi")+" "+m;lb.appendChild(d);lb.scrollTop=lb.scrollHeight;}

  for(const p of plan){
    const anyWork=p.poistaDuplikaatit.length||p.poistoVaarat.length||p.lisattavat.length;
    if(!anyWork){log(`✓ ${p.s.date} ${p.s.startTime}: jo oikein`,"ok");continue;}
    log(`📅 ${p.s.date} ${p.s.startTime}–${p.s.endTime}`);
    for(const c of p.poistaDuplikaatit){
      await deleteDoc(doc(db,"customers",c.id));
      log(`  🗑️ Duplikaatti poistettu: ${c.name}`,"warn");
    }
    for(const c of p.poistoVaarat){
      await deleteDoc(doc(db,"customers",c.id));
      log(`  🗑️ Väärä poistettu: ${c.name}`,"warn");
    }
    for(const name of p.lisattavat){
      await addDoc(collection(db,"customers"),{
        name,phone:"",email:"",
        sailingId:p.s.id,tutkintoId:"",
        billTo:"self",companyId:"",
        reservationStatus:"paid",laskutusosio:"",
        updatedAt:serverTimestamp()
      });
      log(`  ✅ Lisätty: ${name}`,"ok");
    }
  }

  const done=document.createElement("div");
  done.className="done-box";
  done.innerHTML=`<strong style="color:#2e7d32;font-size:16px">🏁 Valmis!</strong>
    <div style="margin-top:6px;font-size:13px">Tarkista: <a href="https://jackeseilaa.github.io/tilaukset" target="_blank" style="color:#0a4272;font-weight:700">jackeseilaa.github.io/tilaukset</a></div>`;
  el.appendChild(done);
};
</script>
</body>
</html>
