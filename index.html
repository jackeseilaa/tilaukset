<style>
/* KAIKKI ALKUPERÄISET V9.30 TYYLIT */
:root{
  --ocean-surf:#0a4272;--text:#111827;--text-muted:#374151;--text-light:#6b7280;
  --green:#166534;--green-bg:#dcfce7;--green-border:#86efac;
  --red:#991b1b;--red-bg:#fee2e2;--red-border:#fca5a5;
  --amber:#92400e;--amber-bg:#fef3c7;--amber-border:#fcd34d;
  --blue-accent:#1e40af;--blue-bg:#dbeafe;
  --gold:#92400e;--gold-light:#b45309;
  --silver:#111827;--silver-dim:#1f2937;--silver-muted:#374151;
  --white:#111827;--line:#e5e7eb;--line-bright:#d1d5db;
  --card-bg:#ffffff;--card-border:#e5e7eb;
  --shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
  --shadow-lg:0 4px 16px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.08);
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'Outfit',system-ui,sans-serif;color:#111827;min-height:100vh;min-height:100dvh;overflow-x:hidden;width:100%;}
body::before{content:"";position:fixed;inset:0;background:#f3f4f6;z-index:-1;}
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:rgba(255,255,255,.95);border:1px solid #d1d5db;border-radius:24px;padding:48px 40px;width:min(420px,100%);text-align:center;backdrop-filter:blur(20px);box-shadow:var(--shadow-lg);}
.auth-emblem{font-size:52px;margin-bottom:16px;}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--ocean-surf);letter-spacing:-.5px;margin-bottom:6px;}
.auth-title em{color:var(--gold);font-style:italic}
.auth-sub{font-size:14px;color:var(--text-muted);margin-bottom:32px;line-height:1.6;}
.btn-google{display:inline-flex;align-items:center;gap:12px;background:#fff;color:#1a1a2e;border:none;border-radius:12px;padding:14px 28px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(0,0,0,.3);width:100%;justify-content:center;}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;}
.loader-ring{width:48px;height:48px;border:3px solid #d1d5db;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--text-muted)}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.topbar{background:#ffffff;border-bottom:2px solid var(--ocean-surf);box-shadow:0 2px 8px rgba(0,0,0,.08);padding:0 12px;padding-top:var(--safe-top);display:flex;align-items:center;gap:8px;height:calc(52px + var(--safe-top));position:sticky;top:0;z-index:50;overflow:hidden;}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ocean-surf);letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;}
.topbar-logo em{color:var(--gold);font-style:italic}
.topbar-spacer{flex:1}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);}
.topbar-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid #d1d5db;}
.topbar-avatar-placeholder{width:30px;height:30px;border-radius:50%;background:var(--ocean-surf);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.btn-signout{border:1px solid #d1d5db;background:transparent;color:var(--text-muted);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;}
.btn-signout:hover{color:var(--red);border-color:var(--red)}
.nav-tabs{background:#ffffff;border-bottom:1.5px solid #d1d5db;display:flex;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding:0 4px;position:sticky;top:calc(52px + var(--safe-top));z-index:40;box-shadow:0 2px 4px rgba(0,0,0,.02);}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex:1;min-width:80px;padding:12px 8px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap;letter-spacing:.3px;text-transform:uppercase;}
.nav-tab.active{color:var(--ocean-surf);border-bottom-color:var(--ocean-surf);background:linear-gradient(to bottom,transparent,#f0f7ff);}
.main-content{flex:1;max-width:1080px;margin:0 auto;width:100%;padding:20px 12px;padding-bottom:calc(20px + var(--safe-bottom));overflow-x:hidden;}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;position:relative;overflow:hidden;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--ocean-surf);letter-spacing:-.4px;line-height:1.2;margin-bottom:4px;}
.card-sub{font-size:13px;color:var(--text-muted);margin-top:3px;font-weight:500;display:flex;align-items:center;gap:6px;}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:var(--radius-sm);padding:9px 16px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap;letter-spacing:.2px;}
.btn:hover{opacity:.85}.btn:active{transform:scale(.96)}
.btn-primary{background:var(--ocean-surf);color:#fff;box-shadow:0 2px 8px rgba(10,66,114,.3);}
.btn-secondary{background:#f3f4f6;color:var(--text);border:1px solid #d1d5db;}
.btn-teal{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(22,101,52,.25);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}
.field{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:800;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
input,select,textarea{width:100%;padding:10px 13px;background:#ffffff;border:1.5px solid #d1d5db;border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;transition:border-color .15s,box-shadow .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ocean-surf);box-shadow:0 0 0 3px rgba(10,66,114,.1);}
.table{width:100%;border-collapse:collapse}
.table th,.table td{border-top:1px solid var(--line);padding:9px 10px;font-size:13px;vertical-align:top;}
.table th{font-size:11px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;background:#f9fafb;text-align:left;}
.r{text-align:right}
.badge{display:inline-flex;padding:3px 8px;border-radius:100px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.badge-blue{background:var(--blue-bg);color:var(--blue-accent);border:1px solid #bfdbfe;}
.overlay{position:fixed;inset:0;background:rgba(5,12,24,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;animation:fadeIn .2s ease-out;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#ffffff;border:1px solid #d1d5db;border-radius:24px;width:min(860px,100%);max-height:92vh;overflow:auto;padding:24px;box-shadow:var(--shadow-lg);position:relative;}
.invoice-box{border:1px solid #d1d5db;border-radius:14px;padding:22px;background:#fafbfc;}
.hr{border-top:1.5px solid var(--line);margin:16px 0}
@media print{.topbar,.nav-tabs,.noPrint{display:none!important}}
</style>
</head>
