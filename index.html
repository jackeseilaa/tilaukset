<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="J Sailing"/>
<meta name="theme-color" content="#0a1628"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-512.png"/>
<title>J Sailing — Hallintapaneeli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   DESIGN TOKENS — Deep Ocean Nautical
   ══════════════════════════════════════ */
:root{
  --ocean-surf: #0a4272;
  --text: #111827;
  --text-muted: #374151;
  --text-light: #6b7280;
  --green: #166534;
  --green-bg: #dcfce7;
  --green-border: #86efac;
  --red: #991b1b;
  --red-bg: #fee2e2;
  --red-border: #fca5a5;
  --amber: #92400e;
  --amber-bg: #fef3c7;
  --amber-border: #fcd34d;
  --blue-accent: #1e40af;
  --blue-bg: #dbeafe;
  --gold: #92400e;
  --gold-light: #b45309;
  --silver: #111827;
  --silver-dim: #1f2937;
  --silver-muted: #374151;
  --white: #111827;
  --line: #e5e7eb;
  --line-bright: #d1d5db;
  --card-bg: #ffffff;
  --card-border: #e5e7eb;
  --shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.12), 0 2px 6px rgba(0,0,0,.08);
  --radius: 12px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:'Outfit',system-ui,sans-serif;
  background:var(--ocean-deep);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;inset:0;
  background:#f3f4f6;
  z-index:-1;
}
/* ══ AUTH SCREEN ══ */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:rgba(255,255,255,.95);border:1px solid var(--line-bright);border-radius:24px;padding:48px 40px;width:min(420px,100%);text-align:center;backdrop-filter:blur(20px);box-shadow:var(--shadow-lg);}
.auth-emblem{font-size:52px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(201,168,76,.4));}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:#0a4272;letter-spacing:-.5px;margin-bottom:6px;}
.auth-title em{color:var(--gold);font-style:italic}
.auth-sub{font-size:14px;color:var(--text-muted);margin-bottom:32px;line-height:1.6;}
.btn-google{display:inline-flex;align-items:center;gap:12px;background:#fff;color:#1a1a2e;border:none;border-radius:12px;padding:14px 28px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(0,0,0,.3);width:100%;justify-content:center;}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.btn-google:active{transform:translateY(0)}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.auth-note{margin-top:20px;font-size:12px;color:var(--text-muted);line-height:1.5;}
/* ══ LOADING ══ */
.loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;}
.loader-ring{width:48px;height:48px;border:3px solid var(--line-bright);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--text-muted)}
/* ══ APP LAYOUT ══ */
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
/* ── Top bar ── */
.topbar{background:#ffffff;border-bottom:2px solid #0a4272;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:0 20px;padding-top:var(--safe-top);display:flex;align-items:center;gap:16px;height:calc(60px + var(--safe-top));position:sticky;top:0;z-index:50;}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#0a4272;letter-spacing:-.3px;white-space:nowrap;}
.topbar-logo em{color:var(--gold);font-style:italic}
.topbar-spacer{flex:1}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);}
.topbar-avatar{width:30px;height:30px;border-radius:50%;border:2px solid var(--gold-dim);object-fit:cover;}
.topbar-avatar-placeholder{width:30px;height:30px;border-radius:50%;background:var(--ocean-surf);border:2px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--ocean-surf);}
.btn-signout{border:1px solid var(--line-bright);background:transparent;color:var(--text-muted);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:color .15s,border-color .15s;}
.btn-signout:hover{color:var(--red);border-color:var(--red)}
/* ── Nav tabs ── */
.nav-tabs{background:#ffffff;border-bottom:1.5px solid #d1d5db;display:flex;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex:1;min-width:80px;padding:12px 8px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap;letter-spacing:.3px;text-transform:uppercase;}
.nav-tab.active{color:#0a4272;border-bottom-color:#0a4272;}
.nav-tab:hover:not(.active){color:var(--silver)}
/* ── Main content ── */
.main-content{flex:1;max-width:1080px;margin:0 auto;width:100%;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bottom));}
/* ══ CARDS ══ */
.card{background:#ffffff;border:1px solid #e5e7eb;border-radius:var(--radius);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.10);margin-bottom:16px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#0a4272;letter-spacing:-.4px;}
.card-title em{color:var(--gold);font-style:italic}
.card-sub{font-size:13px;color:#374151;margin-top:3px;font-weight:500}
/* ══ BUTTONS ══ */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:var(--radius-sm);padding:9px 16px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s,box-shadow .15s;white-space:nowrap;letter-spacing:.2px;}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.96)}
.btn-primary{background:#0a4272;color:#ffffff;box-shadow:0 2px 8px rgba(10,66,114,.3);}
.btn-primary:hover{background:#083458;box-shadow:0 4px 12px rgba(10,66,114,.4)}
.btn-secondary{background:#f3f4f6;color:#1f2937;border:1px solid #d1d5db;}
.btn-secondary:hover{background:#e5e7eb}
.btn-teal{background:#166534;color:#ffffff;box-shadow:0 2px 8px rgba(22,101,52,.3);}
.btn-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}
/* ══ Google Calendar button ══ */
.btn-gcal{background:#ffffff;color:#1a1a2e;border:1.5px solid #d1d5db;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.btn-gcal:hover{background:#f8f9fa;border-color:#4285F4;color:#1a73e8;}
.btn-gcal-added{background:#e8f5e9;color:#1e7e34;border:1.5px solid #81c784;}
.btn-gcal-added:hover{background:#d4edda;border-color:#388e3c;}
/* ══ FORM ELEMENTS ══ */
.field{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:800;color:#374151;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
input,select,textarea{width:100%;padding:10px 13px;background:#ffffff;border:1.5px solid #d1d5db;border-radius:var(--radius-sm);color:#111827;font-family:'Outfit',sans-serif;font-size:14px;transition:border-color .15s;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#0a4272;box-shadow:0 0 0 3px rgba(10,66,114,.15);}
input::placeholder{color:var(--text-muted)}
select option{background:#ffffff;color:#111827}
/* ══ GRID ══ */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:680px){.grid2,.grid3{grid-template-columns:1fr}}
/* ══ UTILS ══ */
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.hr{border-top:1.5px solid #e5e7eb;margin:16px 0}
.muted{color:#6b7280;font-size:13px}
.small{font-size:12px}
/* ══ STATUS BADGES ══ */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.badge-green{background:#dcfce7;color:#166534;border:1px solid #86efac;font-weight:700}
.badge-red{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;font-weight:700}
.badge-amber{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;font-weight:700}
.badge-blue{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;font-weight:700}
.badge-silver{background:#f3f4f6;color:#1f2937;border:1px solid #d1d5db;font-weight:700}
.badge-gcal{background:#e8f0fe;color:#1a73e8;border:1px solid #aecbfa;font-weight:700}
.badge-navy{background:#dbeafe;color:#0a4272;border:1px solid #93c5fd;font-weight:700}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(201,168,76,.15);color:var(--ocean-surf);border:1px solid rgba(201,168,76,.25);margin-left:6px;}
/* ══ STATUS DOT ══ */
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot-green{background:#16a34a}
.dot-red{background:#dc2626}
.dot-amber{background:#d97706}
/* ══ LIST ITEMS ══ */
.item{display:flex;justify-content:space-between;gap:14px;padding:14px 0;border-top:1px solid var(--line);}
.item:first-child{border-top:none}
.item h3{font-size:15px;font-weight:600;color:#111827;margin-bottom:4px;}
.item .meta{font-size:13px;color:#374151;margin-top:3px;line-height:1.5;font-weight:500}
/* ══ FILL BAR ══ */
.fillrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px}
.fillbar-wrap{flex:1;min-width:100px;height:6px;background:rgba(200,216,232,.1);border-radius:999px;overflow:hidden;display:flex;}
.fillbar-green{height:100%;background:var(--green);transition:width .4s}
.fillbar-amber{height:100%;background:var(--amber);transition:width .4s}
.filltext{font-size:12px;color:#374151;font-weight:700;white-space:nowrap}
/* ══ ATTENDEE CARDS ══ */
.attendee-card{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 13px;border-radius:10px;border:1px solid transparent;margin-bottom:6px;}
.attendee-card.paid{background:#dcfce7;border-color:#86efac}
.attendee-card.pending{background:#fee2e2;border-color:#fca5a5}
.attendee-card.reserve{background:#fef3c7;border-color:#fcd34d}
/* ══ SESSION BOX ══ */
.session-box{margin:10px 0 14px;padding:14px;background:#f8fafc;border-radius:10px;border:1px solid #e5e7eb;}
.session-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 0;border-top:1px dashed rgba(200,216,232,.1);}
.session-item:first-child{border-top:none;padding-top:0}
/* ══ GROUPBAR ══ */
.groupbar{display:flex;gap:8px;flex-wrap:wrap}
.groupbar .btn{padding:6px 12px;border-radius:999px;font-size:11px}
/* ══ INFO BOXES ══ */
.infobox{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.5;margin:10px 0;}
.infobox-blue{background:#dbeafe;color:#1e3a8a;border:1px solid #93c5fd}
.infobox-green{background:#dcfce7;color:#14532d;border:1px solid #86efac}
.infobox-amber{background:#fef3c7;color:#78350f;border:1px solid #fcd34d}
.infobox-red{background:#fee2e2;color:#7f1d1d;border:1px solid #fca5a5}
/* ══ MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(5,12,24,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;}
.modal{background:#ffffff;border:1px solid var(--line-bright);border-radius:20px;width:min(860px,100%);max-height:92vh;overflow:auto;box-shadow:var(--shadow-lg);scrollbar-width:thin;scrollbar-color:var(--silver-muted) transparent;}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#ffffff;border-bottom:1.5px solid #e5e7eb;z-index:2;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--ocean-surf);}
.modal-body{padding:22px}
/* ══ CALENDAR ══ */
.cal-nav-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.cal-month-label{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:#0a4272;min-width:220px;text-align:center;letter-spacing:-.5px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:14px;}
.cal-dayname{text-align:center;font-size:11px;font-weight:800;color:#374151;padding:8px 2px;text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid #e5e7eb;margin-bottom:4px;}
.cal-cell{min-height:96px;background:#ffffff;border:1px solid #e5e7eb;border-radius:10px;padding:6px;position:relative;transition:border-color .15s;}
.cal-cell:hover{border-color:var(--silver-muted)}
.cal-cell.other-month{opacity:.3}
.cal-cell.today{border-color:#0a4272;border-width:2px}
.cal-date{font-size:12px;font-weight:800;color:var(--text);margin-bottom:4px;}
.cal-cell.today .cal-date{background:#0a4272;color:#ffffff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;}
.cal-event{display:block;width:100%;padding:4px 6px;border-radius:5px;font-size:11px;font-weight:700;margin-bottom:3px;cursor:pointer;border:none;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Outfit',sans-serif;transition:opacity .1s;}
.cal-event:hover{opacity:.8}
.cal-event:active{transform:scale(.96)}
.type-Kurssi{background:#c8e8f8;color:#083a6a;border:1px solid #90c8ec;font-weight:700}
.type-Charter{background:#c0f0dc;color:#064a28;border:1px solid #70d4a0;font-weight:700}
.type-Iltapurjehdus{background:#e4d0f8;color:#3a0870;border:1px solid #b888e8;font-weight:700}
.type-Päiväpurjehdus{background:#fde8b0;color:#5a3200;border:1px solid #f0b840;font-weight:700}
.type-Purjehdusretki{background:#fcc8c8;color:#620808;border:1px solid #e88080;font-weight:700}
.type-Yritystilaisuus{background:#dce8f4;color:#0a2a4a;border:1px solid #90b4d4;font-weight:700}
.type-Muu{background:#e4e4ec;color:#1a1a34;border:1px solid #a8a8c4;font-weight:700}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);font-weight:500}
.cal-legend-dot{width:10px;height:10px;border-radius:3px}
/* ══ DASHBOARD STATS ══ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:16px 0;}
.stat-card{background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;text-align:center;}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;color:#0a4272;line-height:1;margin:4px 0;}
.stat-label{font-size:11px;color:#374151;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
/* ══ INVOICE ══ */
.invoice-box{border:1px solid var(--line-bright);border-radius:14px;padding:22px;background:#fafbfc;}
/* ══ SYNC INDICATOR ══ */
.sync-dot{width:7px;height:7px;border-radius:50%;background:#16a34a;display:inline-block;margin-right:5px;}
.sync-dot.syncing{background:#d97706;animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.table{width:100%;border-collapse:collapse}
.table th,.table td{border-top:1px solid var(--line);padding:9px 10px;font-size:13px;vertical-align:top;}
.table th{font-size:11px;font-weight:800;color:#374151;text-transform:uppercase;letter-spacing:.4px;background:#f9fafb}
.r{text-align:right}
/* ══ FIREBASE STATUS ══ */
.firebase-setup{background:#fef3c7;border:1.5px solid #f59e0b;border-radius:12px;padding:16px 18px;margin-bottom:16px;font-size:13px;color:#78350f;font-weight:500;line-height:1.6;}
.firebase-setup code{background:#fde68a;padding:1px 6px;border-radius:4px;font-family:monospace;font-size:12px;color:#78350f;font-weight:700;}
/* ══ TUTKINNOT ══ */
.tutkinto-card{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:box-shadow .15s;}
.tutkinto-card:hover{box-shadow:0 2px 8px rgba(10,66,114,.08);}
.tutkinto-type-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.3px;}
.tutkinto-Rannikkopäällikkö{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;}
.tutkinto-Saaristopäällikkö{background:#dcfce7;color:#166534;border:1px solid #86efac;}
.tutkinto-KVVK{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd;}
.tutkinto-Vuokraveneenkuljettaja{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;}
.tutkinto-Muu{background:#f3f4f6;color:#374151;border:1px solid #d1d5db;}
/* ══ INVOICE PREVIEW MODAL ══ */
.invoice-preview{font-size:14px;line-height:1.7;}
/* ══ PRINT ══ */
@media print{
  .topbar,.nav-tabs,.noPrint,header{display:none!important}
  body{background:#fff;color:#000}
  .card{border:none;box-shadow:none;background:#fff}
  .invoice-box{border:1px solid #ccc}
  .main-content{padding:0;max-width:none}
}
/* ══ RESPONSIVE ══ */
@media(max-width:600px){
  .cal-cell{min-height:64px}
  .cal-event{font-size:9px;padding:2px 4px}
  .topbar-user .name{display:none}
  .main-content{padding:12px 10px}
}
</style>
</head>

function today(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
function fmtDate(d){ return d ? new Date(d+"T00:00:00").toLocaleDateString("fi-FI") : ""; }
function genId(p){ return p+Math.random().toString(16).slice(2,8).toUpperCase(); }
function vatRate(s){ return (s?.type==="Charter") ? 0.135 : 0.255; }
function enrolledCount(sid){ return state.customers.filter(c=>c.sailingId===sid).length; }
function confirmedCount(sid){ return state.customers.filter(c=>c.sailingId===sid&&c.reservationStatus==="paid").length; }
function pendingCount(sid){ return state.customers.filter(c=>c.sailingId===sid&&c.reservationStatus==="pending").length; }
function reserveCount(sid){ return state.customers.filter(c=>c.sailingId===sid&&c.reservationStatus==="reserve").length; }
function finnishReference(digits){
  digits = String(digits||"").replace(/\D/g,"");
  if(!digits) return "";
  const w=[7,3,1]; let sum=0,wi=0;
  for(let i=digits.length-1;i>=0;i--){ sum+=Number(digits[i])*w[wi%3]; wi++; }
  return digits+String((10-(sum%10))%10);
}
function nextInvoiceNumber(){
  const year = new Date().getFullYear();
  let max=0;
  for(const inv of state.invoices){
    const m=String(inv.invoiceNo||"").match(/^JS-(\d{4})-(\d+)$/);
    if(m&&Number(m[1])===year) max=Math.max(max,Number(m[2]));
  }
  return `JS-${year}-${String(max+1).padStart(3,"0")}`;
}
function statusBadge(status){
  if(status==="paid") return `<span class="badge badge-green">✓ Vahvistettu</span>`;
  if(status==="pending") return `<span class="badge badge-red">● Varausmaksu odottaa</span>`;
  if(status==="reserve") return `<span class="badge badge-amber">◎ Varapaikka</span>`;
  return "";
}
function fillUI(sid, maxPersons, reserveSlots){
  const max = Math.max(1,Number(maxPersons||0)||1);
  const rsv = Math.max(0,Number(reserveSlots||0)||0);
  const total= max+rsv;
  const conf = confirmedCount(sid);
  const pend = pendingCount(sid);
  const confPct = Math.min(100,Math.round((conf/total)*100));
  const pendPct = Math.min(100-confPct,Math.round((pend/total)*100));
  return `
    <div class="fillrow">
      <div class="fillbar-wrap">
        <div class="fillbar-green" style="width:${confPct}%"></div>
        <div class="fillbar-amber" style="width:${pendPct}%"></div>
      </div>
      <div class="filltext">
        <span style="color:var(--green)">✓${conf}</span>
        ${pend>0?`<span style="color:var(--red)"> ●${pend}</span>`:""}
        ${reserveCount(sid)>0?`<span style="color:var(--amber)"> ◎${reserveCount(sid)}</span>`:""}
        <span style="color:var(--text-muted)"> / ${max}+${rsv}</span>
      </div>
    </div>
  `;
}

function gcalUrl(title, date, startTime, endTime, description){
  const fmt = (d, t) => {
    if(!t) return d.replace(/-/g,"");
    const [h,m] = t.split(":").map(s=>s.padStart(2,"0"));
    return d.replace(/-/g,"")+"T"+h+(m||"00")+"00";
  };
  const start = fmt(date, startTime);
  const end = endTime ? fmt(date, endTime) : fmt(date, startTime ? (parseInt(startTime)+2)+":00" : null);
  const params = new URLSearchParams({
    action:"TEMPLATE",
    text: title,
    dates: start+"/"+(end||start),
    details: description||"v8.3 - J Sailing — Absolut 37",
    location: "Loviisa, Finland"
  });
  return "https://calendar.google.com/calendar/render?"+params.toString();
}

// Laskulajien nimet
const INV_TYPE_LABELS = {
  full:"Loppulasku",
  reservation:"Varausmaksu",
  partial:"Osasuoritus",
  credit:"Hyvityslasku"
};
function invTypeLabel(t){ return INV_TYPE_LABELS[t]||t; }

function computeInvoice(overrideState){
  const inv = overrideState || state.invoice;
  const s = state.sailings.find(x=>x.id===inv.sailingId)||null;
  const rate = vatRate(s);
  const ratePct = (rate*100).toFixed(1);
  const itype = inv.type||"full";
  const isRes = itype==="reservation";
  const isPartial = itype==="partial";
  const isCredit = itype==="credit";
  let payerName="",payerEmail="",payerBusinessId="",lines=[],grossTotal=0,eventName="";
  if(s){
    eventName = s.name||"";
    let price = isRes ? Number(s.reservationFee||0) : Number(s.pricePerPerson||0);
    if(isPartial){ price = parseFloat(inv.partialAmount||0)||0; }
    if(inv.mode==="customer"){
      const c = state.customers.find(x=>x.id===inv.customerId);
      if(c){
        payerName=c.name||""; payerEmail=c.email||"";
        let desc = `${s.name} — ${invTypeLabel(itype)} — ${c.name}`;
        let amt = isCredit ? -Math.abs(price) : price;
        lines.push({title:desc,qty:1,unit:amt,total:amt});
        grossTotal=amt;
      }
    } else {
      const co = state.companies.find(x=>x.id===inv.companyId);
      if(co){
        payerName=co.name||""; payerEmail=co.email||""; payerBusinessId=co.businessId||"";
        const cust = state.customers
          .filter(c=>c.sailingId===s.id&&c.billTo==="company"&&c.companyId===co.id)
          .sort((a,b)=>(a.name||"").localeCompare(b.name||""));
        let gross = isPartial ? price : cust.length*price;
        if(isPartial){
          lines.push({title:`${s.name} — Osasuoritus`,qty:1,unit:price,total:price});
        } else {
          for(const c of cust){
            let amt = isCredit ? -Math.abs(price) : price;
            lines.push({title:`${s.name} — ${invTypeLabel(itype)} — ${c.name}`,qty:1,unit:amt,total:amt});
          }
        }
        const comm = Math.abs(gross)*(Number(co.commissionPct||0)/100);
        if(comm>0&&!isCredit) lines.push({title:"Välitysprovisio",qty:1,unit:-comm,total:-comm});
        grossTotal = isCredit ? -Math.abs(gross) : gross-comm;
      }
    }
  }
  const creditRef = isCredit ? state.invoices.find(x=>x.id===inv.creditRefId) : null;
  const net = (grossTotal||0)/(1+rate);
  const vat = (grossTotal||0)-net;
  const invNo = nextInvoiceNumber();
  return {sailing:s,rate,ratePct,payerName,payerEmail,payerBusinessId,lines,grossTotal,net,vat,
    reference:finnishReference(invNo.replace(/\D/g,"")),invNo,eventName,
    isReservation:isRes,itype,isCredit,isPartial,creditRef};
}

function monthSummary(month){
  const rows=state.invoices.filter(x=>String(x.invoiceDate||"").slice(0,7)===month);
  const s={all:{net:0,vat:0,gross:0,count:0},r255:{net:0,vat:0,gross:0,count:0},r135:{net:0,vat:0,gross:0,count:0}};
  for(const x of rows){
    const r=Number(x.vatRatePct||0);
    const b=(Math.abs(r-25.5)<.2)?"r255":(Math.abs(r-13.5)<.2)?"r135":null;
    if(b){s[b].net+=Number(x.net||0);s[b].vat+=Number(x.vat||0);s[b].gross+=Number(x.grossTotal||0);s[b].count+=1;}
    s.all.net+=Number(x.net||0);s.all.vat+=Number(x.vat||0);s.all.gross+=Number(x.grossTotal||0);s.all.count+=1;
  }
  return s;
}

async function fsAdd(col, data){
  if(!db) return genId("X");
  state.syncing=true; renderSyncIndicator();
  try{
    const ref = await addDoc(collection(db, col), {...data, updatedAt:serverTimestamp()});
    return ref.id;
  }finally{state.syncing=false; renderSyncIndicator();}
}
async function fsSet(col, id, data){
  if(!db) return;
  state.syncing=true; renderSyncIndicator();
  try{
    await setDoc(doc(db, col, id), {...data, updatedAt:serverTimestamp()}, {merge:true});
  }finally{state.syncing=false; renderSyncIndicator();}
}
async function fsDel(col, id){
  if(!db) return;
  state.syncing=true; renderSyncIndicator();
  try{
    await deleteDoc(doc(db, col, id));
  }finally{state.syncing=false; renderSyncIndicator();}
}
function renderSyncIndicator(){
  const el = document.getElementById("syncDot");
  if(!el) return;
  el.className = "sync-dot" + (state.syncing?" syncing":"");
}

const unsubscribers = [];
function startListeners(uid){
  const cols = ["sailings","customers","companies","invoices","tutkinnot"];
  for(const col of cols){
    const unsub = onSnapshot(collection(db, col), snap=>{
      state[col] = snap.docs.map(d=>({id:d.id,...d.data()}));
      if(!state.invoice.sailingId && state.sailings.length>0)
        state.invoice.sailingId = state.sailings[0].id;
      render();
    });
    unsubscribers.push(unsub);
  }
}
function stopListeners(){
  unsubscribers.forEach(u=>u());
  unsubscribers.length=0;
}

function sailingDateRange(s){
  const sessions = Array.isArray(s.sessions)?s.sessions:[];
  const teoria = Array.isArray(s.teoria)?s.teoria:[];
  const allDates = [s.date,...sessions.map(x=>x.date),...teoria.map(x=>x.date)].filter(Boolean).sort();
  if(!allDates.length) return fmtDate(s.date);
  const first = allDates[0], last = allDates[allDates.length-1];
  if(first===last) return fmtDate(first);
  return fmtDate(first)+" – "+fmtDate(last);
}
function sailingDashRow(s, dimmed){
  const isCourse = s.type==="Kurssi";
  const sessions = Array.isArray(s.sessions)?s.sessions:[];
  const teoria = Array.isArray(s.teoria)?s.teoria:[];
  const range = sailingDateRange(s);
  const conf = confirmedCount(s.id), max = Number(s.maxPersons||0);
  const teoriaStr = teoria.length>0
    ? teoria.map(t=>`📚 Teoria: ${fmtDate(t.date)}${t.start?" klo "+t.start:""}${t.end?"–"+t.end:""}`).join(" · ")
    : "";
  const sessStr = isCourse && sessions.length>0 ? `${sessions.length} käytännön päivää` : "";
  const sub = [range, sessStr, teoriaStr, s.reitti?`📍 ${s.reitti}`:""].filter(Boolean).join(" · ");
  return `
    <div class="item" style="${dimmed?"opacity:.5":""}">
      <div style="flex:1">
        <h3 style="font-size:14px">${esc(s.name||"")} <span class="pill">${esc(s.type||"")}</span></h3>
        <div class="meta" style="font-size:12px">${sub}</div>
        <div class="meta" style="font-size:12px">${conf} vahvistettu / ${max} max${Number(s.reservationFee||0)>0?" · varausmaksu "+s.reservationFee+" €":""}</div>
      </div>
      <button class="btn btn-secondary btn-sm" data-action="edit-sailing" data-id="${s.id}">Avaa</button>
    </div>
  `;
}

// ── CALENDAR ──
function renderCalendar(){
  const [year,month] = state.calendarMonth.split("-").map(Number);
  const monthNames=["Tammikuu","Helmikuu","Maaliskuu","Huhtikuu","Toukokuu","Kesäkuu","Heinäkuu","Elokuu","Syyskuu","Lokakuu","Marraskuu","Joulukuu"];
  const dayNames=["Ma","Ti","Ke","To","Pe","La","Su"];
  const firstDay = new Date(year,month-1,1).getDay();
  const startOffset = firstDay===0?6:firstDay-1;
  const daysInMonth = new Date(year,month,0).getDate();
  const daysInPrev = new Date(year,month-1,0).getDate();
  const todayStr = today();
  const eventMap={};
  for(const s of state.sailings){
    if(!s.date) continue;
    const isCourse=s.type==="Kurssi";
    const hasSessions=isCourse&&Array.isArray(s.sessions)&&s.sessions.length>0;
    if(!hasSessions){
      if(!eventMap[s.date]) eventMap[s.date]=[];
      eventMap[s.date].push({id:s.id,name:s.name,type:s.type,maxPersons:s.maxPersons,reitti:s.reitti||"",timeLabel:"",_isSession:false});
    } else {
      for(let i=0;i<s.sessions.length;i++){
        const sess=s.sessions[i];
        if(!sess.date) continue;
        if(!eventMap[sess.date]) eventMap[sess.date]=[];
        let tl="";
        if(sess.start&&sess.end) tl=sess.start+"–"+sess.end;
        else if(sess.start) tl="klo "+sess.start;
        eventMap[sess.date].push({id:s.id,name:s.name,type:s.type,maxPersons:s.maxPersons,timeLabel:tl,_isSession:true,_sessIdx:i});
      }
    }
  }
  const totalCells=Math.ceil((startOffset+daysInMonth)/7)*7;
  let cells="";
  for(let i=0;i<totalCells;i++){
    let d,m,y,other=false;
    if(i<startOffset){d=daysInPrev-startOffset+i+1;m=month===1?12:month-1;y=month===1?year-1:year;other=true;}
    else if(i>=startOffset+daysInMonth){d=i-startOffset-daysInMonth+1;m=month===12?1:month+1;y=month===12?year+1:year;other=true;}
    else{d=i-startOffset+1;m=month;y=year;}
    const ds=y+"-"+String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const isToday=ds===todayStr;
    const evs=eventMap[ds]||[];
    const evHTML=evs.slice(0,3).map(ev=>{
      const tc="type-"+ev.type;
      const booked=ev._isSession?"":` (${enrolledCount(ev.id)}/${ev.maxPersons||0})`;
      const action=ev._isSession?"edit-session-cal":"edit-sailing";
      const sidx=ev._isSession?String(ev._sessIdx):"";
      const tl=ev.timeLabel?`<span style="display:block;opacity:.75;font-size:9px">${esc(ev.timeLabel)}</span>`:"";
      const s=state.sailings.find(x=>x.id===ev.id);
      const gcKey=ev._isSession?`gcal_${ev.id}_${ev._sessIdx}`:`gcal_${ev.id}`;
      const gcDot=s&&s[gcKey]?`<span title="Lisätty Google Kalenteriin" style="position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:#4285F4;display:block"></span>`:"";
      return `<button class="cal-event ${tc}" data-action="${action}" data-id="${ev.id}" data-idx="${sidx}" style="padding:3px 5px;position:relative">
        ${gcDot}<span style="display:block;overflow:hidden;text-overflow:ellipsis">${esc(ev.name)}${booked}</span>${tl}${ev.reitti?`<span style="display:block;opacity:.7;font-size:9px;overflow:hidden;text-overflow:ellipsis">📍${esc(ev.reitti)}</span>`:""}
      </button>`;
    }).join("");
    const more=evs.length>3?`<div style="font-size:9px;color:var(--text-muted);padding:1px 4px">+${evs.length-3}</div>`:"";
    cells+=`<div class="cal-cell${other?" other-month":""}${isToday?" today":""}">
      <div class="cal-date">${d}</div>
      ${evHTML}${more}
    </div>`;
  }
  const TYPES=["Kurssi","Charter","Iltapurjehdus","Päiväpurjehdus","Purjehdusretki","Yritystilaisuus","Muu"];
  const prev=month===1?`${year-1}-12`:`${year}-${String(month-1).padStart(2,"0")}`;
  const next=month===12?`${year+1}-01`:`${year}-${String(month+1).padStart(2,"0")}`;
  return `
    <div class="card">
      <div class="row-between">
        <div class="cal-nav-bar">
          <button class="btn btn-secondary btn-sm" data-action="cal-nav" data-month="${prev}">‹</button>
          <div class="cal-month-label">${monthNames[month-1]} ${year}</div>
          <button class="btn btn-secondary btn-sm" data-action="cal-nav" data-month="${next}">›</button>
        </div>
        <button class="btn btn-secondary btn-sm" data-action="cal-today">Tänään</button>
      </div>
      <div class="cal-legend">
        ${TYPES.map(t=>`<div class="cal-legend-item"><div class="cal-legend-dot cal-event type-${t}"></div>${esc(t)}</div>`).join("")}
        <div class="cal-legend-item"><div style="width:10px;height:10px;border-radius:50%;background:#4285F4;flex-shrink:0"></div>Google Kalenterissa</div>
      </div>
      <div class="cal-grid">
        ${dayNames.map(d=>`<div class="cal-dayname">${d}</div>`).join("")}
        ${cells}
      </div>
    </div>
  `;
}

function renderTutkinnot(){
  const term=(state.searchTutkinnot||"").toLowerCase();
  const list=state.tutkinnot
    .slice()
    .sort((a,b)=>(b.date||"").localeCompare(a.date||""))
    .filter(t=>!term
      ||(t.customerName||"").toLowerCase().includes(term)
      ||(t.type||"").toLowerCase().includes(term)
      ||(t.date||"").includes(term)
      ||(t.notes||"").toLowerCase().includes(term)
    );

  // Tilastot tutkintotyypeittäin
  const typeCounts={};
  for(const t of state.tutkinnot){
    typeCounts[t.type]=(typeCounts[t.type]||0)+1;
  }

  return `
    <div class="card">
      <div class="row-between">
        <div>
          <div class="card-title">🎓 Tutkinnot</div>
          <div class="card-sub">Suoritetut näyttökokeet ja pätevyydet</div>
        </div>
        <button class="btn btn-primary" data-action="new-tutkinto">+ Uusi tutkinto</button>
      </div>

      ${state.tutkinnot.length>0?`
        <div class="stats-grid" style="margin:16px 0">
          ${TUTKINTO_TYPES.map(t=>`
            <div class="stat-card">
              <div class="stat-label" style="font-size:10px">${esc(t)}</div>
              <div class="stat-val" style="font-size:28px;color:#1e40af">${typeCounts[t]||0}</div>
            </div>
          `).join("")}
        </div>
      `:""}

      <div class="hr"></div>
      <div class="field">
        <label class="lbl">Haku</label>
        <input data-action="search-tutkinnot" value="${esc(state.searchTutkinnot)}" placeholder="Hae nimellä, tutkintotyypillä tai päivällä…">
      </div>

      ${list.length===0?`<div class="muted">Ei tutkintoja.</div>`:`
        <table class="table">
          <thead>
            <tr>
              <th>Suorituspäivä</th>
              <th>Tutkintotyyppi</th>
              <th>Suorittaja</th>
              <th>Purjehdus / kurssi</th>
              <th>Lisätiedot</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${list.map(t=>{
              const s=state.sailings.find(x=>x.id===t.sailingId);
              const typeKey=(t.type||"").split(" ")[0];
              return `
                <tr>
                  <td style="font-weight:600;white-space:nowrap">${fmtDate(t.date)}</td>
                  <td><span class="tutkinto-type-badge tutkinto-${esc(typeKey)}">${esc(t.type||"")}</span></td>
                  <td style="font-weight:600">${esc(t.customerName||"")}</td>
                  <td class="small muted">${s?esc(s.name):""}</td>
                  <td class="small muted">${esc(t.notes||"")}</td>
                  <td>
                    <div class="row" style="gap:6px">
                      <button class="btn btn-secondary btn-sm" data-action="edit-tutkinto" data-id="${t.id}">Muokkaa</button>
                      <button class="btn btn-danger btn-sm" data-action="delete-tutkinto" data-id="${t.id}">Poista</button>
                    </div>
                  </td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `}
    </div>
  `;
}

function renderModal(){
  if(!state.modal) return "";
  if(state.modal==="session") return renderSessionModal();
  if(state.modal==="customer") return renderCustomerModal();
  if(state.modal==="sailing") return renderSailingModal();
  if(state.modal==="company") return renderCompanyModal();

  return "";
}

// ── RESKONTRA ──
function renderReskontra(){
  const customerMap={};
  for(const inv of state.invoices){
    const key=inv.payerName||"—";
    if(!customerMap[key]) customerMap[key]={name:key,email:inv.payerEmail||"",invoices:[],totalGross:0,totalPaid:0};
    customerMap[key].invoices.push(inv);
    const g=Number(inv.grossTotal||0);
    customerMap[key].totalGross+=g;
    if(inv.paid) customerMap[key].totalPaid+=g;
  }
  const customers=Object.values(customerMap).sort((a,b)=>a.name.localeCompare(b.name));
  const totalOpen=customers.reduce((s,c)=>s+(c.totalGross-c.totalPaid),0);
  const totalAll=customers.reduce((s,c)=>s+c.totalGross,0);
  const openInvoices=state.invoices.filter(x=>!x.paid&&Number(x.grossTotal||0)>0)
    .sort((a,b)=>(a.invoiceDate||"").localeCompare(b.invoiceDate||""));
  return `
    <div class="card">
      <div class="card-title">Reskontra</div>
      <div class="card-sub">Asiakaskohtainen saldo ja avoimet laskut</div>
      <div class="stats-grid" style="margin:16px 0">
        <div class="stat-card">
          <div class="stat-label">Laskutettu yht.</div>
          <div class="stat-val" style="font-size:28px">${totalAll.toFixed(2)} €</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avoimet laskut</div>
          <div class="stat-val" style="font-size:28px;color:var(--red)">${totalOpen.toFixed(2)} €</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Maksettu yht.</div>
          <div class="stat-val" style="font-size:28px;color:var(--green)">${(totalAll-totalOpen).toFixed(2)} €</div>
        </div>
      </div>
      <div class="hr"></div>
      <div style="font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:10px">⚠️ Avoimet laskut</div>
      ${openInvoices.length===0
        ?`<div class="infobox infobox-green">✓ Ei avoimia laskuja!</div>`
        :`<table class="table">
          <thead><tr><th>Päivä</th><th>Nro</th><th>Maksaja</th><th>Laskulaji</th><th>Tapahtuma</th><th class="r">Summa</th><th>Toiminto</th></tr></thead>
          <tbody>
            ${openInvoices.map(x=>`
              <tr style="background:${Number(x.grossTotal||0)<0?"#fee2e2":""}">
                <td>${esc(x.invoiceDate||"")}</td>
                <td>
                  <button class="btn btn-secondary btn-sm" data-action="preview-invoice" data-id="${x.id}" style="font-weight:700;color:#0a4272;padding:3px 8px">
                    🔍 ${esc(x.invoiceNo||"")}
                  </button>
                </td>
                <td>${esc(x.payerName||"")}</td>
                <td>${invTypeBadge(x.itype||x.invoiceType||(x.isReservation?"reservation":"full"))}</td>
                <td class="small muted">${esc(x.eventName||"")}</td>
                <td class="r" style="font-weight:700;color:${Number(x.grossTotal||0)<0?"#991b1b":"#0a4272"}">${Number(x.grossTotal||0).toFixed(2)} €</td>
                <td>
                  <button class="btn btn-teal btn-sm" data-action="reskontra-mark-paid" data-id="${x.id}">✓ Merkitse maksetuksi</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>`
      }
      <div class="hr"></div>
      <div style="font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:10px">👤 Asiakaskohtainen saldo</div>
      ${customers.length===0
        ?`<div class="muted">Ei laskuja.</div>`
        :`<table class="table">
          <thead><tr><th>Asiakas</th><th class="r">Laskutettu</th><th class="r">Maksettu</th><th class="r">Avoin</th><th>Laskut</th></tr></thead>
          <tbody>
            ${customers.map(c=>{
              const open=c.totalGross-c.totalPaid;
              return `<tr>
                <td>
                  <div style="font-weight:600">${esc(c.name)}</div>
                  ${c.email?`<div class="small muted"><a href="mailto:${esc(c.email)}" style="color:var(--blue-accent)">${esc(c.email)}</a></div>`:""}
                </td>
                <td class="r">${c.totalGross.toFixed(2)} €</td>
                <td class="r" style="color:var(--green)">${c.totalPaid.toFixed(2)} €</td>
                <td class="r" style="font-weight:700;color:${open>0?"#991b1b":open<0?"#92400e":"#166534"}">${open.toFixed(2)} €</td>
                <td>
                  ${c.invoices.map(inv=>`
                    <div class="small" style="margin-bottom:3px">
                      <button class="btn btn-secondary btn-sm" data-action="preview-invoice" data-id="${inv.id}" style="font-size:10px;padding:2px 7px;font-weight:700;color:#0a4272">
                        🔍 ${esc(inv.invoiceNo)}
                      </button>
                      ${invTypeBadge(inv.itype||inv.invoiceType||(inv.isReservation?"reservation":"full"))}
                      ${inv.paid
                        ?`<span class="badge badge-green" style="font-size:10px">✓ ${esc(inv.paidDate||"maksettu")}</span>`
                        :`<span class="badge badge-red" style="font-size:10px">● Avoin</span>`}
                      <span style="color:var(--text-muted)">${Number(inv.grossTotal||0).toFixed(2)} €</span>
                    </div>
                  `).join("")}
                </td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>`
      }
    </div>
  `;
}

function invTypeBadge(t){
  if(t==="reservation") return `<span class="badge badge-blue" style="font-size:10px">Varausmaksu</span>`;
  if(t==="partial") return `<span class="badge badge-amber" style="font-size:10px">Osasuoritus</span>`;
  if(t==="credit") return `<span class="badge badge-red" style="font-size:10px">Hyvitys</span>`;
  return `<span class="badge badge-silver" style="font-size:10px">Loppulasku</span>`;
}

// BIND
// ══════════════════════════════════════════════════════
function bind(){
  document.querySelectorAll("[data-tab]").forEach(b=>{
    b.onclick=()=>{ state.tab=b.dataset.tab; render(); };
  });
  document.querySelector('[data-action="restore-json"]')?.addEventListener("change", async(e)=>{
    const file = e.target.files?.[0]; if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      if(!confirm("Palautus korvaa nykyiset tiedot. Jatketaanko?")) return;
      if(CONFIG_READY && db){
        const cols = ["customers","sailings","companies","invoices","tutkinnot"];
        for(const col of cols){
          const items = Array.isArray(data[col]) ? data[col] : [];
          for(const item of items){
            const {id, ...rest} = item;
            await fsSet(col, id||genId("X"), rest);
          }
        }
        alert("Palautettu Firebaseen ✓");
      } else {
        state.customers = Array.isArray(data.customers)?data.customers:[];
        state.sailings = Array.isArray(data.sailings)?data.sailings:[];
        state.companies = Array.isArray(data.companies)?data.companies:[];
        state.invoices = Array.isArray(data.invoices)?data.invoices:[];
        state.tutkinnot = Array.isArray(data.tutkinnot)?data.tutkinnot:[];
        alert("Palautettu demo-tilaan ✓");
        render();
      }
    }catch(err){
      alert("Palautus epäonnistui: tiedosto ei ole kelvollinen JSON.");
    }finally{
      e.target.value="";
    }
  });

  document.querySelector('[data-action="search-customers"]')?.addEventListener("input",e=>{state.searchCustomers=e.target.value;render();});
  document.querySelector('[data-action="search-sailings"]')?.addEventListener("input",e=>{state.searchSailings=e.target.value;render();});
  document.querySelector('[data-action="search-tutkinnot"]')?.addEventListener("input",e=>{state.searchTutkinnot=e.target.value;render();});
  document.querySelector('[data-action="inv-sailing"]')?.addEventListener("change",e=>{state.invoice.sailingId=e.target.value;state.invoice.type="full";state.invoice.creditRefId="";render();});
  document.querySelector('[data-action="inv-mode"]')?.addEventListener("change",e=>{state.invoice.mode=e.target.value;render();});
  document.querySelector('[data-action="inv-type"]')?.addEventListener("change",e=>{state.invoice.type=e.target.value;render();});
  document.querySelector('[data-action="inv-customer"]')?.addEventListener("change",e=>{state.invoice.customerId=e.target.value;render();});
  document.querySelector('[data-action="inv-company"]')?.addEventListener("change",e=>{state.invoice.companyId=e.target.value;render();});
  document.querySelector('[data-action="inv-date"]')?.addEventListener("change",e=>{state.invoice.invoiceDate=e.target.value;render();});
  document.querySelector('[data-action="inv-partial-amount"]')?.addEventListener("input",e=>{state.invoice.partialAmount=e.target.value;render();});
  document.querySelector('[data-action="inv-credit-ref"]')?.addEventListener("change",e=>{state.invoice.creditRefId=e.target.value;render();});
  document.querySelector('[data-action="reg-month"]')?.addEventListener("input",e=>{state.registerMonth=(e.target.value||"").trim();});

  document.querySelectorAll('[data-action="reg-paid"]').forEach(cb=>{
    cb.onchange=async()=>{
      const x=state.invoices.find(z=>z.id===cb.dataset.id); if(!x) return;
      x.paid=!!cb.checked;
      if(x.paid){ const pd=prompt("Maksupäivä (YYYY-MM-DD):",x.paidDate||today()); if(!pd){x.paid=false;x.paidDate="";}else{x.paidDate=pd;} }
      else x.paidDate="";
      await fsSet("invoices",x.id,x);
      render();
    };
  });

  document.querySelectorAll("[data-action]").forEach(el=>{
    if(el.tagName==="INPUT"&&el.type==="checkbox") return;
    if(el.tagName==="A"&&el.dataset.action==="gcal-mark"){
      el.onclick=async(e)=>{
        const sailingId=el.dataset.id;
        const idxRaw=el.dataset.idx;
        const idx=(idxRaw!==""&&idxRaw!=null)?Number(idxRaw):null;
        setTimeout(()=>markGcalAdded(sailingId, idx), 300);
      };
      return;
    }
    el.onclick=async(e)=>{
      e.stopPropagation();
      const a=el.dataset.action, itemId=el.dataset.id;
      const idx=(el.dataset.idx!==""&&el.dataset.idx!=null)?Number(el.dataset.idx):null;

      if(a==="sign-out"){ await signOut(auth); return; }
      if(a==="set-group"){state.sailingGroup=itemId;render();return;}
      if(a==="cal-nav"){state.calendarMonth=el.dataset.month;render();return;}
      if(a==="cal-today"){state.calendarMonth=today().slice(0,7);render();return;}
      if(a==="toggle-sailing"){state.openSailingId=(state.openSailingId===itemId)?null:itemId;render();return;}
      if(a==="close-modal"){state.modal=null;state.editId=null;state.editSession=null;state.previewInvoiceId=null;render();return;}
      if(a==="new-customer"){state.modal="customer";state.editId=null;render();return;}
      if(a==="edit-customer"){state.modal="customer";state.editId=itemId;render();return;}
      if(a==="new-sailing"){state.modal="sailing";state.editId=null;render();return;}
      if(a==="edit-sailing"){state.modal="sailing";state.editId=itemId;render();return;}
      if(a==="new-company"){state.modal="company";state.editId=null;render();return;}
      if(a==="edit-company"){state.modal="company";state.editId=itemId;render();return;}
      if(a==="open-register"){state.modal="register";render();return;}

      // TUTKINNOT
      if(a==="new-tutkinto"){state.modal="tutkinto";state.editId=null;render();return;}
      if(a==="edit-tutkinto"){state.modal="tutkinto";state.editId=itemId;render();return;}
      if(a==="delete-tutkinto"){
        if(!confirm("Poistetaanko tutkinto?")) return;
        await fsDel("tutkinnot",itemId); render(); return;
      }
      if(a==="save-tutkinto"){
        const type=document.querySelector('[data-field="tutkinto-type"]')?.value||"";
        const date=document.querySelector('[data-field="tutkinto-date"]')?.value||"";
        const customerName=(document.querySelector('[data-field="tutkinto-customer"]')?.value||"").trim();
        const sailingId=document.querySelector('[data-field="tutkinto-sailing"]')?.value||"";
        const notes=(document.querySelector('[data-field="tutkinto-notes"]')?.value||"").trim();
        if(!type||!date||!customerName) return alert("Täytä pakolliset kentät (tyyppi, päivä, suorittaja).");
        const data={type,date,customerName,sailingId,notes};
        if(state.editId){ await fsSet("tutkinnot",state.editId,data); }
        else{ await fsAdd("tutkinnot",data); }
        state.modal=null; state.editId=null; render(); return;
      }

      // INVOICE PREVIEW (Reskontra)
      if(a==="preview-invoice"){
        state.previewInvoiceId=itemId;
        state.modal="invoice-preview";
        render(); return;
      }
      if(a==="print-preview"){
        window.print(); return;
      }

      if(a==="edit-session-cal"||a==="edit-session-direct"){
        if(idx===null||isNaN(idx)) return;
        state.editSession={sailingId:itemId,idx};
        state.modal="session"; render(); return;
      }
      if(a==="confirm-payment"){
        const c=state.customers.find(x=>x.id===itemId); if(!c) return;
        if(!confirm(`Merkitäänkö ${c.name} varausmaksu suoritetuksi?`)) return;
        c.reservationStatus="paid";
        await fsSet("customers",c.id,c);
        render(); return;
      }
      if(a==="promote-reserve"){
        const c=state.customers.find(x=>x.id===itemId); if(!c) return;
        const s=state.sailings.find(x=>x.id===c.sailingId); if(!s) return;
        if(confirmedCount(s.id)>=Number(s.maxPersons||0)){ alert("Kurssi on täynnä."); return; }
        if(!confirm(`Siirretäänkö ${c.name} odottamaan varausmaksua?`)) return;
        c.reservationStatus="pending";
        await fsSet("customers",c.id,c);
        render(); return;
      }
      if(a==="add-session"){
        const s=state.sailings.find(x=>x.id===itemId); if(!s) return;
        const date=prompt("Kurssipäivä (YYYY-MM-DD):",today()); if(!date) return;
        const start=prompt("Aloitusaika (HH:MM):","17:00")||"";
        const end=prompt("Lopetusaika (HH:MM):","20:00")||"";
        const note=prompt("Lisähuomio:","")||"";
        if(!Array.isArray(s.sessions)) s.sessions=[];
        s.sessions.push({date,start,end,note});
        await fsSet("sailings",s.id,s);
        render(); return;
      }
      if(a==="delete-session"){
        const s=state.sailings.find(x=>x.id===itemId); if(!s||!Array.isArray(s.sessions)) return;
        if(idx===null||isNaN(idx)) return;
        if(!confirm("Poistetaanko kurssipäivä?")) return;
        s.sessions.splice(idx,1);
        await fsSet("sailings",s.id,s);
        render(); return;
      }
      if(a==="add-teoria"){
        const s=state.sailings.find(x=>x.id===itemId); if(!s) return;
        const date=prompt("Teoriapäivä (YYYY-MM-DD):",today()); if(!date) return;
        const start=prompt("Aloitusaika (HH:MM):","17:00")||"";
        const end=prompt("Lopetusaika (HH:MM):","21:00")||"";
        const note=prompt("Lisähuomio (esim. paikka):","")||"";
        if(!Array.isArray(s.teoria)) s.teoria=[];
        s.teoria.push({date,start,end,note});
        s.teoria.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
        await fsSet("sailings",s.id,s);
        render(); return;
      }
      if(a==="edit-teoria"){
        const s=state.sailings.find(x=>x.id===itemId); if(!s||!Array.isArray(s.teoria)) return;
        if(idx===null||isNaN(idx)) return;
        const t=s.teoria[idx]; if(!t) return;
        const date=prompt("Teoriapäivä (YYYY-MM-DD):",t.date||today()); if(!date) return;
        const start=prompt("Aloitusaika (HH:MM):",t.start||"17:00")||"";
        const end=prompt("Lopetusaika (HH:MM):",t.end||"21:00")||"";
        const note=prompt("Lisähuomio:",t.note||"")||"";
        s.teoria[idx]={date,start,end,note};
        s.teoria.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
        await fsSet("sailings",s.id,s);
        render(); return;
      }
      if(a==="delete-teoria"){
        const s=state.sailings.find(x=>x.id===itemId); if(!s||!Array.isArray(s.teoria)) return;
        if(idx===null||isNaN(idx)) return;
        if(!confirm("Poistetaanko teoriapäivä?")) return;
        s.teoria.splice(idx,1);
        await fsSet("sailings",s.id,s);
        render(); return;
      }
      if(a==="save-session-modal"){
        const {sailingId,idx}=state.editSession||{};
        const s=state.sailings.find(x=>x.id===sailingId);
        if(!s||!s.sessions?.[idx]) return;
        const newDate=document.querySelector('[data-field="sess-date"]')?.value||"";
        if(!newDate) return alert("Päivämäärä on pakollinen.");
        s.sessions[idx].date = newDate;
        s.sessions[idx].start = document.querySelector('[data-field="sess-start"]')?.value||"";
        s.sessions[idx].end = document.querySelector('[data-field="sess-end"]')?.value||"";
        s.sessions[idx].note = document.querySelector('[data-field="sess-note"]')?.value||"";
        await fsSet("sailings",s.id,s);
        state.modal=null; state.editSession=null; render(); return;
      }
      if(a==="save-customer"){
        const name=(document.querySelector('[data-field="name"]')?.value||"").trim();
        if(!name) return alert("Nimi pakollinen");
        const phone=(document.querySelector('[data-field="phone"]')?.value||"").trim();
        const email=(document.querySelector('[data-field="email"]')?.value||"").trim();
        const sailingId=document.querySelector('[data-field="sailingId"]')?.value||"";
        const billTo=document.querySelector('[data-field="billTo"]')?.value||"self";
        const companyId=document.querySelector('[data-field="companyId"]')?.value||"";
        const reservationStatus=document.querySelector('[data-field="reservationStatus"]')?.value||"pending";
        if(billTo==="company"&&!companyId) return alert("Valitse tilaajayritys.");
        const data={name,phone,email,sailingId,billTo,companyId:(billTo==="company")?companyId:"",reservationStatus};
        if(state.editId){ await fsSet("customers",state.editId,data); }
        else{ await fsAdd("customers",data); }
        state.modal=null; state.editId=null; render(); return;
      }
      if(a==="save-sailing"){
        const name=(document.querySelector('[data-field="name"]')?.value||"").trim();
        const date=document.querySelector('[data-field="date"]')?.value||"";
        const type=document.querySelector('[data-field="type"]')?.value||"";
        if(!name||!date||!type) return alert("Täytä pakolliset kentät.");
        const existing=state.editId?state.sailings.find(x=>x.id===state.editId):null;
        const data={
          name,date,type,
          reitti:(document.querySelector('[data-field="reitti"]')?.value||"").trim(),
          maxPersons:parseInt(document.querySelector('[data-field="maxPersons"]')?.value,10)||1,
          reserveSlots:Math.max(0,parseInt(document.querySelector('[data-field="reserveSlots"]')?.value,10)||0),
          pricePerPerson:parseFloat(document.querySelector('[data-field="pricePerPerson"]')?.value)||0,
          reservationFee:parseFloat(document.querySelector('[data-field="reservationFee"]')?.value)||0,
          sessions:existing?.sessions||[],
          teoria:existing?.teoria||[]
        };
        if(state.editId){ await fsSet("sailings",state.editId,data); }
        else{ const newId=await fsAdd("sailings",data); if(!state.invoice.sailingId) state.invoice.sailingId=newId; }
        state.modal=null; state.editId=null; render(); return;
      }
      if(a==="save-company"){
        const name=(document.querySelector('[data-field="name"]')?.value||"").trim();
        if(!name) return alert("Yrityksen nimi pakollinen.");
        const data={
          name,
          businessId:document.querySelector('[data-field="businessId"]')?.value||"",
          email:document.querySelector('[data-field="email"]')?.value||"",
          commissionPct:parseFloat(document.querySelector('[data-field="commissionPct"]')?.value)||0
        };
        if(state.editId){ await fsSet("companies",state.editId,data); }
        else{ await fsAdd("companies",data); }
        state.modal=null; state.editId=null; render(); return;
      }
      if(a==="delete-customer"){
        if(!confirm("Poistetaanko asiakas?")) return;
        await fsDel("customers",itemId); render(); return;
      }
      if(a==="delete-sailing"){
        if(!confirm("Poistetaanko purjehdus?")) return;
        await fsDel("sailings",itemId);
        if(state.openSailingId===itemId) state.openSailingId=null;
        render(); return;
      }
      if(a==="delete-company"){
        if(!confirm("Poistetaanko yritys?")) return;
        await fsDel("companies",itemId);
        render(); return;
      }
      if(a==="delete-register"){
        if(!confirm("Poistetaanko lasku rekisteristä?")) return;
        await fsDel("invoices",itemId); render(); return;
      }
      if(a==="reskontra-mark-paid"){
        const x=state.invoices.find(z=>z.id===itemId); if(!x) return;
        const pd=prompt(`Merkitään ${x.invoiceNo} maksetuksi.\nMaksupäivä (YYYY-MM-DD):`,x.paidDate||today());
        if(!pd) return;
        x.paid=true; x.paidDate=pd;
        await fsSet("invoices",x.id,x);
        render(); return;
      }
      if(a==="save-invoice"){
        const inv=computeInvoice();
        if(!inv.sailing) return alert("Valitse tapahtuma.");
        if(!inv.payerName) return alert("Valitse maksaja.");
        if(inv.lines.length===0) return alert("Laskulla ei ole rivejä.");
        if(inv.isCredit&&!state.invoice.creditRefId) return alert("Valitse hyvitettävä lasku.");
        if(inv.isPartial&&!parseFloat(state.invoice.partialAmount||0)) return alert("Syötä osasuorituksen summa.");
        const rec={
          mode:state.invoice.mode,
          isReservation:!!inv.isReservation,
          itype:inv.itype,
          isCredit:!!inv.isCredit,
          creditRefId:state.invoice.creditRefId||"",
          creditRefNo:inv.creditRef?.invoiceNo||"",
          invoiceNo:inv.invNo, invoiceDate:state.invoice.invoiceDate,
          reference:inv.reference, payerName:inv.payerName,
          payerBusinessId:inv.payerBusinessId||"", payerEmail:inv.payerEmail||"",
          eventId:inv.sailing.id, eventName:inv.eventName,
          vatRatePct:Number(inv.ratePct),
          net:Number(inv.net||0), vat:Number(inv.vat||0), grossTotal:Number(inv.grossTotal||0),
          paid:false, paidDate:""
        };
        await fsAdd("invoices",rec);
        alert(`Tallennettu!\nLaskunro: ${inv.invNo}\nViite: ${inv.reference}`);
        render(); return;
      }
      if(a==="export-json"){
        const blob=new Blob([JSON.stringify({customers:state.customers,sailings:state.sailings,companies:state.companies,invoices:state.invoices,tutkinnot:state.tutkinnot},null,2)],{type:"application/json"});
        const url=URL.createObjectURL(blob);
        const x=document.createElement("a");x.href=url;x.download=`jsailing_backup_${today()}.json`;x.click();URL.revokeObjectURL(url);
        return;
      }
      if(a==="export-register-csv"){
        const month=state.registerMonth||today().slice(0,7);
        const rows=state.invoices.filter(x=>String(x.invoiceDate||"").slice(0,7)===month).sort((a,b)=>(a.invoiceDate||"").localeCompare(b.invoiceDate||""));
        if(!rows.length){alert("Ei laskuja.");return;}
        const sep=";";
        const hdr=["Päivä","Laskunro","Viite","Maksaja","Y-tunnus","Sähköposti","Tapahtuma","Malli","Laskulaji","ALV%","Netto","ALV","Brutto","Maksettu","Maksupäivä"].join(sep);
        const lines=rows.map(x=>[
          x.invoiceDate,x.invoiceNo,x.reference,x.payerName,x.payerBusinessId||"",x.payerEmail||"",
          x.eventName||"",x.mode==="company"?"Yrityslasku":"Asiakaskohtainen",
          x.isReservation?"Varausmaksu":x.itype==="partial"?"Osasuoritus":x.itype==="credit"?"Hyvityslasku":"Loppulasku",
          String(x.vatRatePct||"").replace(".",","),
          Number(x.net||0).toFixed(2).replace(".",","),Number(x.vat||0).toFixed(2).replace(".",","),Number(x.grossTotal||0).toFixed(2).replace(".",","),
          x.paid?"Kyllä":"Ei",x.paidDate||""
        ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(sep));
        const csv=[hdr,...lines].join("\n");
        const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
        const url=URL.createObjectURL(blob);
        const a2=document.createElement("a");a2.href=url;a2.download=`laskurekisteri_${month}.csv`;a2.click();URL.revokeObjectURL(url);
        return;
      }
      if(a==="print"){window.print();return;}
      if(a==="email-invoice"){
        const box=document.getElementById("invoiceBox"); if(!box) return;
        let to="";
        if(state.invoice.mode==="customer"){const c=state.customers.find(x=>x.id===state.invoice.customerId);to=c?.email||"";}
        else{const co=state.companies.find(x=>x.id===state.invoice.companyId);to=co?.email||"";}
        const inv=computeInvoice();
        window.location.href=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent("Lasku "+inv.invNo)}&body=${encodeURIComponent(box.innerText)}`;
        return;
      }
    };
  });
}

if(!CONFIG_READY){
  state.user = {displayName:"Demo", email:"demo@jsailing.fi"};
  const sid=genId("S");
  state.sailings=[{id:sid,name:"Merenkulkukurssi 1",date:today(),type:"Kurssi",maxPersons:4,reserveSlots:2,pricePerPerson:350,reservationFee:80,sessions:[]}];
  state.customers=[
    {id:genId("C"),name:"Matti Merimies",phone:"0401111111",email:"matti@demo.fi",sailingId:sid,billTo:"self",companyId:"",reservationStatus:"paid"},
    {id:genId("C"),name:"Siiri Seteli",phone:"0402222222",email:"siiri@demo.fi",sailingId:sid,billTo:"self",companyId:"",reservationStatus:"pending"},
  ];
  state.tutkinnot=[
    {id:genId("T"),type:"Rannikkopäällikkö",date:today(),customerName:"Matti Merimies",sailingId:sid,notes:"Hyväksytty suoritus"},
  ];
  state.invoice.sailingId=sid;
  render();
} else {
  onAuthStateChanged(auth, user=>{
    if(user){
      if(user.email !== ALLOWED_EMAIL){
        signOut(auth);
        renderAuthScreen(`Pääsy estetty. Vain ${ALLOWED_EMAIL} voi kirjautua.`);
        return;
      }
      state.user = user;
      startListeners(user.uid);
    } else {
      stopListeners();
      state.user = null;
      state.customers=[]; state.sailings=[]; state.companies=[]; state.invoices=[]; state.tutkinnot=[];
      renderAuthScreen();
    }
  });
}
