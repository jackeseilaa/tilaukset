function computeInvoice(overrideState){const inv=overrideState||state.invoice;const source=inv.source||"sailing",isTutkinto=source==="tutkinto";const s=isTutkinto?null:(state.sailings.find(x=>x.id===inv.sailingId)||null);const t=isTutkinto?(state.tutkinnot.find(x=>x.id===inv.tutkintoId)||null):null;const rate=(!isTutkinto&&s?.type==="Charter")?0.135:0.255;const ratePct=(rate*100).toFixed(1);const itype=inv.type||"full",isRes=itype==="reservation",isPartial=itype==="partial",isCredit=itype==="credit";let payerName="",payerEmail="",payerBusinessId="",lines=[],grossTotal=0,eventName="";if(isTutkinto&&t){const invCust=state.customers.find(x=>x.id===inv.customerId);const custType=invCust?.tutkintoTypeOverride||"";eventName=(custType||t.type)+(t.boatType&&!custType?" ("+t.boatType+")":"");let price=parseFloat(inv.partialAmount||0)||0;const c=state.customers.find(x=>x.id===inv.customerId);if(c){payerName=c.name||"";payerEmail=c.email||"";let amt=isCredit?-Math.abs(price):price;lines.push({title:`${eventName} — ${invTypeLabel(itype)} — ${c.name}`,qty:1,unit:amt,total:amt});grossTotal=amt;}}else if(s){eventName=s.name||"";let price=isRes?Number(s.reservationFee||0):Number(s.pricePerPerson||0);if(isPartial)price=parseFloat(inv.partialAmount||0)||0;const alreadyInvoicedResFee=(itype==="full"&&!isCredit)?state.invoices.filter(x=>x.eventId===s.id&&(x.itype==="reservation"||x.isReservation)&&(inv.mode==="customer"?x.payerName===(state.customers.find(c=>c.id===inv.customerId)?.name||"__"):x.payerName===(state.companies.find(c=>c.id===inv.companyId)?.name||"__"))).reduce((sum,x)=>sum+Number(x.grossTotal||0),0):0;if(inv.mode==="customer"){const c=state.customers.find(x=>x.id===inv.customerId);if(c){payerName=c.name||"";payerEmail=c.email||"";const effectivePrice=(c.priceOverride!=null&&c.priceOverride!=="")?Number(c.priceOverride):price;let amt=isCredit?-Math.abs(effectivePrice):effectivePrice;const priceNote=(c.priceOverride!=null&&c.priceOverride!=="")?" (yksilollinen hinta)":"";lines.push({title:`${s.name} — ${invTypeLabel(itype)} — ${c.name}${priceNote}`,qty:1,unit:amt,total:amt});if(alreadyInvoicedResFee>0){lines.push({title:`Aiemmin laskutettu varausmaksu`,qty:1,unit:-alreadyInvoicedResFee,total:-alreadyInvoicedResFee});}grossTotal=amt-alreadyInvoicedResFee;}}else{const co=state.companies.find(x=>x.id===inv.companyId);if(co){payerName=co.name||"";payerEmail=co.email||"";payerBusinessId=co.businessId||"";const cust=state.customers.filter(c=>c.sailingId===s.id&&c.billTo==="company"&&c.companyId===co.id).sort((a,b)=>(a.name||"").localeCompare(b.name||""));let gross=isPartial?price:cust.length*price;if(isPartial){lines.push({title:`${s.name} — Osasuoritus`,qty:1,unit:price,total:price});}else{for(const c of cust){let amt=isCredit?-Math.abs(price):price;lines.push({title:`${s.name} — ${invTypeLabel(itype)} — ${c.name}`,qty:1,unit:amt,total:amt});}}const comm=Math.abs(gross)*(Number(co.commissionPct||0)/100);if(comm>0&&!isCredit)lines.push({title:"Välitysprovisio",qty:1,unit:-comm,total:-comm});grossTotal=isCredit?-Math.abs(gross):gross-comm;}}}const creditRef=isCredit?state.invoices.find(x=>x.id===inv.creditRefId):null;const net=(grossTotal||0)/(1+rate),vat=(grossTotal||0)-net;const invNo=nextInvoiceNumber();return{sailing:s,tutkinto:t,isTutkinto,rate,ratePct,payerName,payerEmail,payerBusinessId,lines,grossTotal,net,vat,reference:finnishReference(invNo.replace(/\D/g,"")),invNo,eventName,isReservation:isRes,itype,isCredit,isPartial,creditRef};}
function checkConflicts(date,endDate,startTime,endTime,skipId){const d1=date;const d2=endDate||date;const conflicts=[];const newDays=[];let cur=new Date(d1+"T12:00:00");const end=new Date(d2+"T12:00:00");while(cur<=end){newDays.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}const toMin=t=>{if(!t)return null;const [h,m]=(t||"00:00").split(":").map(Number);return h*60+(m||0);};const s1=toMin(startTime),e1=toMin(endTime)||(s1!==null?s1+60:null);const overlapsTime=(s2str,e2str)=>{if(s1===null||!s2str)return true;const s2=toMin(s2str),e2=toMin(e2str)||(s2+60);return s1<e2&&s2<(e1||s1+60);};for(const s of state.sailings){if(s.id===skipId)continue;const sd1=s.date,sd2=s.endDate||s.date;const sDays=[];let c2=new Date(sd1+"T12:00:00");const e2=new Date(sd2+"T12:00:00");while(c2<=e2){sDays.push(c2.toISOString().slice(0,10));c2.setDate(c2.getDate()+1);}const sharedDays=newDays.filter(d=>sDays.includes(d));if(sharedDays.length>0){if(s.type==="Kurssi"&&Array.isArray(s.sessions)){for(const sess of s.sessions){if(newDays.includes(sess.date)&&overlapsTime(sess.start,sess.end)){conflicts.push(` ${s.name} — kurssipäivä ${sess.date}${sess.start?" klo "+sess.start:""}`);}}}if(s.teoria&&newDays.includes(s.teoria.date)&&overlapsTime(s.teoria.start,s.teoria.end)){conflicts.push(` ${s.name} — teoria ${s.teoria.date}${s.teoria.start?" klo "+s.teoria.start:""}`);}else{if(overlapsTime(s.startTime,s.endTime)){conflicts.push(` ${s.name} (${fmtDate(sd1)}${sd2!==sd1?"–"+fmtDate(sd2):""}${s.startTime?" klo "+s.startTime:""})`);}}}}}for(const t of state.tutkinnot){if(t.id===skipId)continue;if(newDays.includes(t.date)&&overlapsTime(t.startTime,t.endTime)){conflicts.push(` ${t.type}${t.boatType?" ("+t.boatType+")":""} (${fmtDate(t.date)}${t.startTime?" klo "+t.startTime:""})`);}}}return conflicts;}
function monthSummary(month){const rows=state.invoices.filter(x=>String(x.invoiceDate||"").slice(0,7)===month);const s={all:{net:0,vat:0,gross:0,count:0},r255:{net:0,vat:0,gross:0,count:0},r135:{net:0,vat:0,gross:0,count:0}};for(const x of rows){const r=Number(x.vatRatePct||0);const b=(Math.abs(r-25.5)<.2)?"r255":(Math.abs(r-13.5)<.2)?"r135":null;if(b){s[b].net+=Number(x.net||0);s[b].vat+=Number(x.vat||0);s[b].gross+=Number(x.grossTotal||0);s[b].count+=1;}s.all.net+=Number(x.net||0);s.all.vat+=Number(x.vat||0);s.all.gross+=Number(x.grossTotal||0);s.all.count+=1;}return s;}

function renderInvoicing(){const source=state.invoice.source||"sailing",isTutkinto=source==="tutkinto";const inv=computeInvoice();const evOpts=state.sailings.slice().sort((a,b=>(a.date||"").localeCompare(b.date||"")).map(x=>`<option value="${x.id}" ${x.id===state.invoice.sailingId?"selected":""}>${esc(x.name)} (${fmtDate(x.date)})</option>`).join("");const tutkintoOpts=state.tutkinnot.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(x=>`<option value="${x.id}" ${x.id===state.invoice.tutkintoId?"selected":""}>${esc(x.type)}${x.boatType?" ("+esc(x.boatType)+")":""} — ${esc(x.customerName)} — ${fmtDate(x.date)}</option>`).join("");const custOpts=state.customers.slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"")).map(x=>`<option value="${x.id}" ${x.id===state.invoice.customerId?"selected":""}>${esc(x.name)}</option>`).join("");const coOpts=state.companies.slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"")).map(x=>`<option value="${x.id}" ${x.id===state.invoice.companyId?"selected":""}>${esc(x.name)}</option>`).join("");const selS=state.sailings.find(x=>x.id===state.invoice.sailingId);const hasFee=!isTutkinto&&selS&&Number(selS.reservationFee||0)>0;const itype=state.invoice.type||"full",isCredit=itype==="credit",isPartial=itype==="partial";const creditRefOpts=state.invoices.filter(x=>!x.isCredit).sort((a,b)=>(a.invoiceDate||"").localeCompare(b.invoiceDate||"")).map(x=>`<option value="${x.id}" ${x.id===state.invoice.creditRefId?"selected":""}>${esc(x.invoiceNo)} — ${esc(x.payerName)} — ${Number(x.grossTotal||0).toFixed(2)} €</option>`).join("");const invTitle=isCredit?"HYVITYSLASKU":itype==="reservation"?"LASKU — VARAUSMAKSU":itype==="partial"?"LASKU — OSASUORITUS":"LASKU — LOPPULASKU";return`<div class="card noPrint"><div class="card-title">Laskutus</div><div class="card-sub">Luo lasku — valitse laskutettava kohde</div><div class="hr"></div><div class="grid2" style="margin-bottom:14px"><div class="field"><label class="lbl">Laskutettava kohde</label><select data-action="inv-source"><option value="sailing" ${!isTutkinto?"selected":""}> Purjehdus / Kurssi</option><option value="tutkinto" ${isTutkinto?"selected":""}> Tutkinto</option></select></div>${isTutkinto?`<div class="field"><label class="lbl">Tutkinto *</label><select data-action="inv-tutkinto"><option value="">-- valitse tutkinto --</option>${tutkintoOpts}</select></div>`:`<div class="field"><label class="lbl">Tapahtuma *</label><select data-action="inv-sailing">${evOpts}</select></div>`}</div><div class="grid3">${isTutkinto?`<div class="field"><label class="lbl">Malli</label><div style="padding:10px 13px;border:1.5px solid #d1d5db;border-radius:8px;background:#f0f4f8;color:#374151">Asiakaskohtainen</div></div>`:`<div class="field"><label class="lbl">Malli</label><select data-action="inv-mode"><option value="customer" ${state.invoice.mode==="customer"?"selected":""}>Asiakaskohtainen</option><option value="company" ${state.invoice.mode==="company"?"selected":""}>Yrityslasku</option></select></div>`}<div class="field"><label class="lbl">Laskulaji</label><select data-action="inv-type"><option value="full" ${itype==="full"?"selected":""}>Loppulasku</option>${hasFee?`<option value="reservation" ${itype==="reservation"?"selected":""}>Varausmaksu</option>`:""}<option value="partial" ${itype==="partial"?"selected":""}>Osasuoritus</option><option value="credit" ${itype==="credit"?"selected":""}>Hyvityslasku</option></select></div><div class="field"><label class="lbl">Päivä</label><input type="date" data-action="inv-date" value="${esc(state.invoice.invoiceDate)}"></div></div>${(isPartial||isTutkinto)?`<div class="field" style="max-width:240px"><label class="lbl">${isTutkinto?"Summa (€ brutto) *":"Osasuorituksen summa (€ brutto)"}</label><input type="number" min="0" step="0.01" data-field="inv-partial-amount" value="${esc(String(state.invoice.partialAmount||""))}" placeholder="esim. 150.00"></div>`:""}${isCredit?`<div class="field"><label class="lbl">Kohdistetaan laskulle</label><select data-action="inv-credit-ref"><option value="">-- valitse alkuperäinen lasku --</option>${creditRefOpts}</select>${inv.creditRef?`<div class="infobox infobox-amber" style="margin-top:8px">Hyvitetään lasku ${esc(inv.creditRef.invoiceNo)} · ${Number(inv.creditRef.grossTotal||0).toFixed(2)} €</div>`:""}</div>`:""}<div class="row" style="margin-bottom:16px;flex-wrap:wrap;gap:10px"><div style="flex:1;min-width:200px" class="field"><label class="lbl">Asiakas</label><select data-action="inv-customer"><option value="">-- valitse --</option>${custOpts}</select></div>${(!isTutkinto&&state.invoice.mode==="company")?`<div style="flex:1;min-width:200px" class="field"><label class="lbl">Yritys</label><select data-action="inv-company"><option value="">-- valitse --</option>${coOpts}</select></div>`:""}<div style="min-width:160px" class="field"><label class="lbl">Laskunro (seuraava)</label><div style="padding:10px 13px;border:1.5px solid #d1d5db;border-radius:8px;background:#f0f4f8;font-weight:800;color:#0a4272;font-size:15px">${esc(inv.invNo)}</div><div class="small muted" style="margin-top:4px">Viite: ${esc(inv.reference)}</div></div></div></div><div class="card"><div class="invoice-box" id="invoiceBox"><div class="row-between"><div style="line-height:1.7;font-size:14px"><strong style="font-size:16px;color:${isCredit?"#991b1b":"#111827"}">${invTitle}</strong><br>${esc(ISSUER.name)}<br>Y-tunnus ${esc(ISSUER.businessId)}<br><span class="small" style="color:#6b7280">IBAN</span> ${esc(BANK.iban)}<br><span class="small" style="color:#6b7280">BIC</span> ${esc(BANK.bic)}</div><div style="text-align:right;line-height:1.7;font-size:14px"><strong style="color:#0a4272;font-size:15px">Nro: ${esc(inv.invNo)}</strong><br>Päivä: ${esc(state.invoice.invoiceDate)}<br>Viite: <strong>${esc(inv.reference)}</strong>${inv.creditRef?`<br><span class="small muted">Hyvittää: ${esc(inv.creditRef.invoiceNo)}</span>`:""}</div></div><div class="hr"></div><div style="font-size:14px;line-height:1.7"><strong>Maksaja:</strong><br>${esc(inv.payerName||"—")}${inv.payerBusinessId?`<div class="small muted">Y-tunnus ${esc(inv.payerBusinessId)}</div>`:""}${inv.payerEmail?`<div><a href="mailto:${esc(inv.payerEmail)}" style="color:#1e40af">${esc(inv.payerEmail)}</a></div>`:""}</div><div class="hr"></div><table class="table"><thead><tr><th>Kuvaus</th><th class="r">Kpl</th><th class="r">€/kpl</th><th class="r">Yht</th></tr></thead><tbody>${inv.lines.length===0?`<tr><td colspan="4" class="muted">Valitse tapahtuma ja maksaja.</td></tr>`:inv.lines.map(l=>`<tr><td>${esc(l.title)}</td><td class="r">${l.qty}</td><td class="r">${Number(l.unit).toFixed(2)}</td><td class="r" style="${Number(l.total)<0?"color:#991b1b;font-weight:700":""}">${Number(l.total).toFixed(2)}</td></tr>`).join("")}</tbody></table><div class="hr"></div><table class="table" style="max-width:280px;margin-left:auto"><tr><td>Netto</td><td class="r">${Number(inv.net||0).toFixed(2)} €</td></tr><tr><td>ALV ${inv.ratePct}%</td><td class="r">${Number(inv.vat||0).toFixed(2)} €</td></tr><tr><td><strong>Yhteensä</strong></td><td class="r"><strong style="color:${isCredit?"#991b1b":"#0a4272"};font-size:18px">${Number(inv.grossTotal||0).toFixed(2)} €</strong></td></tr></table></div><div class="hr noPrint"></div><div class="row noPrint"><button class="btn btn-primary" data-action="print">Tulosta / PDF</button><button class="btn btn-secondary" data-action="email-invoice">Lähetä sähköpostilla</button><button class="btn btn-secondary" data-action="open-register">Laskurekisteri</button><button class="btn btn-teal" data-action="save-invoice">+ Tallenna rekisteriin</button></div></div>`;}

// KORJAUS: renderDashboard, renderCalendar, renderSailings jne. - sama sisältö
function renderDashboard(){const totalConf=state.customers.filter(c=>c.reservationStatus==="paid").length;const totalPend=state.customers.filter(c=>c.reservationStatus==="pending").length;const totalRes=state.customers.filter(c=>c.reservationStatus==="reserve").length;const nextDate=(s)=>{if(Array.isArray(s.sessions)&&s.sessions.length>0){const fut=s.sessions.filter(x=>(x.date||"")>=today()).sort((a,b)=>(a.date||"").localeCompare(b.date||""));if(fut.length>0)return fut[0].date;}return s.date||"";};const upcoming=state.sailings.filter(s=>{const hasFutureSessions=Array.isArray(s.sessions)&&s.sessions.some(sess=>(sess.date||"")>=today());const isFuture=(s.date||"")>=today()||(s.endDate&&s.endDate>=today());if(!isFuture&&!hasFutureSessions)return false;return enrolledCount(s.id)<Number(s.maxPersons||0)&&Number(s.maxPersons||0)>0;}).sort((a,b)=>nextDate(a).localeCompare(nextDate(b))).slice(0,8);const upcomingTutkinnot=state.tutkinnot.filter(t=>{if((t.date||"")<today())return false;const enrolled=state.customers.filter(c=>c.tutkintoId===t.id).length;const max=Number(t.maxPersons||0);return max===0||enrolled<max;}).sort((a,b)=>(a.date||"").localeCompare(b.date||"")).slice(0,5);return`<div class="card"><div class="row-between"><div><div class="card-title">Dashboard</div><div class="card-sub">${CONFIG_READY?"Synkronoitu Firebaseen · data turvassa":"Demo-tila · ei tallennusta"}</div></div><div class="row"><button class="btn btn-secondary noPrint" data-action="export-json">Varmuuskopio</button><label class="btn btn-secondary noPrint" style="cursor:pointer">Palauta<input type="file" accept="application/json" data-action="restore-json" style="display:none"></label></div></div><div class="stats-grid"><div class="stat-card"><div class="stat-label">Purjehdukset</div><div class="stat-val">${state.sailings.length}</div></div><div class="stat-card"><div class="stat-label">Asiakkaat</div><div class="stat-val">${state.customers.length}</div></div><div class="stat-card"><div class="stat-label">Vahvistettu</div><div class="stat-val" style="color:#166534">${totalConf}</div></div><div class="stat-card"><div class="stat-label">Odottaa</div><div class="stat-val" style="color:#991b1b">${totalPend}</div></div><div class="stat-card"><div class="stat-label">Varapaikalla</div><div class="stat-val" style="color:#92400e">${totalRes}</div></div><div class="stat-card"><div class="stat-label">Laskut</div><div class="stat-val">${state.invoices.length}</div></div><div class="stat-card"><div class="stat-label">Tutkinnot</div><div class="stat-val" style="color:#1e40af">${state.tutkinnot.length}</div></div></div>${totalPend>0?`<div class="infobox infobox-amber" style="cursor:pointer" data-action="show-pending"> ${totalPend} asiakkaalla varausmaksu maksamatta — <strong>näytä</strong></div>`:""}${upcoming.length>0?`<div class="hr"></div><div style="font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#6b7280;margin-bottom:10px"> Tulevat purjehdukset — tilaa</div>${upcoming.map(s=>{const max=Number(s.maxPersons||0),enrolled=enrolledCount(s.id),conf=confirmedCount(s.id),pend=pendingCount(s.id);const isCourse=s.type==="Kurssi",hasSess=isCourse&&Array.isArray(s.sessions)&&s.sessions.length>0;const nextSess=hasSess?s.sessions.filter(x=>(x.date||"")>=today()).sort((a,b)=>(a.date||"").localeCompare(b.date||""))[0]:null;const isMultiDay=s.endDate&&s.endDate>s.date;const dateLabel=nextSess?`Seuraava: ${fmtDate(nextSess.date)}`:isMultiDay?`${fmtDate(s.date)}–${fmtDate(s.endDate)}`:fmtDate(s.date);const reittiLabel=s.reitti?` · ${esc(s.reitti)}`:"";return`<div class="item"><div><h3>${esc(s.name||"")} <span class="pill">${esc(s.type||"")}</span></h3><div class="meta">${dateLabel}${reittiLabel} · ✓${conf}${pend>0?" ●"+pend:""} / ${max} · <span style="color:#166534;font-weight:700">${max-enrolled} vapaata</span></div></div><button class="btn btn-primary btn-sm" data-action="dash-open" data-id="${s.id}" data-type="sailing">Avaa</button></div>`;}).join("")}`:`<div class="infobox infobox-blue" style="margin-top:12px">✓ Ei tulevia purjehduksia joissa on tilaa.</div>`}${upcomingTutkinnot.length>0?`<div class="hr"></div><div style="font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#6b7280;margin-bottom:10px"> Tulevat tutkinnot — tilaa</div>${upcomingTutkinnot.map(t=>{const max=Number(t.maxPersons||0),typeKey=(t.type||"").split(" ")[0];const enrolled=state.customers.filter(c=>c.tutkintoId===t.id).length;const enrolledStr=max>0?`${enrolled}/${max} · ${max-enrolled} vapaata`:`${enrolled} osallistujaa`;return`<div class="item"><div><h3><span class="tutkinto-type-badge tutkinto-${esc(typeKey)}">${esc(t.type||"")}</span></h3><div class="meta">${fmtDate(t.date)}${t.startTime?" klo "+t.startTime:""}${t.location?" · "+esc(t.location):""} · <span style="color:#166534;font-weight:700">${enrolledStr}</span></div></div><button class="btn btn-primary btn-sm" data-action="dash-open" data-id="${t.id}" data-type="tutkinto">Avaa</button></div>`;}).join("")}`:""}`;}`

// KORJAUS BIND():SSA - Muutos alla:
function bind(){document.querySelectorAll("[data-tab]").forEach(b=>{b.onclick=()=>{state.tab=b.dataset.tab;render();};});document.querySelector('[data-action="restore-json"]')?.addEventListener("change",async(e)=>{const file=e.target.files?.[0];if(!file)return;try{const text=await file.text(),data=JSON.parse(text);if(!confirm("Palautus korvaa nykyiset tiedot. Jatketaanko?"))return;if(CONFIG_READY&&db){const cols=["customers","sailings","companies","invoices","tutkinnot"];for(const col of cols){const items=Array.isArray(data[col])?data[col]:[];for(const item of items){const{id,...rest}=item;await fsSet(col,id||genId("X"),rest);}}alert("Palautettu Firebaseen ✓");}else{state.customers=Array.isArray(data.customers)?data.customers:[];state.sailings=Array.isArray(data.sailings)?data.sailings:[];state.companies=Array.isArray(data.companies)?data.companies:[];state.invoices=Array.isArray(data.invoices)?data.invoices:[];state.tutkinnot=Array.isArray(data.tutkinnot)?data.tutkinnot:[];alert("Palautettu demo-tilaan ✓");render();}}catch(err){alert("Palautus epäonnistui: tiedosto ei ole kelvollinen JSON.");}finally{e.target.value="";}});document.querySelector('[data-action="sailing-type-changed"]')?.addEventListener("change",()=>{const d=state.sailingDraft||{};const nameEl=document.querySelector('[data-field="name"]');const reittiEl=document.querySelector('[data-field="reitti"]');const dateEl=document.querySelector('[data-field="date"]');const endDateEl=document.querySelector('[data-field="endDate"]');const startEl=document.querySelector('[data-field="startTime"]');const endEl=document.querySelector('[data-field="endTime"]');const typeEl=document.querySelector('[data-field="sailing-type-live"]');if(nameEl)d.name=nameEl.value;if(reittiEl)d.reitti=reittiEl.value;if(dateEl)d.date=dateEl.value;if(endDateEl)d.endDate=endDateEl.value;if(startEl)d.startTime=startEl.value;if(endEl)d.endTime=endEl.value;if(typeEl)d.type=typeEl.value;state.sailingDraft=d;render();});document.querySelector('[data-action="multiday-date-changed"]')?.addEventListener("change",()=>{const d=state.sailingDraft||{};const nameEl=document.querySelector('[data-field="name"]');const reittiEl=document.querySelector('[data-field="reitti"]');const dateEl=document.querySelector('[data-field="date"]');const endDateEl=document.querySelector('[data-field="endDate"]');const startEl=document.querySelector('[data-field="startTime"]');const endEl=document.querySelector('[data-field="endTime"]');const typeEl=document.querySelector('[data-field="sailing-type-live"]');if(nameEl)d.name=nameEl.value;if(reittiEl)d.reitti=reittiEl.value;if(dateEl)d.date=dateEl.value;if(endDateEl)d.endDate=endDateEl.value;if(startEl)d.startTime=startEl.value;if(endEl)d.endTime=endEl.value;if(typeEl)d.type=typeEl.value;state.sailingDraft=d;render();});document.querySelector('[data-action="search-customers"]')?.addEventListener("input",e=>{state.searchCustomers=e.target.value;render();});document.querySelector('[data-action="search-sailings"]')?.addEventListener("input",e=>{state.searchSailings=e.target.value;render();});document.querySelector('[data-action="search-tutkinnot"]')?.addEventListener("input",e=>{state.searchTutkinnot=e.target.value;render();});document.querySelector('[data-action="inv-source"]')?.addEventListener("change",e=>{state.invoice.source=e.target.value;state.invoice.type="full";state.invoice.partialAmount="";state.invoice.creditRefId="";render();});document.querySelector('[data-action="inv-tutkinto"]')?.addEventListener("change",e=>{state.invoice.tutkintoId=e.target.value;render();});document.querySelector('[data-action="inv-sailing"]')?.addEventListener("change",e=>{state.invoice.sailingId=e.target.value;state.invoice.type="full";state.invoice.creditRefId="";render();});document.querySelector('[data-action="inv-mode"]')?.addEventListener("change",e=>{state.invoice.mode=e.target.value;render();});document.querySelector('[data-action="inv-type"]')?.addEventListener("change",e=>{state.invoice.type=e.target.value;render();});document.querySelector('[data-action="inv-customer"]')?.addEventListener("change",e=>{state.invoice.customerId=e.target.value;render();});document.querySelector('[data-action="inv-company"]')?.addEventListener("change",e=>{state.invoice.companyId=e.target.value;render();});document.querySelector('[data-action="inv-date"]')?.addEventListener("change",e=>{state.invoice.invoiceDate=e.target.value;render();});// ===== KORJAUS: Poistettiin render() kutsu - vain päivitä state =====
document.querySelector('[data-field="inv-partial-amount"]')?.addEventListener("input",e=>{if(!state.invoice)state.invoice={};state.invoice.partialAmount=e.target.value;});// ===== KORJAUS LOPPUU =====
document.querySelector('[data-action="inv-credit-ref"]')?.addEventListener("change",e=>{state.invoice.creditRefId=e.target.value;render();});document.querySelector('[data-action="reg-month"]')?.addEventListener("input",e=>{state.registerMonth=(e.target.value||"").trim();});document.querySelector('[data-field="qnc-name"]')?.addEventListener("input",e=>{if(!state.dashNewCustomer)state.dashNewCustomer={};state.dashNewCustomer.name=e.target.value;render();});document.querySelector('[data-field="qnc-phone"]')?.addEventListener("input",e=>{if(!state.dashNewCustomer)state.dashNewCustomer={};state.dashNewCustomer.phone=e.target.value;});document.querySelector('[data-field="qnc-email"]')?.addEventListener("input",e=>{if(!state.dashNewCustomer)state.dashNewCustomer={};state.dashNewCustomer.email=e.target.value;});document.querySelector('[data-field="qnc-status"]')?.addEventListener("change",e=>{if(!state.dashNewCustomer)state.dashNewCustomer={};state.dashNewCustomer.status=e.target.value;});document.querySelectorAll('[data-action="reg-paid"]').forEach(cb=>{cb.onchange=async()=>{const x=state.invoices.find(z=>z.id===cb.dataset.id);if(!x)return;x.paid=!!cb.checked;if(x.paid){const pd=prompt("Maksupäivä (YYYY-MM-DD):",x.paidDate||today());if(!pd){x.paid=false;x.paidDate="";}else{x.paidDate=pd;}}else x.paidDate="";await fsSet("invoices",x.id,x);render();};});document.querySelectorAll("[data-action]").forEach(el=>{if(el.tagName==="INPUT"&&el.type==="checkbox")return;if(el.tagName==="A"&&el.dataset.action==="gcal-mark"){el.onclick=async()=>{const sailingId=el.dataset.id,idxRaw=el.dataset.idx;const idx=(idxRaw!==""&&idxRaw!=null)?Number(idxRaw):null;setTimeout(()=>markGcalAdded(sailingId,idx),300);};return;}if(el.dataset.action==="gcal-unmark"){el.onclick=async()=>{const sailingId=el.dataset.id,idxRaw=el.dataset.idx;const s=state.sailings.find(x=>x.id===sailingId);if(!s)return;const gcKey=idxRaw!==""?`gcal_${sailingId}_${idxRaw}`:`gcal_${sailingId}`;delete s[gcKey];delete s[gcKey+"_date"];await fsSet("sailings",sailingId,s);render();};return;}el.onclick=async(e)=>{e.stopPropagation();const a=el.dataset.action,itemId=el.dataset.id;const idx=(el.dataset.idx!==""&&el.dataset.idx!=null)?Number(el.dataset.idx):null;if(a==="sign-out"){await signOut(auth);return;}if(a==="set-group"){state.sailingGroup=itemId;render();return;}if(a==="cal-nav"){state.calendarMonth=el.dataset.month;render();return;}if(a==="cal-today"){state.calendarMonth=today().slice(0,7);render();return;}if(a==="toggle-block"){const date=el.dataset.date;const existing=state.blockedDays.find(b=>b.date===date);if(existing){await fsDel("blockedDays",existing.id);}else{const note=prompt("Varauksen syy (valinnainen):","");await fsAdd("blockedDays",{date,note});}return;}};});};
