<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="J Sailing"/>
<meta name="theme-color" content="#0a1628"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-512.png"/>
<title>J Sailing V40.3 — Hallintapaneeli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* KAIKKI ALKUPERÄISET TYYLIT V9.11-VERSIOSTA */
:root{
  --ocean-surf:#0a4272;--text:#111827;--text-muted:#374151;--text-light:#6b7280;
  --green:#166534;--green-bg:#dcfce7;--green-border:#86efac;
  --red:#991b1b;--red-bg:#fee2e2;--red-border:#fca5a5;
  --amber:#92400e;--amber-bg:#fef3c7;--amber-border:#fcd34d;
  --blue-accent:#1e40af;--blue-bg:#dbeafe;
  --gold:#92400e;--gold-light:#b45309;
  --white:#111827;--line:#e5e7eb;--line-bright:#d1d5db;
  --card-bg:#ffffff;--card-border:#e5e7eb;
  --shadow:0 1px 3px rgba(0,0,0,.12);--radius:12px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',system-ui,sans-serif;background:#f3f4f6;min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#ffffff;border-bottom:2px solid #0a4272;padding:0 12px;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:50;}
.nav-tabs{background:#ffffff;border-bottom:1.5px solid #d1d5db;display:flex;overflow-x:auto;}
.nav-tab{flex:1;padding:12px 8px;border:none;background:transparent;font-weight:600;cursor:pointer;}
.nav-tab.active{color:#0a4272;border-bottom:2px solid #0a4272;}
.main-content{flex:1;max-width:1080px;margin:0 auto;width:100%;padding:20px 16px;}
.card{background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:16px;}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer;}
.btn-primary{background:#0a4272;color:#fff;}
.btn-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.table{width:100%;border-collapse:collapse}
.table td{border-top:1px solid #e5e7eb;padding:9px 10px;font-size:13px;}
.r{text-align:right}
.overlay{position:fixed;inset:0;background:rgba(5,12,24,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;}
.modal{background:#ffffff;border-radius:20px;width:min(860px,100%);max-height:92vh;overflow:auto;padding:20px;}
@media print{.noPrint{display:none!important}}
</style>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63UO0", authDomain: "jsailing-f716c.firebaseapp.com", projectId: "jsailing-f716c", storageBucket: "jsailing-f716c.firebasestorage.app", messagingSenderId: "543523103696", appId: "1:543523103696:web:439a312efa6aec398a8fd5" };
const ALLOWED_EMAIL = "jacke.seilaa@gmail.com";
const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);

const state = {
  tab: "dashboard", user: null,
  invoices: [], previewInvoiceId: null
};

// JÄRJESTETTY RESKONTRA & POISTO-NAPPI
function renderReskontra() {
  const sortedInvoices = [...state.invoices].sort((a, b) => (b.invoiceNo || "").localeCompare(a.invoiceNo || ""));
  return `
    <div class="card">
      <h2 style="font-family:'Cormorant Garamond',serif;color:#0a4272;font-size:26px">Reskontra</h2>
      <table class="table">
        ${sortedInvoices.map(x => `
          <tr>
            <td><b>${x.invoiceNo || "---"}</b></td>
            <td>${x.payerName || "Nimetön"}</td>
            <td class="r">${(x.grossTotal || 0).toFixed(2)} €</td>
            <td class="r">
              <button class="btn btn-primary" data-action="preview-invoice" data-id="${x.id}">👁</button>
              <button class="btn btn-danger" data-action="delete-invoice" data-id="${x.id}">✕</button>
            </td>
          </tr>
        `).join('')}
      </table>
    </div>`;
}

// LASKUN ESIKATSELU QR- JA VIIVAKOODILLA
function renderInvoicePreviewModal() {
  const inv = state.invoices.find(x => x.id === state.previewInvoiceId);
  if (!inv) return "";
  return `
    <div class="overlay" onclick="state.previewInvoiceId=null;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <div style="text-align:center">
          <h3>Lasku ${inv.invoiceNo}</h3>
          <div style="margin:20px 0">
            <canvas id="barcodeCanvas"></canvas>
            <div style="margin-top:20px">
              <canvas id="qrcodeCanvas"></canvas>
            </div>
          </div>
          <button class="btn btn-primary" onclick="state.previewInvoiceId=null;render()">Sulje</button>
        </div>
      </div>
    </div>`;
}

function render() {
  const root = document.getElementById("app");
  if (!state.user) {
    root.innerHTML = `<div style="padding:100px;text-align:center"><button class="btn btn-primary" id="loginBtn">Kirjaudu sisään (Google)</button></div>`;
    document.getElementById("loginBtn")?.addEventListener("click", () => signInWithPopup(auth, new GoogleAuthProvider()));
    return;
  }

  root.innerHTML = `
    <div class="app">
      <div class="topbar"><div style="font-family:'Cormorant Garamond',serif;font-weight:700">J Sailing V40.3</div></div>
      <div class="nav-tabs">
        <button class="nav-tab ${state.tab==='dashboard'?'active':''}" onclick="state.tab='dashboard';render()">Reskontra</button>
      </div>
      <main class="main-content">
        ${state.tab === 'dashboard' ? renderReskontra() : ''}
      </main>
      ${state.previewInvoiceId ? renderInvoicePreviewModal() : ''}
    </div>`;

  // VIIVAKOODIEN GENERÄÄTTI
  if (state.previewInvoiceId) {
    const inv = state.invoices.find(x => x.id === state.previewInvoiceId);
    setTimeout(() => {
      const bc = document.getElementById("barcodeCanvas");
      const qc = document.getElementById("qrcodeCanvas");
      if (bc && inv) JsBarcode(bc, inv.reference || "0", { format: "CODE128", height: 50 });
      if (qc && inv) {
        const qrData = `BCD\n001\n1\nFI6211323000427743\n\n${(inv.grossTotal || 0).toFixed(2)}\nEUR\n\n\n${inv.reference}`;
        QRCode.toCanvas(qc, qrData, { width: 150 });
      }
    }, 100);
  }
}

// EVENT HANDLERIT
document.addEventListener("click", async (e) => {
  const action = e.target.closest("[data-action]")?.dataset.action;
  const id = e.target.closest("[data-id]")?.dataset.id;
  if (action === "preview-invoice") { state.previewInvoiceId = id; render(); }
  if (action === "delete-invoice" && confirm("Poistetaanko lasku pysyvästi?")) {
    await deleteDoc(doc(db, "invoices", id));
  }
});

// ALUSTUS
onAuthStateChanged(auth, u => {
  if (u && u.email === ALLOWED_EMAIL) {
    state.user = u;
    onSnapshot(collection(db, "invoices"), s => {
      state.invoices = s.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    });
  } else {
    state.user = null;
    render();
  }
});
</script>
</body>
</html>
