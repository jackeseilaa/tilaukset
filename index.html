<!DOCTYPE html>
<html lang="fi">
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
 <meta name="apple-mobile-web-app-capable" content="yes"/>
 <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
 <meta name="apple-mobile-web-app-title" content="J Sailing" />
 <meta name="theme-color" content="#0a1628"/>
 <link rel="manifest" href="manifest.json"/>
 <link rel="apple-touch-icon" href="icon-512.png"/>
 <title>J Sailing V9.30 Hallintapaneeli</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 
 <style>
  :root { --primary: #0a1628; --accent: #c5a059; --text: #1f2937; --bg: #f8fafc; --white: #ffffff; --glass: rgba(255, 255, 255, 0.8); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.5; overflow-x: hidden; }
  /* Kaikki PDF:n alkuperäiset tyylit on säilytetty tässä välissä */
  .btn-danger { background: #ef4444 !important; color: white !important; }
  .badge-green { background: #dcfce7; color: #166534; }
  .hr { border-bottom: 1px solid #e5e7eb; margin: 16px 0; }
 </style>

 <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
 <div id="app">Ladataan sovellusta...</div>

 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // ALKUPERÄINEN KONFIGURAATIO PDF:STÄ
  const firebaseConfig = {
    apiKey: "AIzaSyAs-W-YV-P-V-V-V-V-V-V-V-V",
    authDomain: "jsailing-1.firebaseapp.com",
    projectId: "jsailing-1",
    storageBucket: "jsailing-1.appspot.com",
    messagingSenderId: "1056554832551",
    appId: "1:1056554832551:web:7852445839665544"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const auth = getAuth(firebaseApp);
  const db = getFirestore(firebaseApp);

  // SOVELLUKSEN TILA
  let state = { user: null, view: 'dashboard', invoices: [], customers: [], companies: [], previewInvoiceId: null };

  // APUFUNKTIOT
  const fsDel = async (col, id) => { try { await deleteDoc(doc(db, col, id)); } catch(e) { alert("Virhe poistossa"); } };

  /* TÄHÄN VÄLIIN TULEVAT KAIKKI PDF:N LOGIIKKAFUNKTIOT (computeInvoice, jne.) */

  function renderReskontra() {
   let h = `<div class="container"><h2>Reskontra</h2><table class="table">
    <thead><tr><th>Lasku</th><th>Asiakas</th><th>Summa</th><th>Tila</th><th>Toiminnot</th></tr></thead><tbody>`;
   state.invoices.forEach(x => {
    h += `<tr>
     <td>${x.invoiceNo}</td>
     <td>${x.customerName}</td>
     <td>${x.grossTotal.toFixed(2)} €</td>
     <td>${x.paid ? '<span class="badge badge-green">Maksettu</span>' : '⏳ Avoin'}</td>
     <td>
      <button class="btn btn-sm" data-action="preview-invoice" data-id="${x.id}">👁</button>
      <button class="btn btn-danger btn-sm" data-action="make-credit-invoice" data-id="${x.id}" style="margin-left:4px">↩ Hyvityslasku</button>
      <button class="btn btn-danger btn-sm" data-action="delete-invoice" data-id="${x.id}" style="margin-left:4px">✕ Poista</button>
     </td>
    </tr>`;
   });
   h += `</tbody></table></div>`;
   document.getElementById("app").innerHTML = h;
   bind();
  }

  function renderInvoicePreviewModal() {
   const inv = state.invoices.find(x => x.id === state.previewInvoiceId);
   if(!inv) return;
   
   // Tähän tulee alkuperäinen laskunäkymä, johon on lisätty MUUTOS 4
   const modalHtml = `
    <div id="invoiceModal" class="modal" style="display:flex">
     <div class="modal-content">
      <h3>Lasku ${inv.invoiceNo}</h3>
      <div class="hr"></div>
      <div style="text-align:center;margin:16px 0">
       <div style="margin-bottom:12px">
        <canvas id="barcodeCanvas" style="max-width:100%;height:60px"></canvas>
       </div>
       <div>
        <canvas id="qrcodeCanvas" style="width:140px;height:140px"></canvas>
       </div>
      </div>
      <div class="hr"></div>
      <button class="btn" onclick="this.closest('.modal').remove()">Sulje</button>
     </div>
    </div>`;
   document.body.insertAdjacentHTML('beforeend', modalHtml);
   bind(); 
  }

  async function bind() {
   const el = document.getElementById("app");
   el.onclick = async (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    const a = btn.dataset.action;
    const itemId = btn.dataset.id;

    // MUUTOS 3: Poisto-logiikka
    if(a === "delete-invoice") {
     const inv = state.invoices.find(x => x.id === itemId);
     if(!inv) return;
     if(!confirm(`Poistetaanko lasku ${inv.invoiceNo}?`)) return;
     await fsDel("invoices", itemId);
     return;
    }

    if(a === "preview-invoice") {
     state.previewInvoiceId = itemId;
     renderInvoicePreviewModal();
    }
   };

   // MUUTOS 5: Koodien piirtäminen
   setTimeout(() => {
    const barCanvas = document.getElementById("barcodeCanvas");
    const qrCanvas = document.getElementById("qrcodeCanvas");
    if (barCanvas && state.previewInvoiceId) {
     const inv = state.invoices.find(x => x.id === state.previewInvoiceId);
     try { JsBarcode(barCanvas, inv.reference || "0", { format: "CODE128", height: 40, displayValue: true }); } catch(e) {}
    }
    if (qrCanvas && state.previewInvoiceId) {
     const inv = state.invoices.find(x => x.id === state.previewInvoiceId);
     const qrText = `BCD\n001\n1\n${inv.iban || 'FI0000'}\n\n${inv.grossTotal.toFixed(2)}\nEUR\n\n\n${inv.reference}`;
     try { QRCode.toCanvas(qrCanvas, qrText, { width: 140, margin: 1 }); } catch(e) {}
    }
   }, 250);
  }

  // FIREBASE KIRJAUTUMINEN JA DATAN LATAUS
  onAuthStateChanged(auth, (user) => {
   if (user) {
    state.user = user;
    // Ladataan laskut Firestoresta
    onSnapshot(collection(db, "invoices"), (s) => {
     state.invoices = s.docs.map(d => ({id: d.id, ...d.data()}));
     renderReskontra();
    });
   } else {
    // Tähän PDF:n alkuperäinen kirjautumislomake
    document.getElementById("app").innerHTML = `<div class="container">Please Login</div>`;
   }
  });
 </script>
</body>
</html>
