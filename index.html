<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<body>
<div id="app"></div>
<script type="module">
/* ... (Firebase-alustukset ja apufunktiot pysyvät samoina) ... */

// (Lisää tähän bind-funktiosi)
function bind() {
  document.body.onclick = async (e) => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    const a = el.dataset.action;
    const itemId = el.dataset.id;

    /* ... muut toiminnot ... */

    if(a==="delete-register"){if(!confirm("Poistetaanko lasku rekisteristä?"))return;await fsDel("invoices",itemId);render();return;}

    // MUUTOS 3: Delete-invoice handler lisätty
    if(a==="delete-invoice"){
      const inv=state.invoices.find(x=>x.id===itemId);
      if(!inv)return;
      if(!confirm(`Poistetaanko lasku ${inv.invoiceNo}?`))return;
      await deleteDoc(doc(db, "invoices", itemId)); // Käytetään deleteDoc-funktiota
      render();
      return;
    }

    /* ... loput klikkauskäsittelijästä ... */
  };

  // MUUTOS 5: Viivakoodi ja QR-koodi laskutulosteelle (setTimeout bind-funktion lopussa)
  setTimeout(()=>{
    const barCanvas=document.getElementById("barcodeCanvas");
    const qrCanvas=document.getElementById("qrcodeCanvas");
    if(barCanvas){
      try{JsBarcode(barCanvas,state.previewInvoiceId?computeInvoice().reference:"",{format:"CODE128",width:2,height:50});}catch(e){}
    }
    if(qrCanvas&&state.previewInvoiceId){
      const inv=computeInvoice();
      const qrText=`BCD\n001\n1\n${ISSUER.iban}\n\n${inv.grossTotal.toFixed(2)}\nEUR\n\n\n${inv.reference}`;
      try{QRCode.toCanvas(qrCanvas,qrText,{width:140,margin:1,color:{dark:"#000",light:"#fff"}});}catch(e){}
    }
  },200);
}

// MUUTOS 2: Poista-nappi lisätty renderReskontra-funktioon
function renderReskontra(){
  /* ... suodatus ja alkuosa ... */
  // Etsi koodista kohta, jossa renderöidään painikkeet ja korvaa se tällä:
  // <button class="btn btn-danger btn-sm" data-action="make-credit-invoice" data-id="${x.id}" style="margin-left:4px">↩ Hyvityslasku</button><button class="btn btn-danger btn-sm" data-action="delete-invoice" data-id="${x.id}" style="margin-left:4px">✕ Poista</button>
}

// MUUTOS 4: Canvaksen paikka renderInvoicePreviewModal-funktiossa
function renderInvoicePreviewModal(){
  const inv = state.invoices.find(x => x.id === state.previewInvoiceId);
  if(!inv) return "";
  
  return `
    <div class="modal">
      <div class="modal-head">...</div>
      <div class="modal-body invoice-box">
        </table>
        
        <div class="hr"></div>
        <div style="text-align:center;margin:16px 0">
          <div style="margin-bottom:12px">
            <canvas id="barcodeCanvas" style="max-width:100%;height:60px"></canvas>
          </div>
          <div>
            <canvas id="qrcodeCanvas" style="width:140px;height:140px"></canvas>
          </div>
        </div>
        
        <div class="hr"></div>
        <div style="font-size:13px;color:#6b7280">${inv.paid? '<span class="badge badge-green">✓ Maksettu</span>' : '...'}</div>
      </div>
    </div>
  `;
}

/* ... (loput skriptistä pysyvät ennallaan) ... */
</script>
