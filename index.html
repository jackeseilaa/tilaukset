        const year = new Date().getFullYear(); 
        let max = 0; 
        for (const inv of state.invoices) {
            const m = String(inv.invoiceNo || "").match(/^JS-(\d{4})-(\d+)$/);

        } 
        return `JS-${year}-${String(max+1).padStart(3,"0")}`;
    }
