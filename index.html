<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="J Sailing" />
    <meta name="theme-color" content="#0a1628"/>
    <link rel="manifest" href="manifest.json"/>
    <link rel="apple-touch-icon" href="icon-512.png"/>
    <title>J Sailing Hallintapaneeli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS-tyylit tässä (pidetty ennallaan) */
        :root { --primary: #0a1628; --accent: #c5a059; --text: #1f2937; --bg: #f8fafc; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 4px 8px; font-size: 12px; }
        .hr { border-bottom: 1px solid #e5e7eb; margin: 16px 0; }
        /* ... muut tyylit ... */
    </style>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        // Oletetaan että perusrakenteet (state, ISSUER, jne.) ovat määriteltynä
        // Tässä keskitytään muutettuihin funktioihin

        function renderReskontra() {
            let html = `<h2>Reskontra</h2><table class="table"><thead><tr><th>Lasku</th><th>Asiakas</th><th>Summa</th><th>Tila</th><th>Toiminnot</th></tr></thead><tbody>`;
            state.invoices.forEach(x => {
                html += `<tr>
                    <td>${x.invoiceNo}</td>
                    <td>${x.customerName}</td>
                    <td>${x.grossTotal.toFixed(2)} €</td>
                    <td>${x.paid ? '✅ Maksettu' : '⏳ Avoin'}</td>
                    <td>
                        <button class="btn btn-sm" data-action="preview-invoice" data-id="${x.id}">👁 Katso</button>
                        <button class="btn btn-danger btn-sm" data-action="make-credit-invoice" data-id="${x.id}" style="margin-left:4px">↩ Hyvityslasku</button>
                        <button class="btn btn-danger btn-sm" data-action="delete-invoice" data-id="${x.id}" style="margin-left:4px">✕ Poista</button>
                    </td>
                </tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById("app").innerHTML = html;
            bind();
        }

        function renderInvoicePreviewModal() {
            const inv = computeInvoice(); // Laskee laskun tiedot
            let html = `<div class="modal">
                <div class="modal-content">
                    <h3>Lasku ${inv.invoiceNo}</h3>
                    <table style="width:100%">
                        </table>

                    <div class="hr"></div>
                    <div style="text-align:center;margin:16px 0">
                        <div style="margin-bottom:12px">
                            <canvas id="barcodeCanvas" style="max-width:100%;height:60px"></canvas>
                        </div>
                        <div>
                            <canvas id="qrcodeCanvas" style="width:140px;height:140px"></canvas>
                        </div>
                    </div>

                    <div class="hr"></div>
                    <div style="font-size:13px;color:#6b7280">
                        ${inv.paid ? `<span class="badge badge-green">✓ Maksettu</span>` : `Odottaa maksua`}
                    </div>
                    <button class="btn" onclick="closeModal()">Sulje</button>
                </div>
            </div>`;
            // Renderöinti DOMiin...
        }

        function bind() {
            const el = document.getElementById("app");
            el.onclick = async (e) => {
                const btn = e.target.closest("button");
                if (!btn) return;
                const a = btn.dataset.action;
                const itemId = btn.dataset.id;

                if (a === "delete-register") {
                    if (!confirm("Poistetaanko lasku rekisteristä?")) return;
                    await fsDel("invoices", itemId);
                    render();
                    return;
                }

                // Muutos 3: Delete-invoice handler
                if (a === "delete-invoice") {
                    const inv = state.invoices.find(x => x.id === itemId);
                    if (!inv) return;
                    if (!confirm(`Poistetaanko lasku ${inv.invoiceNo}?`)) return;
                    await fsDel("invoices", itemId);
                    render();
                    return;
                }
            };

            // Muutos 5: Viivakoodin ja QR-koodin generoiminen bind-funktion lopussa
            setTimeout(() => {
                const barCanvas = document.getElementById("barcodeCanvas");
                const qrCanvas = document.getElementById("qrcodeCanvas");
                if (barCanvas) {
                    try {
                        // Käytetään laskun viitenumeroa viivakoodiin
                        JsBarcode(barCanvas, state.previewInvoiceId ? computeInvoice().reference : "", {
                            format: "CODE128",
                            width: 2,
                            height: 50,
                            displayValue: true
                        });
                    } catch (e) { console.error("Barcode error", e); }
                }
                if (qrCanvas && state.previewInvoiceId) {
                    const inv = computeInvoice();
                    // Suomalainen tilisiirto-QR (EPC-standardin mukainen tekstimuoto)
                    const qrText = `BCD\n001\n1\n${ISSUER.iban}\n\n${inv.grossTotal.toFixed(2)}\nEUR\n\n\n${inv.reference}`;
                    try {
                        QRCode.toCanvas(qrCanvas, qrText, {
                            width: 140,
                            margin: 1,
                            color: { dark: "#000", light: "#fff" }
                        });
                    } catch (e) { console.error("QR error", e); }
                }
            }, 200);
        }

        // Muu sovelluslogiikka (render, fsDel, computeInvoice jne.)
    </script>
</body>
</html>
