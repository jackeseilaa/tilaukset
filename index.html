function finnishReference(digits){

function gcalUrl(title,date,startTime,endTime,description,endDate){
  const fmt=(d,t)=>{if(!t)return d.replace(/-/g,"");const[h,m]=t.split(":").map(s=>s.padStart(2,"0"));return d.replace(/-/g,"")+"T"+h+(m||"00")+"00";};
  let start,end;
  if(startTime){
    start=fmt(date,startTime);
    const eDate=endDate||date;
    end=endTime?fmt(eDate,endTime):fmt(date,(String(parseInt(startTime)+2)).padStart(2,"0")+":00");
  }else{
    start=date.replace(/-/g,"");
    if(endDate){const d=new Date(endDate+"T12:00:00");d.setDate(d.getDate()+1);end=d.toISOString().slice(0,10).replace(/-/g,"");}
    else end=start;
  }
  const params=new URLSearchParams({action:"TEMPLATE",text:title,dates:start+"/"+end,details:description||"J Sailing — Absolut 37",location:"Loviisa, Finland"});
  return"https://calendar.google.com/calendar/render?"+params.toString();
}

const INV_TYPE_LABELS={full:"Loppulasku",reservation:"Varausmaksu",partial:"Osasuoritus",credit:"Hyvityslasku"};
function invTypeLabel(t){return INV_TYPE_LABELS[t]||t;}
function invTypeBadge(t){

function computeInvoice(overrideState){
  const inv=overrideState||state.invoice;
  const source=inv.source||"sailing",isTutkinto=source==="tutkinto";
  const s=isTutkinto?null:(state.sailings.find(x=>x.id===inv.sailingId)||null);
  const t=isTutkinto?(state.tutkinnot.find(x=>x.id===inv.tutkintoId)||null):null;
  const rate=(!isTutkinto&&s?.type==="Charter")?0.135:0.255;
  const ratePct=(rate*100).toFixed(1);
  const itype=inv.type||"full",isRes=itype==="reservation",isPartial=itype==="partial",isCredit=itype==="credit";
  let payerName="",payerEmail="",payerBusinessId="",lines=[],grossTotal=0,eventName="";
  if(isTutkinto&&t){
    eventName=t.type+(t.boatType?" ("+t.boatType+")":"");
    let price=parseFloat(inv.partialAmount||0)||0;
    const c=state.customers.find(x=>x.id===inv.customerId);
    if(c){payerName=c.name||"";payerEmail=c.email||"";let amt=isCredit?-Math.abs(price):price;lines.push({title:`${eventName} — ${invTypeLabel(itype)} — ${c.name}`,qty:1,unit:amt,total:amt});grossTotal=amt;}
  }else if(s){
    eventName=s.name||"";
    let price=isRes?Number(s.reservationFee||0):Number(s.pricePerPerson||0);
    if(isPartial)price=parseFloat(inv.partialAmount||0)||0;
    // Loppulaskussa vähennetään jo laskutettu varausmaksu
    const alreadyInvoicedResFee=(itype==="full"&&!isCredit)?
      state.invoices
        .filter(x=>x.eventId===s.id&&(x.itype==="reservation"||x.isReservation)&&
          (inv.mode==="customer"?x.payerName===(state.customers.find(c=>c.id===inv.customerId)?.name||"__"):
           x.payerName===(state.companies.find(c=>c.id===inv.companyId)?.name||"__")))
        .reduce((sum,x)=>sum+Number(x.grossTotal||0),0)
      :0;
    if(inv.mode==="customer"){
      const c=state.customers.find(x=>x.id===inv.customerId);
      if(c){
        payerName=c.name||"";payerEmail=c.email||"";
        let amt=isCredit?-Math.abs(price):price;
        lines.push({title:`${s.name} — ${invTypeLabel(itype)} — ${c.name}`,qty:1,unit:amt,total:amt});
        if(alreadyInvoicedResFee>0){
          lines.push({title:`Aiemmin laskutettu varausmaksu`,qty:1,unit:-alreadyInvoicedResFee,total:-alreadyInvoicedResFee});
        }
        grossTotal=amt-alreadyInvoicedResFee;
      }
    }else{
      const co=state.companies.find(x=>x.id===inv.companyId);
      if(co){
        payerName=co.name||"";payerEmail=co.email||"";payerBusinessId=co.businessId||"";
        const cust=state.customers.filter(c=>c.sailingId===s.id&&c.billTo==="company"&&c.companyId===co.id).sort((a,b)=>(a.name||"").localeCompare(b.name||""));
        let gross=isPartial?price:cust.length*price;
        if(isPartial){lines.push({title:`${s.name} — Osasuoritus`,qty:1,unit:price,total:price});}
        else{for(const c of cust){let amt=isCredit?-Math.abs(price):price;lines.push({title:`${s.name} — ${invTypeLabel(itype)} — ${c.name}`,qty:1,unit:amt,total:amt});}}
        const comm=Math.abs(gross)*(Number(co.commissionPct||0)/100);
        if(comm>0&&!isCredit)lines.push({title:"Välitysprovisio",qty:1,unit:-comm,total:-comm});
        grossTotal=isCredit?-Math.abs(gross):gross-comm;
      }
    }
  }
  const creditRef=isCredit?state.invoices.find(x=>x.id===inv.creditRefId):null;
  const net=(grossTotal||0)/(1+rate),vat=(grossTotal||0)-net;
  const invNo=nextInvoiceNumber();
  return{sailing:s,tutkinto:t,isTutkinto,rate,ratePct,payerName,payerEmail,payerBusinessId,lines,grossTotal,net,vat,reference:finnishReference(invNo.replace(/\D/g,"")),invNo,eventName,isReservation:isRes,itype,isCredit,isPartial,creditRef};
}

  return s;
}

function renderCalendar(){
  const[year,month]=state.calendarMonth.split("-").map(Number);
  const monthNames=["Tammikuu","Helmikuu","Maaliskuu","Huhtikuu","Toukokuu","Kesäkuu","Heinäkuu","Elokuu","Syyskuu","Lokakuu","Marraskuu","Joulukuu"];
  const dayNames=["Ma","Ti","Ke","To","Pe","La","Su"];
  const firstDay=new Date(year,month-1,1).getDay();
  const startOffset=firstDay===0?6:firstDay-1;

  const daysInPrev=new Date(year,month-1,0).getDate();
  const todayStr=today();
  const eventMap={};
  function addEv(ds,ev){if(!eventMap[ds])eventMap[ds]=[];eventMap[ds].push(ev);}
  for(const s of state.sailings){
    if(!s.date)continue;

      addEv(s.teoria.date,{id:s.id,name:s.name+" (teoria)",type:"Teoria",maxPersons:s.maxPersons,reitti:"",timeLabel:tl,_isSession:false});
    }
    if(!hasSessions){
      if(isMultiDay){
        let cur=new Date(s.date+"T12:00:00");
        const endD=new Date(s.endDate+"T12:00:00");
        let dayIdx=0;
        const totalDays=Math.round((endD-cur)/86400000)+1;
        while(cur<=endD){
          const ds=cur.toISOString().slice(0,10);
          const isFirst=dayIdx===0,isLast=dayIdx===totalDays-1;
          // REITTI: näytetään lähtöpäivällä
          const tlBase=isFirst?(s.startTime?"lähtö "+s.startTime:"lähtö"):isLast?(s.endTime?"paluu "+s.endTime:"paluu"):`vrk ${dayIdx+1}/${totalDays}`;
          const mdClass=isFirst?"multiday-start":isLast?"multiday-end":"multiday-mid";
          addEv(ds,{id:s.id,name:s.name,type:s.type,maxPersons:s.maxPersons,reitti:isFirst?(s.reitti||""):"",timeLabel:tlBase,_isSession:false,_isMultiDay:true,_mdClass:mdClass});
          cur.setDate(cur.getDate()+1);dayIdx++;
        }
      }else{
        let tl="";if(s.startTime&&s.endTime)tl=s.startTime+"–"+s.endTime;else if(s.startTime)tl="klo "+s.startTime;
        // REITTI: lisätään eventMap-objektiin
        addEv(s.date,{id:s.id,name:s.name,type:s.type,maxPersons:s.maxPersons,reitti:s.reitti||"",timeLabel:tl,_isSession:false});
      }
    }else{
      for(let i=0;i<s.sessions.length;i++){
        const sess=s.sessions[i];if(!sess.date)continue;
        let tl="";if(sess.start&&sess.end)tl=sess.start+"–"+sess.end;else if(sess.start)tl="klo "+sess.start;
        addEv(sess.date,{id:s.id,name:s.name,type:s.type,maxPersons:s.maxPersons,reitti:"",timeLabel:tl,_isSession:true,_sessIdx:i});
      }
    }
  }
  const totalCells=Math.ceil((startOffset+daysInMonth)/7)*7;
  let cells="";
  for(let i=0;i<totalCells;i++){
    let d,m,y,other=false;
    if(i<startOffset){d=daysInPrev-startOffset+i+1;m=month===1?12:month-1;y=month===1?year-1:year;other=true;}
    else if(i>=startOffset+daysInMonth){d=i-startOffset-daysInMonth+1;m=month===12?1:month+1;y=month===12?year+1:year;other=true;}
    else{d=i-startOffset+1;m=month;y=year;}
    const ds=y+"-"+String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const isToday=ds===todayStr;
    const evs=eventMap[ds]||[];
    const evHTML=evs.slice(0,3).map(ev=>{
      const tc="type-"+ev.type+(ev._mdClass?" "+ev._mdClass:"");
      const booked=ev._isSession||ev._isMultiDay?"":` (${enrolledCount(ev.id)}/${ev.maxPersons||0})`;
      const action=ev._isSession?"edit-session-cal":"edit-sailing";
      const sidx=ev._isSession?String(ev._sessIdx):"";
      const tl=ev.timeLabel?`<span style="display:block;opacity:.75;font-size:9px">${esc(ev.timeLabel)}</span>`:"";
      // REITTI: näytetään kalenterimerkinnässä pienen rivin
      const rl=ev.reitti?`<span style="display:block;opacity:.7;font-size:9px;overflow:hidden;text-overflow:ellipsis">📍${esc(ev.reitti)}</span>`:"";
      const sv=state.sailings.find(x=>x.id===ev.id);
      const gcKey=ev._isSession?`gcal_${ev.id}_${ev._sessIdx}`:`gcal_${ev.id}`;
      const gcDot=sv&&sv[gcKey]?`<span title="Lisätty Google Kalenteriin" style="position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:#4285F4;display:block"></span>`:"";
      return`<button class="cal-event ${tc}" data-action="${action}" data-id="${ev.id}" data-idx="${sidx}" style="padding:3px 5px;position:relative">${gcDot}<span style="display:block">${esc(ev.name)}${booked}</span>${tl}${rl}</button>`;
    }).join("");
    const more=evs.length>3?`<div style="font-size:9px;color:#6b7280;padding:1px 4px">+${evs.length-3}</div>`:"";
    cells+=`<div class="cal-cell${other?" other-month":""}${isToday?" today":""}"><div class="cal-date">${d}</div>${evHTML}${more}</div>`;
  }
  const TYPES=["Kurssi","Charter","Iltapurjehdus","Päiväpurjehdus","Purjehdusretki","Yritystilaisuus","Muu","Teoria"];
  const prev=month===1?`${year-1}-12`:`${year}-${String(month-1).padStart(2,"0")}`;
  const next=month===12?`${year+1}-01`:`${year}-${String(month+1).padStart(2,"0")}`;
  return`<div class="card">
    <div class="row-between">
      <div class="cal-nav-bar"><button class="btn btn-secondary btn-sm" data-action="cal-nav" data-month="${prev}">‹</button><div class="cal-month-label">${monthNames[month-1]} ${year}</div><button class="btn btn-secondary btn-sm" data-action="cal-nav" data-month="${next}">›</button></div>
      <button class="btn btn-secondary btn-sm" data-action="cal-today">Tänään</button>
    </div>
    <div class="cal-legend">${TYPES.map(t=>`<div class="cal-legend-item"><div class="cal-legend-dot cal-event type-${t}"></div>${esc(t)}</div>`).join("")}<div class="cal-legend-item"><div style="width:10px;height:10px;border-radius:50%;background:#4285F4;flex-shrink:0"></div>Google Kalenterissa</div></div>
    <div class="cal-grid">${dayNames.map(d=>`<div class="cal-dayname">${d}</div>`).join("")}${cells}</div>
  </div>`;
}

  document.querySelectorAll('[data-action="reg-paid"]').forEach(cb=>{cb.onchange=async()=>{const x=state.invoices.find(z=>z.id===cb.dataset.id);if(!x)return;x.paid=!!cb.checked;if(x.paid){const pd=prompt("Maksupäivä (YYYY-MM-DD):",x.paidDate||today());if(!pd){x.paid=false;x.paidDate="";}else{x.paidDate=pd;}}else x.paidDate="";await fsSet("invoices",x.id,x);render();};});
  document.querySelectorAll("[data-action]").forEach(el=>{

    if(el.tagName==="A"&&el.dataset.action==="gcal-mark"){el.onclick=async()=>{const sailingId=el.dataset.id,idxRaw=el.dataset.idx;const idx=(idxRaw!==""&&idxRaw!=null)?Number(idxRaw):null;setTimeout(()=>markGcalAdded(sailingId,idx),300);};return;}

      if(a==="edit-company"){state.modal="company";state.editId=itemId;render();return;}
      if(a==="open-register"){state.modal="register";render();return;}
      if(a==="new-tutkinto"){state.modal="tutkinto";state.editId=null;render();return;}
      if(a==="edit-tutkinto"){state.modal="tutkinto";state.editId=itemId;render();return;}

      if(a==="save-tutkinto"){
        const type=document.querySelector('[data-field="tutkinto-type"]')?.value||"";
        const date=document.querySelector('[data-field="tutkinto-date"]')?.value||"";

      if(a==="save-session-modal"){const{sailingId,idx}=state.editSession||{};const s=state.sailings.find(x=>x.id===sailingId);if(!s||!s.sessions?.[idx])return;const newDate=document.querySelector('[data-field="sess-date"]')?.value||"";if(!newDate)return alert("Päivämäärä on pakollinen.");s.sessions[idx].date=newDate;s.sessions[idx].start=document.querySelector('[data-field="sess-start"]')?.value||"";s.sessions[idx].end=document.querySelector('[data-field="sess-end"]')?.value||"";s.sessions[idx].note=document.querySelector('[data-field="sess-note"]')?.value||"";await fsSet("sailings",s.id,s);state.modal=null;state.editSession=null;render();return;}
      if(a==="save-customer"){

          startTime:document.querySelector('[data-field="startTime"]')?.value||"",
          endTime:document.querySelector('[data-field="endTime"]')?.value||"",
          maxPersons:parseInt(document.querySelector('[data-field="maxPersons"]')?.value,10)||1,
          reserveSlots:Math.max(0,parseInt(document.querySelector('[data-field="reserveSlots"]')?.value,10)||0),
          pricePerPerson:parseFloat(document.querySelector('[data-field="pricePerPerson"]')?.value)||0,
          reservationFee:parseFloat(document.querySelector('[data-field="reservationFee"]')?.value)||0,
          sessions:existing?.sessions||[],
          teoria:existing?.teoria||null
        };
        if(state.editId)await fsSet("sailings",state.editId,data);
        else{const newId=await fsAdd("sailings",data);if(!state.invoice.sailingId)state.invoice.sailingId=newId;}
        state.modal=null;state.editId=null;state.sailingDraft={};render();return;
      }
      if(a==="save-company"){const name=(document.querySelector('[data-field="name"]')?.value||"").trim();if(!name)return alert("Yrityksen nimi pakollinen.");const data={name,businessId:document.querySelector('[data-field="businessId"]')?.value||"",email:document.querySelector('[data-field="email"]')?.value||"",commissionPct:parseFloat(document.querySelector('[data-field="commissionPct"]')?.value)||0};if(state.editId)await fsSet("companies",state.editId,data);else await fsAdd("companies",data);state.modal=null;state.editId=null;render();return;}
      if(a==="delete-customer"){if(!confirm("Poistetaanko asiakas?"))return;await fsDel("customers",itemId);render();return;}
      if(a==="delete-sailing"){if(!confirm("Poistetaanko purjehdus?"))return;await fsDel("sailings",itemId);if(state.openSailingId===itemId)state.openSailingId=null;render();return;}
      if(a==="delete-company"){if(!confirm("Poistetaanko yritys?"))return;await fsDel("companies",itemId);render();return;}
      if(a==="delete-register"){if(!confirm("Poistetaanko lasku rekisteristä?"))return;await fsDel("invoices",itemId);render();return;}
      if(a==="reskontra-mark-paid"){const x=state.invoices.find(z=>z.id===itemId);if(!x)return;const pd=prompt(`Merkitään ${x.invoiceNo} maksetuksi.\nMaksupäivä (YYYY-MM-DD):`,x.paidDate||today());if(!pd)return;x.paid=true;x.paidDate=pd;await fsSet("invoices",x.id,x);render();return;}
      if(a==="save-invoice"){
        const inv=computeInvoice();
        if(!inv.isTutkinto&&!inv.sailing)return alert("Valitse tapahtuma.");
        if(inv.isTutkinto&&!inv.tutkinto)return alert("Valitse tutkinto.");
        if(inv.isTutkinto&&!parseFloat(state.invoice.partialAmount||0))return alert("Syötä laskutettava summa.");
        if(!inv.payerName)return alert("Valitse asiakas.");
        if(inv.lines.length===0)return alert("Laskulla ei ole rivejä.");
        if(inv.isCredit&&!state.invoice.creditRefId)return alert("Valitse hyvitettävä lasku.");
        if(inv.isPartial&&!parseFloat(state.invoice.partialAmount||0))return alert("Syötä osasuorituksen summa.");
        const rec={mode:inv.isTutkinto?"customer":state.invoice.mode,source:state.invoice.source||"sailing",isReservation:!!inv.isReservation,itype:inv.itype,isCredit:!!inv.isCredit,creditRefId:state.invoice.creditRefId||"",creditRefNo:inv.creditRef?.invoiceNo||"",invoiceNo:inv.invNo,invoiceDate:state.invoice.invoiceDate,reference:inv.reference,payerName:inv.payerName,payerBusinessId:inv.payerBusinessId||"",payerEmail:inv.payerEmail||"",eventId:inv.isTutkinto?(state.invoice.tutkintoId||""):(inv.sailing?.id||""),eventName:inv.eventName,vatRatePct:Number(inv.ratePct),net:Number(inv.net||0),vat:Number(inv.vat||0),grossTotal:Number(inv.grossTotal||0),paid:false,paidDate:""};
        await fsAdd("invoices",rec);alert(`Tallennettu!\nLaskunro: ${inv.invNo}\nViite: ${inv.reference}`);render();return;
      }
      if(a==="export-json"){const blob=new Blob([JSON.stringify({customers:state.customers,sailings:state.sailings,companies:state.companies,invoices:state.invoices,tutkinnot:state.tutkinnot},null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const x=document.createElement("a");x.href=url;x.download=`jsailing_backup_${today()}.json`;x.click();URL.revokeObjectURL(url);return;}
      if(a==="export-register-csv"){
        const month=state.registerMonth||today().slice(0,7);
        const rows=state.invoices.filter(x=>String(x.invoiceDate||"").slice(0,7)===month).sort((a,b)=>(a.invoiceDate||"").localeCompare(b.invoiceDate||""));
        if(!rows.length){alert("Ei laskuja.");return;}
        const sep=";";
        const hdr=["Päivä","Laskunro","Viite","Maksaja","Y-tunnus","Sähköposti","Tapahtuma","Malli","Laskulaji","ALV%","Netto","ALV","Brutto","Maksettu","Maksupäivä"].join(sep);
        const lines=rows.map(x=>[x.invoiceDate,x.invoiceNo,x.reference,x.payerName,x.payerBusinessId||"",x.payerEmail||"",x.eventName||"",x.mode==="company"?"Yrityslasku":"Asiakaskohtainen",x.isReservation?"Varausmaksu":x.itype==="partial"?"Osasuoritus":x.itype==="credit"?"Hyvityslasku":"Loppulasku",String(x.vatRatePct||"").replace(".",","),Number(x.net||0).toFixed(2).replace(".",","),Number(x.vat||0).toFixed(2).replace(".",","),Number(x.grossTotal||0).toFixed(2).replace(".",","),x.paid?"Kyllä":"Ei",x.paidDate||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(sep));
        const csv=[hdr,...lines].join("\n");const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a2=document.createElement("a");a2.href=url;a2.download=`laskurekisteri_${month}.csv`;a2.click();URL.revokeObjectURL(url);return;
      }
      if(a==="print"){window.print();return;}
      if(a==="print-register"){
        const area=document.getElementById("reg-print-area");
        if(!area)return;
        const win=window.open("","_blank","width=1000,height=750");
        win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Kirjanpitoraportti</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;font-size:11px;color:#111;padding:28px;max-width:960px;margin:0 auto}
.table{width:100%;border-collapse:collapse}
.table th,.table td{border-top:1px solid #e5e7eb;padding:6px 8px;font-size:10px;vertical-align:top}
.table th{font-size:9px;font-weight:800;color:#374151;text-transform:uppercase;letter-spacing:.4px;background:#f9fafb}
.table tfoot td{border-top:2px solid #374151;font-weight:800}
.r{text-align:right}
.badge-green{background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:999px;padding:2px 7px;font-size:9px;font-weight:700}
.badge-red{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:999px;padding:2px 7px;font-size:9px;font-weight:700}
.badge-blue{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;border-radius:999px;padding:2px 7px;font-size:9px;font-weight:700}
.badge-amber{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;border-radius:999px;padding:2px 7px;font-size:9px;font-weight:700}
.badge-silver{background:#f3f4f6;color:#1f2937;border:1px solid #d1d5db;border-radius:999px;padding:2px 7px;font-size:9px;font-weight:700}
.infobox-blue{background:#dbeafe;color:#1e3a8a;border:1px solid #93c5fd;padding:8px 12px;border-radius:8px}
.small{font-size:9px}.muted{color:#6b7280}
.noPrint{display:none}
hr{border-top:1.5px solid #e5e7eb;margin:10px 0}
@page{margin:15mm;size:A4}
@media print{.noPrint{display:none}body{padding:0}}
</style></head><body>`+area.innerHTML+`</body></html>`);
        win.document.close();
        setTimeout(()=>{win.focus();win.print();},500);
        return;
      }
      if(a==="email-invoice"){
        const box=document.getElementById("invoiceBox");if(!box)return;
        let to="";if(state.invoice.mode==="customer"){const c=state.customers.find(x=>x.id===state.invoice.customerId);to=c?.email||"";}else{const co=state.companies.find(x=>x.id===state.invoice.companyId);to=co?.email||"";}
        const inv=computeInvoice();window.location.href=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent("Lasku "+inv.invNo)}&body=${encodeURIComponent(box.innerText)}`;return;
      }
    };
  });
}
