<div id="app"></div>

<script type="module">
/* FIREBASE JA LOGIIKKA SUORAAN V9.30 PDF:STÄ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63UO0", authDomain: "jsailing-f716c.firebaseapp.com", projectId: "jsailing-f716c", storageBucket: "jsailing-f716c.firebasestorage.app", messagingSenderId: "543523103696", appId: "1:543523103696:web:439a312efa6aec398a8fd5" };
const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);

// MUUTETTU: Reskontran järjestys ja poistonappi
function renderReskontra() {
  // Järjestetään laskut käänteiseen järjestykseen (uusin ensin)
  const sortedInvoices = [...state.invoices].sort((a, b) => (b.invoiceNo || "").localeCompare(a.invoiceNo || ""));
  
  return `
    <div class="card">
      <h2 class="card-title">Reskontra</h2>
      <table class="table">
        ${sortedInvoices.map(x => `
          <tr>
            <td><b>${x.invoiceNo}</b></td>
            <td>${x.payerName}</td>
            <td class="r">${x.grossTotal?.toFixed(2)} €</td>
            <td class="r">
              <button class="btn btn-secondary btn-sm" onclick="state.previewInvoiceId='${x.id}';render()">👁</button>
              <button class="btn-danger-sm" onclick="handleDeleteInvoice('${x.id}', '${x.invoiceNo}')">✕</button>
            </td>
          </tr>
        `).join('')}
      </table>
    </div>`;
}

// UUSI FUNKTIO POISTOLLE
window.handleDeleteInvoice = async (id, no) => {
  if(confirm(`Poistetaanko lasku ${no}?`)) {
    await deleteDoc(doc(db, "invoices", id));
  }
};

// MUUTETTU: Laskun esikatselu (lisätty koodien generointi)
function renderInvoicePreviewModal() {
  const inv = state.invoices.find(x => x.id === state.previewInvoiceId);
  if(!inv) return "";
  
  // Suoritetaan koodien piirto renderöinnin jälkeen
  setTimeout(() => {
    const bc = document.getElementById("barcodeCanvas");
    const qc = document.getElementById("qrcodeCanvas");
    if(bc) JsBarcode(bc, inv.reference || "0", { format: "CODE128", height: 50, displayValue: true });
    if(qc) {
       const qrData = `BCD\n001\n1\nFI6211323000427743\n\n${(inv.grossTotal || 0).toFixed(2)}\nEUR\n\n\n${inv.reference}`;
       QRCode.toCanvas(qc, qrData, { width: 140 });
    }
  }, 100);

  return `
    <div class="overlay" onclick="state.previewInvoiceId=null;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="invoice-box">
          <h3>Lasku ${inv.invoiceNo}</h3>
          <div class="hr"></div>
          <div style="text-align:center; margin: 20px 0;">
            <canvas id="barcodeCanvas"></canvas>
            <div style="margin-top:20px;">
              <canvas id="qrcodeCanvas"></canvas>
            </div>
          </div>
          <div class="hr"></div>
          <button class="btn btn-primary" onclick="state.previewInvoiceId=null;render()">Sulje</button>
        </div>
      </div>
    </div>`;
}

/* KAIKKI MUU KOODI (renderTab, sailings, customers, calendar-logiikka) täysin PDF:n mukaisena */

</script>
