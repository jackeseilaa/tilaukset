<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FIREBASE_CONFIG = { apiKey: "AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63UO0", authDomain: "jsailing-f716c.firebaseapp.com", projectId: "jsailing-f716c", storageBucket: "jsailing-f716c.firebasestorage.app", messagingSenderId: "543523103696", appId: "1:543523103696:web:439a312efa6aec398a8fd5" };
const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);

const state = {
  tab: "dashboard", user: null,
  invoices: [], previewInvoiceId: null,
  /* ... muut tila-arvot ... */
};

const ISSUER = { iban: "FI62 1132 3000 4277 43" };

// Korjaus 2 & 3: Järjestetty reskontra ja poisto-nappi
function renderReskontra() {
  const filtered = state.invoices.sort((a, b) => (b.invoiceNo || "").localeCompare(a.invoiceNo || ""));
  
  return `
    <div class="card">
      <h2 class="card-title">Reskontra</h2>
      <table class="table">
        ${filtered.map(x => `
          <tr>
            <td><b>${x.invoiceNo}</b></td>
            <td>${x.payerName}</td>
            <td class="r">${x.grossTotal?.toFixed(2)} €</td>
            <td class="r">
              <button class="btn btn-secondary btn-sm" data-action="preview-invoice" data-id="${x.id}">👁</button>
              <button class="btn btn-danger btn-sm" data-action="delete-invoice" data-id="${x.id}" style="margin-left:4px">✕ Poista</button>
            </td>
          </tr>
        `).join('')}
      </table>
    </div>`;
}

// Korjaus 4: Laskun esikatseluun lisätty koodipaikat
function renderInvoicePreviewModal() {
  const inv = state.invoices.find(x => x.id === state.previewInvoiceId);
  if (!inv) return "";
  return `
    <div class="overlay" onclick="state.previewInvoiceId=null;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-body invoice-box">
          <h3>Lasku ${inv.invoiceNo}</h3>
          <div class="hr"></div>
          
          <div style="text-align:center;margin:16px 0">
            <div style="margin-bottom:12px">
              <canvas id="barcodeCanvas" style="max-width:100%;height:60px"></canvas>
            </div>
            <div>
              <canvas id="qrcodeCanvas" style="width:140px;height:140px"></canvas>
            </div>
          </div>
          
          <div class="hr"></div>
          <button class="btn btn-primary" onclick="state.previewInvoiceId=null;render()">Sulje</button>
        </div>
      </div>
    </div>`;
}

// Korjaus 5: Koodien generointi bindiin
function bind() {
  document.body.onclick = async (e) => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    const a = el.dataset.action;
    const id = el.dataset.id;

    if (a === "preview-invoice") { state.previewInvoiceId = id; render(); }
    
    if (a === "delete-invoice") {
      const inv = state.invoices.find(x => x.id === id);
      if (inv && confirm(`Poistetaanko lasku ${inv.invoiceNo}?`)) {
        await deleteDoc(doc(db, "invoices", id));
      }
    }
  };

  // Piirretään koodit jos esikatselu on auki
  if (state.previewInvoiceId) {
    setTimeout(() => {
      const barCanvas = document.getElementById("barcodeCanvas");
      const qrCanvas = document.getElementById("qrcodeCanvas");
      const inv = state.invoices.find(x => x.id === state.previewInvoiceId);
      
      if (barCanvas && inv) {
        try { JsBarcode(barCanvas, inv.reference || "12345", { format: "CODE128", width: 2, height: 50 }); } catch (e) {}
      }
      if (qrCanvas && inv) {
        const qrText = `BCD\n001\n1\n${ISSUER.iban}\n\n${inv.grossTotal.toFixed(2)}\nEUR\n\n\n${inv.reference}`;
        try { QRCode.toCanvas(qrCanvas, qrText, { width: 140, margin: 1 }); } catch (e) {}
      }
    }, 200);
  }
}

/* ... Alkuperäinen onAuthStateChanged ja renderTab-logiikka ... */

</script>
</body>
