window.popupDownloadPDF=async function(sheet,title,btn,msg){
  if(btn){btn.textContent="⏳ Luodaan...";btn.disabled=true;}
  try{
    const canvas=await html2canvas(sheet,{scale:2,useCORS:true,backgroundColor:"#ffffff"});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const imgW=210;const imgH=(canvas.height*imgW)/canvas.width;
    if(imgH<=297){pdf.addImage(canvas.toDataURL("image/jpeg",0.95),"JPEG",0,0,imgW,imgH);}
    else{let y=0;while(y<canvas.height){const pH=Math.min(297*(canvas.width/imgW),canvas.height-y);const tc=document.createElement("canvas");tc.width=canvas.width;tc.height=pH;tc.getContext("2d").drawImage(canvas,0,y,canvas.width,pH,0,0,canvas.width,pH);if(y>0)pdf.addPage();pdf.addImage(tc.toDataURL("image/jpeg",0.95),"JPEG",0,0,imgW,pH*(imgW/canvas.width));y+=pH;}}
    pdf.save("Lasku_"+(title||"lasku").replace(/[^a-zA-Z0-9_-]/g,"_")+".pdf");
    if(btn){btn.textContent="⬇️ Lataa PDF";btn.disabled=false;}
    if(msg){msg.textContent="✓ PDF ladattu!";msg.style.display="inline";setTimeout(()=>msg.style.display="none",3000);}
  }catch(e){alert("PDF-virhe: "+e.message);if(btn){btn.textContent="⬇️ Lataa PDF";btn.disabled=false;}}
};

window.popupOpenInMail=async function(sheet,to,subj,btn,msg){
  if(btn){btn.textContent="⏳ Luodaan...";btn.disabled=true;}
  try{
    const canvas=await html2canvas(sheet,{scale:2,useCORS:true,backgroundColor:"#ffffff"});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const imgW=210;const imgH=(canvas.height*imgW)/canvas.width;
    pdf.addImage(canvas.toDataURL("image/jpeg",0.95),"JPEG",0,0,imgW,Math.min(imgH,297));
    const pdfB64=pdf.output("datauristring").split(",")[1];
    const fname=(subj||"Lasku").replace(/[^a-zA-Z0-9_-]/g,"_")+".pdf";
    const bd="----=_Part_"+Date.now();
    const bodyTxt=sheet.innerText.substring(0,800);
    const nl="\r\n";
    const eml=[
      "MIME-Version: 1.0","From: ","To: "+(to||""),
      "Subject: "+(subj||"Lasku"),
      'Content-Type: multipart/mixed; boundary="'+bd+'"',
      "","--"+bd,
      "Content-Type: text/plain; charset=UTF-8",
      "Content-Transfer-Encoding: 8bit","",bodyTxt,"",
      "--"+bd,
      'Content-Type: application/pdf; name="'+fname+'"',
      'Content-Disposition: attachment; filename="'+fname+'"',
      "Content-Transfer-Encoding: base64","",
      pdfB64.match(/.{1,76}/g).join(nl),"",
      "--"+bd+"--"
    ].join(nl);
    const blob=new Blob([eml],{type:"message/rfc822"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=fname.replace(".pdf",".eml");
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
    if(btn){btn.textContent="📧 Avaa Mailissa";btn.disabled=false;}
    if(msg){msg.textContent="✓ Tuplaklikkaa .eml-tiedostoa → Mail aukeaa PDF-liitteen kanssa";msg.style.display="inline";}
  }catch(e){alert("Virhe: "+e.message);if(btn){btn.textContent="📧 Avaa Mailissa";btn.disabled=false;}}
};
