<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="J Sailing"/>
<meta name="theme-color" content="#0a1628"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-512.png"/>
<title>J Sailing V40.0 — Hallintapaneeli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Käytetään lähettämääsi tyylitiedostoa sellaisenaan */
:root{
  --ocean-surf:#0a4272;--text:#111827;--text-muted:#374151;--text-light:#6b7280;
  --green:#166534;--green-bg:#dcfce7;--green-border:#86efac;
  --red:#991b1b;--red-bg:#fee2e2;--red-border:#fca5a5;
  --amber:#92400e;--amber-bg:#fef3c7;--amber-border:#fcd34d;
  --blue-accent:#1e40af;--blue-bg:#dbeafe;
  --gold:#92400e;--gold-light:#b45309;
  --white:#ffffff;--line:#e5e7eb;--line-bright:#d1d5db;
  --card-bg:#ffffff;--card-border:#e5e7eb;
  --shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
  --radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',system-ui,sans-serif;color:#111827;background:#f3f4f6;min-height:100vh;}
.auth-screen{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-card{background:white;padding:40px;border-radius:24px;text-align:center;box-shadow:var(--shadow);max-width:400px;width:100%;}
.topbar{background:#ffffff;border-bottom:2px solid #0a4272;padding:0 20px;padding-top:var(--safe-top);display:flex;align-items:center;height:calc(60px + var(--safe-top));position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#0a4272;}
.nav-tabs{background:#ffffff;border-bottom:1px solid #d1d5db;display:flex;overflow-x:auto;scrollbar-width:none;}
.nav-tab{flex:1;padding:15px;border:none;border-bottom:3px solid transparent;background:transparent;font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap;text-transform:uppercase;color:var(--text-muted);}
.nav-tab.active{color:#0a4272;border-bottom-color:#0a4272;}
.main-content{max-width:1100px;margin:0 auto;padding:20px;}
.card{background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
.table{width:100%;border-collapse:collapse;}
.table th, .table td{padding:12px;text-align:left;border-bottom:1px solid #eee;font-size:14px;}
.btn{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;transition:0.2s;}
.btn-primary{background:#0a4272;color:white;}
.btn-danger{background:var(--red-bg);color:var(--red);}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;}
.loader-ring{width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid #0a4272;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
<div id="app">
  <div class="loader"><div class="loader-ring"></div><p>Käynnistetään V40.0...</p></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63UO0",
  authDomain: "jsailing-f716c.firebaseapp.com",
  projectId: "jsailing-f716c",
  storageBucket: "jsailing-f716c.firebasestorage.app",
  messagingSenderId: "543523103696",
  appId: "1:543523103696:web:439a312efa6aec398a8fd5"
};

const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const state = {
  user: null,
  tab: "dashboard",
  invoices: [],
  sailings: [],
  tutkinnot: [],
  companies: []
};

// --- LOGIIKKA ---

window.switchTab = (t) => { state.tab = t; render(); };

window.login = () => signInWithPopup(auth, provider);
window.logout = () => signOut(auth);

window.deleteInvoice = async (id, no) => {
  if(confirm(`Poistetaanko lasku ${no}?`)) await deleteDoc(doc(db, "invoices", id));
};

window.showInvoice = (id) => {
  const inv = state.invoices.find(x => x.id === id);
  if(!inv) return;
  const modal = document.createElement("div");
  modal.style = "position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px";
  modal.innerHTML = `
    <div style="background:white;padding:30px;border-radius:12px;width:100%;max-width:450px;text-align:center;">
      <h2 style="font-family:'Cormorant Garamond',serif;color:#0a4272">Lasku ${inv.invoiceNo}</h2>
      <p style="margin:10px 0">${inv.payerName}</p>
      <canvas id="bc"></canvas>
      <div style="margin:15px 0"><canvas id="qr"></canvas></div>
      <button class="btn btn-primary" onclick="this.parentElement.parentElement.remove()">Sulje</button>
    </div>`;
  document.body.appendChild(modal);
  setTimeout(() => {
    JsBarcode("#bc", inv.reference, {format:"CODE128", height:40, fontSize:14});
    QRCode.toCanvas(document.getElementById("qr"), `BCD\n001\n1\n${inv.iban||''}\n\n${inv.grossTotal?.toFixed(2)}\nEUR\n\n\n${inv.reference}`, {width:140});
  }, 100);
};

// --- NÄKYMÄT ---

function render() {
  const root = document.getElementById("app");
  if (!state.user) {
    root.innerHTML = `
      <div class="auth-screen">
        <div class="auth-card">
          <h1 class="topbar-logo">J Sailing <em>Hallinta</em></h1>
          <p style="margin:20px 0; color:#6b7280;">Versio 40.0</p>
          <button class="btn btn-primary" style="width:100%" onclick="login()">Kirjaudu Google-tunnuksella</button>
        </div>
      </div>`;
    return;
  }

  root.innerHTML = `
    <div class="topbar">
      <div class="topbar-logo">J Sailing <em>V40.0</em></div>
      <div style="flex:1"></div>
      <button class="btn-signout" style="background:none; border:1px solid #ddd; padding:5px 10px; border-radius:5px; cursor:pointer;" onclick="logout()">Kirjaudu ulos</button>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab ${state.tab==='dashboard'?'active':''}" onclick="switchTab('dashboard')">Paneeli</button>
      <button class="nav-tab ${state.tab==='courses'?'active':''}" onclick="switchTab('courses')">Kurssit</button>
      <button class="nav-tab ${state.tab==='tutkinnot'?'active':''}" onclick="switchTab('tutkinnot')">Tutkinnot</button>
      <button class="nav-tab ${state.tab==='reskontra'?'active':''}" onclick="switchTab('reskontra')">Reskontra</button>
    </div>
    <div class="main-content">
      ${renderTabContent()}
    </div>
  `;
}

function renderTabContent() {
  switch(state.tab) {
    case 'dashboard':
      return `<div class="card"><h2>Tervetuloa, ${state.user.displayName}</h2><p>Tässä on yhteenveto JSailing-toiminnasta.</p></div>`;
    
    case 'courses':
      return `
        <div class="card">
          <h2>Kurssit ja purjehdukset</h2>
          <table class="table">
            <thead><tr><th>Pvm</th><th>Nimi</th><th>Tyyppi</th></tr></thead>
            <tbody>
              ${state.sailings.length ? state.sailings.map(s => `<tr><td>${s.date}</td><td>${s.name}</td><td>${s.type}</td></tr>`).join('') : '<tr><td colspan="3">Ei kursseja ladattuna.</td></tr>'}
            </tbody>
          </table>
        </div>`;

    case 'tutkinnot':
      return `<div class="card"><h2>Tutkinnot</h2><p>Tutkintojen hallinta ladataan tästä...</p></div>`;

    case 'reskontra':
      return `
        <div class="card">
          <h2>Laskureskontra</h2>
          <table class="table">
            <thead><tr><th>Nro</th><th>Asiakas</th><th>Summa</th><th>Toiminnot</th></tr></thead>
            <tbody>
              ${state.invoices.map(inv => `
                <tr>
                  <td><b>${inv.invoiceNo}</b></td>
                  <td>${inv.payerName}</td>
                  <td>${inv.grossTotal?.toFixed(2)} €</td>
                  <td>
                    <button class="btn btn-primary" style="padding:5px 10px" onclick="showInvoice('${inv.id}')">👁</button>
                    <button class="btn btn-danger" style="padding:5px 10px" onclick="deleteInvoice('${inv.id}', '${inv.invoiceNo}')">✕</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;
    
    default: return '';
  }
}

// --- DATA ---

onAuthStateChanged(auth, (user) => {
  state.user = user;
  if (user) {
    onSnapshot(query(collection(db, "invoices"), orderBy("invoiceNo", "desc")), (s) => {
      state.invoices = s.docs.map(d => ({id: d.id, ...d.data()}));
      render();
    });
    onSnapshot(collection(db, "sailings"), (s) => {
      state.sailings = s.docs.map(d => ({id: d.id, ...d.data()}));
      render();
    });
  }
  render();
});

</script>
</body>
</html>
