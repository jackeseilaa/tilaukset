  --ocean-surf:#0a4272;--text:#111827;--text-muted:#374151;--text-light:#6b7280;
  --green:#166534;--green-bg:#dcfce7;--green-border:#86efac;

</style>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>

<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, setDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ... (Kaikki vakiot, ISSUERS, SAILING_TYPES jne. säilyvät ennallaan) ...
const FIREBASE_CONFIG={apiKey:"AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63UO0",authDomain:"jsailing-f716c.firebaseapp.com",projectId:"jsailing-f716c",storageBucket:"jsailing-f716c.firebasestorage.app",messagingSenderId:"543523103696",appId:"1:543523103696:web:439a312efa6aec398a8fd5"};
const ISSUER = { name: "J Sailing", iban: "FI62 1132 3000 4277 43", bic: "NDEAFIHH" };

// ... (Kaikki apufunktiot ennallaan) ...

function renderReskontra() {
  const filtered = state.invoices
    .sort((a,b) => (b.invoiceNo || "").localeCompare(a.invoiceNo || ""));

  return `
    <div class="card">
      <h2 class="card-title">Laskureskontra</h2>
      <table class="table">
        ${filtered.map(x => `
          <tr>
            <td><b>${x.invoiceNo}</b></td>
            <td>${x.payerName}</td>
            <td class="r">${x.grossTotal?.toFixed(2)} €</td>
            <td class="r">
              <button class="btn btn-secondary btn-sm" data-action="preview-invoice" data-id="${x.id}">👁</button>
              <button class="btn btn-danger btn-sm" data-action="make-credit-invoice" data-id="${x.id}" style="margin-left:4px">↩ Hyvityslasku</button>
              <button class="btn btn-danger btn-sm" data-action="delete-invoice" data-id="${x.id}" style="margin-left:4px">✕ Poista</button>
            </td>
          </tr>
        `).join('')}
      </table>
    </div>`;
}

function renderInvoicePreviewModal() {
  const inv = computeInvoice();
  if(!inv) return "";
  return `
    <div class="overlay" onclick="state.previewInvoiceId=null;render()">
      <div class="modal" onclick="event.stopPropagation()" style="max-width:800px">
        <div class="modal-body invoice-box">
          <table>...taulukko tiedot...</table>

          <div class="hr"></div>
          <div style="text-align:center;margin:16px 0">
            <div style="margin-bottom:12px">
              <canvas id="barcodeCanvas" style="max-width:100%;height:60px"></canvas>
            </div>
            <div>
              <canvas id="qrcodeCanvas" style="width:140px;height:140px"></canvas>
            </div>
          </div>

          <div class="hr"></div>
          <div style="font-size:13px;color:#6b7280">${inv.paid? 'MAKSETTU' : 'ODOTTAA'}</div>
        </div>
      </div>
    </div>`;
}

function bind() {
  document.body.onclick = async (e) => {
    const el = e.target.closest("[data-action]");
    if (!el) return;
    const a = el.dataset.action;
    const itemId = el.dataset.id;

    // ... (Kaikki muut handlerit: nav-tab, confirm-payment jne.) ...

    if(a==="delete-register"){if(!confirm("Poistetaanko lasku rekisteristä?"))return;await deleteDoc(doc(db,"invoices",itemId));render();return;}

    // MUUTOS 3: Delete-invoice handler
    if(a==="delete-invoice"){
      const inv=state.invoices.find(x=>x.id===itemId);
      if(!inv)return;
      if(!confirm(`Poistetaanko lasku ${inv.invoiceNo}?`))return;
      await deleteDoc(doc(db,"invoices",itemId));
      render();
      return;
    }
  };

  // MUUTOS 5: Viivakoodi ja QR-koodi
  setTimeout(()=>{
    const barCanvas=document.getElementById("barcodeCanvas");
    const qrCanvas=document.getElementById("qrcodeCanvas");
    if(barCanvas){
      try{JsBarcode(barCanvas,state.previewInvoiceId?computeInvoice().reference:"",{format:"CODE128",width:2,height:50});}catch(e){}
    }
    if(qrCanvas&&state.previewInvoiceId){
      const inv=computeInvoice();
      const qrText=`BCD\n001\n1\n${ISSUER.iban}\n\n${inv.grossTotal.toFixed(2)}\nEUR\n\n\n${inv.reference}`;
      try{QRCode.toCanvas(qrCanvas,qrText,{width:140,margin:1,color:{dark:"#000",light:"#fff"}});}catch(e){}
    }
  },200);
}

// ... (onAuthStateChanged ja muu sovelluslogiikka ennallaan) ...
</script>
</body>
</html>
