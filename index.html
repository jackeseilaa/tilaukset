<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Absolut 37 — Tilaukset</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#1a3a5c;
  --navy2:#22527a;
  --teal:#0d7a6e;
  --bg:#f0f4f7;
  --card:#ffffff;
  --muted:#6b7280;
  --line:#e2e8f0;
  --btn:#1a3a5c;
  --btn2:#eef2f7;

  /* Varausmaksulogiikka */
  --red-bg:#fff0f0;
  --red:#c0392b;
  --red-border:#f5c6c3;
  --green-bg:#edfaf3;
  --green:#166b47;
  --green-border:#b2e8ce;
  --yellow-bg:#fffbeb;
  --yellow:#92400e;
  --yellow-border:#fde68a;

  --radius:14px;
  --shadow: 0 2px 12px rgba(26,58,92,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);
  color:#1a2535;
  min-height:100vh;
}

/* HEADER */
header.app-header{
  background:linear-gradient(135deg, var(--navy) 0%, #0f2d4a 100%);
  color:#fff;
  padding:20px 28px 18px;
  display:flex;align-items:center;gap:16px;
  border-bottom:3px solid rgba(255,255,255,.08);
}
header.app-header .logo{
  font-family:'DM Serif Display',serif;
  font-size:28px;
  letter-spacing:-.5px;
}
header.app-header .logo em{
  font-style:italic;
  color:#7ecff0;
}
header.app-header .sub{
  font-size:13px;
  opacity:.7;
  font-weight:400;
  margin-top:2px;
}
header.app-header .hbadge{
  margin-left:auto;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  border-radius:999px;
  padding:5px 14px;
  font-size:12px;
  font-weight:600;
  letter-spacing:.5px;
}

/* NAV */
nav.tabs{
  background:#fff;
  border-bottom:1.5px solid var(--line);
  display:flex;
  overflow-x:auto;
  box-shadow:0 2px 8px rgba(26,58,92,.05);
}
nav.tabs button{
  flex:1;min-width:100px;
  padding:13px 10px;
  border:0;
  background:#fff;
  font-family:'DM Sans',sans-serif;
  font-weight:600;
  font-size:13px;
  color:#64748b;
  border-bottom:3px solid transparent;
  cursor:pointer;
  transition:color .15s, border-color .15s;
  white-space:nowrap;
}
nav.tabs button.active{
  border-bottom-color:var(--navy);
  color:var(--navy);
}
nav.tabs button:hover:not(.active){
  color:#374151;
  background:#f8fafc;
}

main{max-width:1040px;margin:0 auto;padding:20px 16px}

/* CARDS */
.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
}
.card-title{
  font-family:'DM Serif Display',serif;
  font-size:22px;
  color:var(--navy);
  margin-bottom:4px;
}
.card-sub{font-size:13px;color:var(--muted)}

/* BTNS */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  border:0;border-radius:10px;
  padding:9px 16px;
  font-family:'DM Sans',sans-serif;
  font-weight:600;font-size:13px;
  cursor:pointer;
  transition:opacity .15s, transform .1s;
  white-space:nowrap;
}
.btn:hover{opacity:.88}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--navy);color:#fff}
.btn.secondary{background:var(--btn2);color:#1a2535}
.btn.teal{background:var(--teal);color:#fff}
.btn.danger{background:#fff0f0;color:var(--red);border:1px solid var(--red-border)}
.btn.sm{padding:6px 12px;font-size:12px;border-radius:8px}

/* FORMS */
.field{margin-bottom:14px}
label.lbl{display:block;font-size:12px;font-weight:700;margin-bottom:5px;color:#475569;letter-spacing:.4px;text-transform:uppercase}
input,select,textarea{
  width:100%;padding:9px 12px;
  border:1.5px solid var(--line);
  border-radius:10px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  background:#fff;
  color:#1a2535;
  transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:var(--navy2);
}

/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:720px){.grid2,.grid3{grid-template-columns:1fr}}

/* ROW */
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row.between{justify-content:space-between}
.hr{border-top:1px solid var(--line);margin:16px 0}
.muted{color:var(--muted);font-size:13px}
.small{font-size:12px}

/* PILL / BADGE */
.pill{
  display:inline-block;
  padding:3px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  margin-left:6px;
  background:#eef2ff;
  color:var(--navy);
}
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#eef2f7;
  font-weight:700;
  font-size:11px;
}

/* VARAUSMAKSU STATUSBADGET */
.status-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  border:1.5px solid transparent;
}
.status-badge.pending{
  background:var(--red-bg);
  color:var(--red);
  border-color:var(--red-border);
}
.status-badge.paid{
  background:var(--green-bg);
  color:var(--green);
  border-color:var(--green-border);
}
.status-badge.reserve{
  background:var(--yellow-bg);
  color:var(--yellow);
  border-color:var(--yellow-border);
}

/* ITEM LIST */
.item{
  display:flex;justify-content:space-between;gap:14px;
  padding:14px 0;
  border-top:1px solid var(--line);
}
.item:first-child{border-top:0}
.item h3{margin:0 0 4px 0;font-size:15px;font-weight:600}
.meta{font-size:13px;color:var(--muted);margin-top:3px}

/* TÄYTTÖASTE */
.fillrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px}
.fillbar-wrap{
  flex:1;min-width:120px;height:8px;
  background:#e5e7eb;border-radius:999px;overflow:hidden;
  display:flex;gap:1px;
}
.fillbar-confirmed{height:100%;background:var(--green);transition:width .3s}
.fillbar-reserve{height:100%;background:var(--yellow);transition:width .3s}
.filltext{font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap}

/* ASIAKAS KORTIT (kurssissa) */
.attendee-card{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 12px;
  border-radius:10px;
  border:1.5px solid transparent;
  margin-bottom:6px;
  transition:background .15s;
}
.attendee-card.confirmed{
  background:var(--green-bg);
  border-color:var(--green-border);
}
.attendee-card.pending{
  background:var(--red-bg);
  border-color:var(--red-border);
}
.attendee-card.reserve{
  background:var(--yellow-bg);
  border-color:var(--yellow-border);
}
.dot{
  width:10px;height:10px;
  border-radius:50%;
  flex-shrink:0;
}
.dot.green{background:var(--green)}
.dot.red{background:var(--red)}
.dot.yellow{background:var(--yellow)}

/* SESSION */
.sessionbox{
  margin:10px 0 16px 0;
  padding:14px;
  background:#f8fafc;
  border-radius:12px;
  border:1px solid var(--line);
}
.sessionitem{
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  padding:8px 0;
  border-top:1px dashed #dbe2ea;
}
.sessionitem:first-child{border-top:0;padding-top:0}

/* GROUPBAR */
.groupbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.groupbar .btn{padding:7px 12px;border-radius:999px;font-size:12px}

/* NOTE */
.note{
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px 16px;
}
.stat-val{font-size:30px;font-weight:700;font-family:'DM Serif Display',serif;color:var(--navy);margin-top:4px}

/* MODAL */
.overlay{
  position:fixed;inset:0;
  background:rgba(15,35,55,.4);
  display:flex;align-items:center;justify-content:center;
  padding:18px;
  z-index:100;
  backdrop-filter:blur(4px);
}
.modal{
  background:#fff;
  border-radius:18px;
  border:1px solid var(--line);
  width:min(860px,100%);
  max-height:90vh;
  overflow:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.18);
}
.modal .modal-head{
  background:#fff;
  padding:18px 20px;
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:2;
}
.modal .modal-body{padding:20px}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--navy)}

/* INFO BOX */
.infobox{
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
  margin:10px 0;
}
.infobox.green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.infobox.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.infobox.yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.infobox.blue{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}

/* LASKU */
.table{width:100%;border-collapse:collapse}
.table th,.table td{border-top:1px solid var(--line);padding:9px;vertical-align:top;font-size:14px}
.table .r{text-align:right}
.invoiceBox{border:1.5px solid var(--line);border-radius:14px;padding:20px;background:#fff}

/* LEGEND */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}


/* KALENTERI */
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:3px;
  margin-top:10px;
}
.cal-dayname{
  text-align:center;
  font-size:11px;
  font-weight:700;
  color:var(--muted);
  padding:6px 2px;
  text-transform:uppercase;
  letter-spacing:.5px;
}
.cal-cell{
  min-height:90px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  padding:5px;
  vertical-align:top;
  position:relative;
}
.cal-cell.other-month{
  background:#f8fafc;
  opacity:.5;
}
.cal-cell.today{
  border-color:var(--navy);
  border-width:2px;
}
.cal-date{
  font-size:12px;
  font-weight:700;
  color:#64748b;
  margin-bottom:4px;
}
.cal-cell.today .cal-date{
  color:var(--navy);
  background:var(--navy);
  color:#fff;
  width:22px;height:22px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;
}
.cal-event{
  display:block;
  padding:2px 5px;
  border-radius:5px;
  font-size:10px;
  font-weight:600;
  margin-bottom:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  cursor:pointer;
  border:none;
  text-align:left;
  width:100%;
}
.cal-event.type-Kurssi{background:#dbeafe;color:#1e40af}
.cal-event.type-Charter{background:#d1fae5;color:#065f46}
.cal-event.type-Iltapurjehdus{background:#ede9fe;color:#5b21b6}
.cal-event.type-Päiväpurjehdus{background:#fef3c7;color:#92400e}
.cal-event.type-Purjehdusretki{background:#fee2e2;color:#991b1b}
.cal-event.type-Yritystilaisuus{background:#e0e7ff;color:#3730a3}
.cal-event.type-Muu{background:#f1f5f9;color:#475569}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-month-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);min-width:180px;text-align:center}
.cal-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600}
.cal-legend-dot{width:10px;height:10px;border-radius:3px}
@media(max-width:700px){
  .cal-cell{min-height:60px}
  .cal-event{font-size:9px;padding:1px 3px}
}

/* print */
@media print{
  header.app-header,nav.tabs,.noPrint{display:none!important}
  body{background:#fff}
  .card{border:0;box-shadow:none}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
(() => {
  window.onerror = function(msg, src, line, col, err){
    const el = document.getElementById("app");
    if(!el) return;
    el.innerHTML = `<pre style='padding:16px;color:#b00020;white-space:pre-wrap'>JS ERROR:\n${msg}\n${src}:${line}:${col}\n\n${err?.stack||""}</pre>`;
  };

  const STORAGE_KEY = "absolut37_v4_reservations";
  const ISSUER = { name:"J Sailing", businessId:"1728993-9" };
  const BANK = { bankName:"NORDEA", iban:"FI62 1132 3000 4277 43", bic:"NDEAFIHH" };

  const SAILING_TYPES = ["Iltapurjehdus","Päiväpurjehdus","Charter","Kurssi","Yritystilaisuus","Purjehdusretki","Muu"];
  const SAILING_GROUPS = [
    { id:"all",     label:"Kaikki",           types:null },
    { id:"courses", label:"Kurssit",           types:["Kurssi"] },
    { id:"charter", label:"Charter",           types:["Charter"] },
    { id:"evening", label:"Iltapurjehdukset",  types:["Iltapurjehdus"] },
    { id:"trips",   label:"Retket",            types:["Purjehdusretki"] },
    { id:"day",     label:"Päiväpurjehdukset", types:["Päiväpurjehdus"] },
    { id:"other",   label:"Muut",              types:["Yritystilaisuus","Muu"] },
  ];

  // ASIAKAS STATUS:
  // "pending"  = varattu, varausmaksu lähetetty mutta ei maksettu → punainen
  // "paid"     = varausmaksu maksettu, paikka vahvistettu → vihreä
  // "reserve"  = varapaikalla → keltainen

  const state = {
    tab:"dashboard",
    customers:[],
    sailings:[],
    companies:[],
    invoices:[],
    modal:null,
    editId:null,
    searchCustomers:"",
    searchSailings:"",
    openSailingId:null,
    sailingGroup:"all",
    invoice:{
      mode:"customer",
      sailingId:"",
      customerId:"",
      companyId:"",
      invoiceNo:"",
      invoiceDate: today(),
      type:"full" // "full" | "reservation"
    },
    registerMonth: today().slice(0,7),
    calendarMonth: today().slice(0,7)
  };

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      customers:state.customers,
      sailings:state.sailings,
      companies:state.companies,
      invoices:state.invoices
    }));
  }

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      // Try old key migration
      if(!raw){
        const old = localStorage.getItem("absolut37_v3_full_register_v2");
        if(old){
          const d = JSON.parse(old);
          state.customers = Array.isArray(d.customers)?d.customers:[];
          state.sailings  = Array.isArray(d.sailings)?d.sailings:[];
          state.companies = Array.isArray(d.companies)?d.companies:[];
          state.invoices  = Array.isArray(d.invoices)?d.invoices:[];
          // Migrate: add reservationStatus to customers
          state.customers.forEach(c=>{ if(!c.reservationStatus) c.reservationStatus="paid"; });
          save();
        }
      } else {
        const d = JSON.parse(raw);
        state.customers = Array.isArray(d.customers)?d.customers:[];
        state.sailings  = Array.isArray(d.sailings)?d.sailings:[];
        state.companies = Array.isArray(d.companies)?d.companies:[];
        state.invoices  = Array.isArray(d.invoices)?d.invoices:[];
      }
    }catch(e){}

    if(!state.invoice.invoiceNo) state.invoice.invoiceNo = "JS-"+today().replaceAll("-","");

    if(state.customers.length===0 && state.sailings.length===0 && state.companies.length===0){
      const coId = genId("B");
      state.companies.push({id:coId, name:"Esimerkki Oy", businessId:"1234567-8", email:"info@esimerkki.fi", commissionPct:10});
      const sid = genId("S");
      state.sailings.push({
        id:sid, name:"Merenkulkukurssi 1", date:today(), type:"Kurssi",
        maxPersons:4, reserveSlots:2, pricePerPerson:350, reservationFee:80, sessions:[]
      });
      const c1 = genId("C");
      const c2 = genId("C");
      const c3 = genId("C");
      state.customers.push(
        {id:c1, name:"Matti Merimies", phone:"0401111111", email:"matti@esimerkki.fi", sailingId:sid, billTo:"self", companyId:"", reservationStatus:"paid"},
        {id:c2, name:"Siiri Seteli",   phone:"0402222222", email:"siiri@esimerkki.fi", sailingId:sid, billTo:"self", companyId:"", reservationStatus:"pending"},
        {id:c3, name:"Janne Vara",     phone:"0403333333", email:"janne@esimerkki.fi", sailingId:sid, billTo:"self", companyId:"", reservationStatus:"reserve"}
      );
    }

    // Ensure all sailings have reserveSlots and reservationFee
    state.sailings.forEach(s=>{
      if(s.reserveSlots==null) s.reserveSlots = 2;
      if(s.reservationFee==null) s.reservationFee = 0;
    });

    if(!state.invoice.sailingId && state.sailings[0]) state.invoice.sailingId = state.sailings[0].id;
  }

  function genId(p){ return p + Math.random().toString(16).slice(2,8).toUpperCase(); }
  function today(){ return new Date().toISOString().slice(0,10); }
  function esc(s){ return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
  function fmtDate(d){ return d ? new Date(d+"T00:00:00").toLocaleDateString("fi-FI") : ""; }

  function getSailingCustomers(sailingId){
    return state.customers.filter(c=>c.sailingId===sailingId);
  }
  function confirmedCount(sailingId){
    return state.customers.filter(c=>c.sailingId===sailingId && c.reservationStatus==="paid").length;
  }
  function pendingCount(sailingId){
    return state.customers.filter(c=>c.sailingId===sailingId && c.reservationStatus==="pending").length;
  }
  function reserveCount(sailingId){
    return state.customers.filter(c=>c.sailingId===sailingId && c.reservationStatus==="reserve").length;
  }
  function enrolledCount(sailingId){
    return state.customers.filter(c=>c.sailingId===sailingId).length;
  }

  function vatRate(s){ return (s && s.type==="Charter") ? 0.135 : 0.255; }

  function finnishReference(baseDigits){
    const digits = String(baseDigits||"").replace(/\D/g,"");
    if(!digits) return "";
    const weights=[7,3,1];
    let sum=0, wi=0;
    for(let i=digits.length-1;i>=0;i--){ sum += Number(digits[i]) * weights[wi%3]; wi++; }
    return digits + String((10-(sum%10))%10);
  }

  function nextInvoiceNumber(){
    const year = new Date().getFullYear();
    // Etsi korkein järjestysnumero tänä vuonna
    let max = 0;
    for(const inv of state.invoices){
      // Formaatti JS-YYYY-NNN
      const m = String(inv.invoiceNo||"").match(/^JS-(\d{4})-(\d+)$/);
      if(m && Number(m[1])===year){
        max = Math.max(max, Number(m[2]));
      }
    }
    const seq = String(max+1).padStart(3,"0");
    return `JS-${year}-${seq}`;
  }

  function invoiceReference(){
    const base = (state.invoice.invoiceNo||"").replace(/\D/g,"") || today().replaceAll("-","");
    return finnishReference(base);
  }

  function groupCounts(){
    const counts={};
    for(const g of SAILING_GROUPS){
      if(!g.types){counts[g.id]=state.sailings.length; continue;}
      counts[g.id]=state.sailings.filter(s=>g.types.includes(s.type)).length;
    }
    return counts;
  }

  // FILL UI with confirmed (green) + pending (red) + reserve (yellow) segments
  function fillUI(sailingId, maxPersons, reserveSlots){
    const max = Math.max(1, Number(maxPersons||0)||1);
    const rsv = Math.max(0, Number(reserveSlots||0)||0);
    const total = max + rsv;

    const conf = confirmedCount(sailingId);
    const pend = pendingCount(sailingId);
    const res  = reserveCount(sailingId);

    const confPct = Math.min(100, Math.round((conf/total)*100));
    const pendPct = Math.min(100-confPct, Math.round((pend/total)*100));

    const mainFull = (conf+pend) >= max;

    return `
      <div class="fillrow">
        <div class="fillbar-wrap">
          <div class="fillbar-confirmed" style="width:${confPct}%"></div>
          <div class="fillbar-reserve" style="width:${pendPct}%"></div>
        </div>
        <div class="filltext">
          <span style="color:#166b47">✓${conf}</span>
          ${pend>0?`<span style="color:#c0392b"> ●${pend} odottaa</span>`:""}
          ${res>0?`<span style="color:#92400e"> ◎${res} vara</span>`:""}
          <span style="color:#94a3b8"> / max ${max}+${rsv}</span>
        </div>
      </div>
    `;
  }

  function statusBadge(status){

  function computeInvoice(){
    const s = state.sailings.find(x=>x.id===state.invoice.sailingId)||null;
    const rate = vatRate(s);
    const ratePct = (rate*100).toFixed(1);

    let payerName="", payerEmail="", payerBusinessId="";
    let lines=[], grossTotal=0, eventName="";

    const isReservation = (state.invoice.type==="reservation");

    if(s){
      eventName = s.name||"";
      const fullPrice = Number(s.pricePerPerson||0);
      const resFee   = Number(s.reservationFee||0);
      const price = isReservation ? resFee : fullPrice;

      if(state.invoice.mode==="customer"){
        const c = state.customers.find(x=>x.id===state.invoice.customerId);
        if(c){
          payerName  = c.name||"";
          payerEmail = c.email||"";
          const desc = isReservation ? `${s.name} — varausmaksu — ${c.name}` : `${s.name} — ${c.name}`;
          lines.push({title:desc, qty:1, unit:price, total:price});
          grossTotal = price;
        }
      }else{
        const co = state.companies.find(x=>x.id===state.invoice.companyId);
        if(co){
          payerName      = co.name||"";
          payerEmail     = co.email||"";
          payerBusinessId= co.businessId||"";
          const cust = state.customers
            .filter(c=>c.sailingId===s.id && c.billTo==="company" && c.companyId===co.id)
            .slice().sort((a,b)=>(a.name||"").localeCompare(b.name||""));
          const gross = cust.length * price;
          for(const c of cust){
            const desc = isReservation ? `${s.name} — varausmaksu — ${c.name}` : `${s.name} — ${c.name}`;
            lines.push({title:desc, qty:1, unit:price, total:price});
          }
          const commission = gross * (Number(co.commissionPct||0)/100);
          if(commission>0) lines.push({title:"Välitysprovisio", qty:1, unit:-commission, total:-commission});
          grossTotal = gross - commission;
        }
      }
    }

    const net = (grossTotal||0)/(1+rate);
    const vat = (grossTotal||0)-net;

    return {
      sailing:s, rate, ratePct,
      payerName, payerEmail, payerBusinessId,
      lines, grossTotal, net, vat,
      reference:invoiceReference(),
      eventName, isReservation
    };
  }

  function monthSummary(month){
    const rows = state.invoices.filter(x=>String(x.invoiceDate||"").slice(0,7)===month);
    const sum = {
      m:month,
      r255:{net:0,vat:0,gross:0,count:0},
      r135:{net:0,vat:0,gross:0,count:0},
      all:{net:0,vat:0,gross:0,count:0}
    };
    for(const x of rows){
      const r=Number(x.vatRatePct||0);
      const bucket=(Math.abs(r-25.5)<0.2)?"r255":(Math.abs(r-13.5)<0.2)?"r135":null;
      if(bucket){sum[bucket].net+=Number(x.net||0);sum[bucket].vat+=Number(x.vat||0);sum[bucket].gross+=Number(x.grossTotal||0);sum[bucket].count+=1;}
      sum.all.net+=Number(x.net||0);sum.all.vat+=Number(x.vat||0);sum.all.gross+=Number(x.grossTotal||0);sum.all.count+=1;
    }
    return sum;
  }

  function renderCalendar(){
    const [year, month] = state.calendarMonth.split("-").map(Number);
    const monthNames = ["Tammikuu","Helmikuu","Maaliskuu","Huhtikuu","Toukokuu","Kesäkuu",
                        "Heinäkuu","Elokuu","Syyskuu","Lokakuu","Marraskuu","Joulukuu"];
    const dayNames = ["Ma","Ti","Ke","To","Pe","La","Su"];

    // First day of month (0=Sun..6=Sat), convert to Mon-based
    const firstDay = new Date(year, month-1, 1).getDay();
    const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
    const daysInMonth = new Date(year, month, 0).getDate();
    const daysInPrev  = new Date(year, month-1, 0).getDate();

    const todayStr = today();

    // Build event map: date string -> sailings[]
    const eventMap = {};
    for(const s of state.sailings){
      if(!s.date) continue;
      if(!eventMap[s.date]) eventMap[s.date] = [];
      eventMap[s.date].push(s);
      // Also add sessions
      for(const sess of (s.sessions||[])){
        if(!sess.date) continue;
        if(!eventMap[sess.date]) eventMap[sess.date] = [];
        // Mark as session event
        eventMap[sess.date].push({...s, _sessionLabel: sess.start?(s.name+" klo "+sess.start):s.name, _isSession:true});
      }
    }

    // Build cells
    const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
    let cells = "";
    for(let i=0; i<totalCells; i++){
      let cellDay, cellMonth, cellYear, otherMonth=false;
      if(i < startOffset){
        cellDay = daysInPrev - startOffset + i + 1;
        cellMonth = month===1?12:month-1;
        cellYear  = month===1?year-1:year;
        otherMonth=true;
      } else if(i >= startOffset + daysInMonth){
        cellDay = i - startOffset - daysInMonth + 1;
        cellMonth = month===12?1:month+1;
        cellYear  = month===12?year+1:year;
        otherMonth=true;
      } else {
        cellDay = i - startOffset + 1;
        cellMonth = month;
        cellYear  = year;
      }
      const dateStr = cellYear+"-"+String(cellMonth).padStart(2,"0")+"-"+String(cellDay).padStart(2,"0");
      const isToday = dateStr===todayStr;
      const events = eventMap[dateStr]||[];

      const evHTML = events.slice(0,3).map(s=>{
        const typeClass = "type-"+(s.type||"Muu").replace(/\s/g,"_");
        const label = s._sessionLabel || s.name;
        const booked = s._isSession ? "" : ` (${enrolledCount(s.id)}/${s.maxPersons||0})`;
        return `<button class="cal-event ${typeClass}" data-action="edit-sailing" data-id="${s.id}" title="${esc(label)}">${esc(label)}${booked}</button>`;
      }).join("");
      const moreHTML = events.length>3 ? `<div style="font-size:10px;color:var(--muted);padding:1px 4px">+${events.length-3} lisää</div>` : "";

      cells += `<div class="cal-cell${otherMonth?" other-month":""}${isToday?" today":""}">
        <div class="cal-date">${cellDay}</div>
        ${evHTML}${moreHTML}
      </div>`;
    }

    const TYPES = ["Kurssi","Charter","Iltapurjehdus","Päiväpurjehdus","Purjehdusretki","Yritystilaisuus","Muu"];
    const legendHTML = TYPES.map(t=>`
      <div class="cal-legend-item">
        <div class="cal-legend-dot cal-event type-${t.replace(/\s/g,"_")}"></div>
        ${esc(t)}
      </div>
    `).join("");

    const prevMonth = month===1 ? year-1+"-12" : year+"-"+String(month-1).padStart(2,"0");
    const nextMonth = month===12 ? year+1+"-01" : year+"-"+String(month+1).padStart(2,"0");

    return `
      <div class="card">
        <div class="row between">
          <div class="cal-nav">
            <button class="btn secondary sm" data-action="cal-prev" data-month="${prevMonth}">‹ Edellinen</button>
            <div class="cal-month-title">${monthNames[month-1]} ${year}</div>
            <button class="btn secondary sm" data-action="cal-next" data-month="${nextMonth}">Seuraava ›</button>
          </div>
          <button class="btn secondary sm" data-action="cal-today">Tänään</button>
        </div>

        <div class="cal-legend">${legendHTML}</div>

        <div class="cal-grid" style="margin-top:14px">
          ${dayNames.map(d=>`<div class="cal-dayname">${d}</div>`).join("")}
          ${cells}
        </div>
      </div>
    `;
  }

  // ─────────────── BIND ───────────────
  function bind(){
    document.querySelectorAll("[data-tab]").forEach(b=>{
      b.onclick=()=>{ state.tab=b.dataset.tab; render(); };
    });

    const sc=document.querySelector('[data-action="search-customers"]');
    if(sc){ sc.oninput=e=>{state.searchCustomers=e.target.value;render();}; sc.onkeydown=e=>{if(e.key==="Enter")e.preventDefault();}; }
    const ss=document.querySelector('[data-action="search-sailings"]');
    if(ss){ ss.oninput=e=>{state.searchSailings=e.target.value;render();}; ss.onkeydown=e=>{if(e.key==="Enter")e.preventDefault();}; }

    document.querySelector('[data-action="restore-json"]')?.addEventListener("change",async(e)=>{
      const file=e.target.files&&e.target.files[0]; if(!file) return;
      try{
        const text=await file.text(); const data=JSON.parse(text);
        if(!confirm("Palautus korvaa nykyiset tiedot. Jatketaanko?")) return;
        state.customers=Array.isArray(data.customers)?data.customers:[];
        state.sailings=Array.isArray(data.sailings)?data.sailings:[];
        state.companies=Array.isArray(data.companies)?data.companies:[];
        state.invoices=Array.isArray(data.invoices)?data.invoices:[];
        state.customers.forEach(c=>{if(!c.reservationStatus)c.reservationStatus="paid";});
        state.sailings.forEach(s=>{if(s.reserveSlots==null)s.reserveSlots=2;if(s.reservationFee==null)s.reservationFee=0;});
        save(); render();
      }catch(err){ alert("Palautus epäonnistui: virheellinen JSON."); }
      finally{ e.target.value=""; }
    });

    document.querySelector('[data-action="inv-sailing"]')?.addEventListener("change",e=>{state.invoice.sailingId=e.target.value;state.invoice.type="full";render();});
    document.querySelector('[data-action="inv-mode"]')?.addEventListener("change",e=>{state.invoice.mode=e.target.value;render();});
    document.querySelector('[data-action="inv-type"]')?.addEventListener("change",e=>{state.invoice.type=e.target.value;render();});
    document.querySelector('[data-action="inv-customer"]')?.addEventListener("change",e=>{state.invoice.customerId=e.target.value;render();});
    document.querySelector('[data-action="inv-company"]')?.addEventListener("change",e=>{state.invoice.companyId=e.target.value;render();});
    // inv-no on automaattinen, ei tarvita listeneriä
    document.querySelector('[data-action="inv-date"]')?.addEventListener("change",e=>{state.invoice.invoiceDate=e.target.value;render();});
    document.querySelector('[data-action="reg-month"]')?.addEventListener("input",e=>{state.registerMonth=(e.target.value||"").trim();});

    document.querySelectorAll('[data-action="reg-paid"]').forEach(cb=>{
      cb.onchange=()=>{
        const x=state.invoices.find(z=>z.id===cb.dataset.id); if(!x) return;
        x.paid=!!cb.checked;
        if(x.paid){ const pd=prompt("Maksupäivä (YYYY-MM-DD):",x.paidDate||today()); if(!pd){x.paid=false;x.paidDate="";}else{x.paidDate=pd;} }
        else{ x.paidDate=""; }
        save(); render();
      };
    });

    document.querySelectorAll("[data-action]").forEach(el=>{
      el.onclick=()=>{
        const a=el.dataset.action;
        const itemId=el.dataset.id;
        const idx=(typeof el.dataset.idx!=="undefined")?Number(el.dataset.idx):null;

        if(a==="cal-prev"||a==="cal-next"){state.calendarMonth=el.dataset.month;render();return;}
        if(a==="cal-today"){state.calendarMonth=today().slice(0,7);render();return;}
        if(a==="set-group"){state.sailingGroup=itemId;render();return;}
        if(a==="new-customer"){state.modal="customer";state.editId=null;render();return;}
        if(a==="edit-customer"){state.modal="customer";state.editId=itemId;render();return;}
        if(a==="new-sailing"){state.modal="sailing";state.editId=null;render();return;}
        if(a==="edit-sailing"){state.modal="sailing";state.editId=itemId;render();return;}
        if(a==="new-company"){state.modal="company";state.editId=null;render();return;}
        if(a==="edit-company"){state.modal="company";state.editId=itemId;render();return;}
        if(a==="open-register"){state.modal="register";state.editId=null;render();return;}
        if(a==="close-modal"){state.modal=null;state.editId=null;render();return;}
        if(a==="toggle-sailing"){state.openSailingId=(state.openSailingId===itemId)?null:itemId;render();return;}

        // Merkitse varausmaksu maksetuksi
        if(a==="confirm-payment"){
          const c=state.customers.find(x=>x.id===itemId);
          if(!c) return;
          if(!confirm(`Merkitäänkö ${c.name} varausmaksu suoritetuksi? Asiakas muuttuu vihreäksi (vahvistettu).`)) return;
          c.reservationStatus="paid";
          save(); render(); return;
        }

        // Ylennä varapaikalta
        if(a==="promote-reserve"){
          const c=state.customers.find(x=>x.id===itemId);
          if(!c) return;
          const s=state.sailings.find(x=>x.id===c.sailingId);
          if(!s) return;
          const max=Number(s.maxPersons||0);
          const confirmed=confirmedCount(s.id);
          if(confirmed>=max){
            alert(`Kurssi on jo täynnä (${confirmed}/${max} vahvistettua). Vapauta paikka ennen ylentämistä.`);
            return;
          }
          if(!confirm(`Siirretäänkö ${c.name} varapaikalta odottamaan varausmaksua?`)) return;
          c.reservationStatus="pending";
          save(); render(); return;
        }

        if(a==="add-session"){
          const s=state.sailings.find(x=>x.id===itemId); if(!s) return;
          const date=prompt("Kurssipäivä (YYYY-MM-DD):",today()); if(!date) return;
          const start=prompt("Aloitusaika (HH:MM):","17:00")||"";
          const end=prompt("Lopetusaika (HH:MM):","20:00")||"";
          const note=prompt("Lisähuomio:","",)||"";
          if(!Array.isArray(s.sessions)) s.sessions=[];
          s.sessions.push({date,start,end,note});
          save(); render(); return;
        }

        if(a==="delete-session"){
          const s=state.sailings.find(x=>x.id===itemId); if(!s||!Array.isArray(s.sessions)) return;
          if(idx===null||Number.isNaN(idx)) return;
          if(!confirm("Poistetaanko kurssipäivä?")) return;
          s.sessions.splice(idx,1); save(); render(); return;
        }

        if(a==="save-customer"){
          const name=(document.querySelector('[data-field="name"]')?.value||"").trim();
          if(!name) return alert("Nimi pakollinen");
          const phone=(document.querySelector('[data-field="phone"]')?.value||"").trim();
          const email=(document.querySelector('[data-field="email"]')?.value||"").trim();
          const sailingId=(document.querySelector('[data-field="sailingId"]')?.value||"");
          const billTo=(document.querySelector('[data-field="billTo"]')?.value||"self");
          const companyId=(document.querySelector('[data-field="companyId"]')?.value||"");
          const reservationStatus=(document.querySelector('[data-field="reservationStatus"]')?.value||"pending");

          if(billTo==="company"&&!companyId) return alert("Valitse tilaajayritys.");

          if(sailingId&&reservationStatus!=="reserve"){
            const s=state.sailings.find(x=>x.id===sailingId);
            if(s){
              const max=Number(s.maxPersons||0)||0;
              const rsv=Number(s.reserveSlots||0)||0;
              const total=max+rsv;
              const booked=enrolledCount(sailingId);
              const editing=!!state.editId;
              const wasInSame=editing?(state.customers.find(x=>x.id===state.editId)?.sailingId===sailingId):false;
              const eff=wasInSame?booked-1:booked;
              if(total>0&&eff>=total){
                return alert(`Purjehdus on täynnä (${booked}/${total} sis. varapaikat). Lisää varapaikkoja tai valitse toinen.`);
              }
            }
          }

          if(state.editId){
            const c=state.customers.find(x=>x.id===state.editId); if(!c) return;
            c.name=name;c.phone=phone;c.email=email;c.sailingId=sailingId;
            c.billTo=billTo;c.companyId=(billTo==="company")?companyId:"";
            c.reservationStatus=reservationStatus;
          }else{
            state.customers.push({id:genId("C"),name,phone,email,sailingId,billTo,companyId:(billTo==="company")?companyId:"",reservationStatus});
          }
          save(); state.modal=null; state.editId=null; render(); return;
        }

        if(a==="save-sailing"){
          const name=(document.querySelector('[data-field="name"]')?.value||"").trim();
          const date=(document.querySelector('[data-field="date"]')?.value||"").trim();
          const type=(document.querySelector('[data-field="type"]')?.value||"").trim();
          const maxPersons=parseInt(document.querySelector('[data-field="maxPersons"]')?.value,10)||1;
          const reserveSlots=Math.max(0,parseInt(document.querySelector('[data-field="reserveSlots"]')?.value,10)||0);
          const pricePerPerson=parseFloat(document.querySelector('[data-field="pricePerPerson"]')?.value)||0;
          const reservationFee=parseFloat(document.querySelector('[data-field="reservationFee"]')?.value)||0;
          if(!name||!date||!type) return alert("Täytä pakolliset kentät.");
          if(state.editId){
            const s=state.sailings.find(x=>x.id===state.editId); if(!s) return;
            s.name=name;s.date=date;s.type=type;s.maxPersons=maxPersons;s.reserveSlots=reserveSlots;
            s.pricePerPerson=pricePerPerson;s.reservationFee=reservationFee;
            if(!Array.isArray(s.sessions)) s.sessions=[];
          }else{
            state.sailings.push({id:genId("S"),name,date,type,maxPersons,reserveSlots,pricePerPerson,reservationFee,sessions:[]});
          }
          if(!state.invoice.sailingId) state.invoice.sailingId=state.sailings[0]?.id||"";
          save(); state.modal=null; state.editId=null; render(); return;
        }

        if(a==="save-company"){
          const name=(document.querySelector('[data-field="name"]')?.value||"").trim();
          if(!name) return alert("Yrityksen nimi pakollinen.");
          const businessId=(document.querySelector('[data-field="businessId"]')?.value||"").trim();
          const email=(document.querySelector('[data-field="email"]')?.value||"").trim();
          const commissionPct=parseFloat(document.querySelector('[data-field="commissionPct"]')?.value)||0;
          if(state.editId){
            const co=state.companies.find(x=>x.id===state.editId); if(!co) return;
            co.name=name;co.businessId=businessId;co.email=email;co.commissionPct=commissionPct;
          }else{
            state.companies.push({id:genId("B"),name,businessId,email,commissionPct});
          }
          save(); state.modal=null; state.editId=null; render(); return;
        }

        if(a==="delete-customer"){
          if(!confirm("Poistetaanko asiakas?")) return;
          state.customers=state.customers.filter(c=>c.id!==itemId);
          save(); render(); return;
        }
        if(a==="delete-sailing"){
          if(!confirm("Poistetaanko purjehdus?")) return;
          state.sailings=state.sailings.filter(s=>s.id!==itemId);
          if(state.openSailingId===itemId) state.openSailingId=null;
          save(); render(); return;
        }
        if(a==="delete-company"){
          if(!confirm("Poistetaanko yritys?")) return;
          state.companies=state.companies.filter(co=>co.id!==itemId);
          state.customers.forEach(c=>{if(c.companyId===itemId){c.companyId="";if(c.billTo==="company")c.billTo="self";}});
          save(); render(); return;
        }

        if(a==="save-invoice-register"){
          const inv=computeInvoice();
          if(!inv.sailing) return alert("Valitse tapahtuma.");
          if(!inv.payerName) return alert("Valitse maksaja.");
          if(inv.lines.length===0) return alert("Laskulla ei ole rivejä.");
          const autoNo = nextInvoiceNumber();
          const autoRef = finnishReference(autoNo.replace(/\D/g,""));
          const rec={
            id:genId("I"), mode:state.invoice.mode,
            isReservation:!!inv.isReservation,
            invoiceNo:autoNo,
            invoiceDate:(state.invoice.invoiceDate||"").trim(),
            reference:autoRef,
            payerName:inv.payerName, payerBusinessId:inv.payerBusinessId||"", payerEmail:inv.payerEmail||"",
            eventId:inv.sailing.id, eventName:inv.eventName,
            vatRatePct:Number(inv.ratePct), net:Number(inv.net||0),
            vat:Number(inv.vat||0), grossTotal:Number(inv.grossTotal||0),
            paid:false, paidDate:""
          };
          state.invoices.push(rec);
          save();
          alert(`Tallennettu laskurekisteriin.\nLaskunro: ${autoNo}\nViite: ${autoRef}`);
          render(); return;
        }

        if(a==="delete-register"){
          if(!confirm("Poistetaanko lasku rekisteristä?")) return;
          state.invoices=state.invoices.filter(x=>x.id!==itemId);
          save(); render(); return;
        }

        if(a==="export-register-csv"){ exportCSV(); return; }
        if(a==="backup-json"){ backupJSON(); return; }
        if(a==="print"){ window.print(); return; }
        if(a==="email"){ sendEmail(); return; }
      };
    });
  }

  function exportCSV(){
    const month=(state.registerMonth||"").trim()||today().slice(0,7);
    const rows=state.invoices.filter(x=>String(x.invoiceDate||"").slice(0,7)===month).slice().sort((a,b)=>(a.invoiceDate||"").localeCompare(b.invoiceDate||""));
    if(rows.length===0){alert("Ei laskuja valitussa kuukaudessa.");return;}
    const sep=";";
    const header=["Päivä","Laskunro","Viite","Maksaja","Maksaja Y-tunnus","Maksaja email","Tapahtuma","Malli","Laskulaji","ALV %","Netto","ALV","Brutto","Maksettu","Maksupäivä"].join(sep);
    const lines=rows.map(x=>[
      x.invoiceDate||"",x.invoiceNo||"",x.reference||"",
      x.payerName||"",x.payerBusinessId||"",x.payerEmail||"",
      x.eventName||"",
      (x.mode==="company"?"Yrityslasku":"Asiakaskohtainen"),
      (x.isReservation?"Varausmaksu":"Täysi lasku"),
      (x.vatRatePct!=null?String(x.vatRatePct).replace(".",","):""),
      Number(x.net||0).toFixed(2).replace(".",","),
      Number(x.vat||0).toFixed(2).replace(".",","),
      Number(x.grossTotal||0).toFixed(2).replace(".",","),
      x.paid?"Kyllä":"Ei",x.paidDate||""
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(sep));
    const csv=[header,...lines].join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`laskurekisteri_${month}.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  function backupJSON(){
    const blob=new Blob([JSON.stringify({customers:state.customers,sailings:state.sailings,companies:state.companies,invoices:state.invoices},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`absolut37_backup_${today()}.json`; a.click();
    URL.revokeObjectURL(url);
  }

  function sendEmail(){
    const box=document.getElementById("invoiceBox"); if(!box){alert("Laskua ei löytynyt.");return;}
    const text=box.innerText;
    let to="";
    if(state.invoice.mode==="customer"){ const c=state.customers.find(x=>x.id===state.invoice.customerId); to=c?.email||""; }
    else{ const co=state.companies.find(x=>x.id===state.invoice.companyId); to=co?.email||""; }
    window.location.href=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent("Lasku "+(state.invoice.invoiceNo||""))}&body=${encodeURIComponent(text)}`;
  }

  load();
  render();
})();
</script>
