"}>${o.l}</option>`).join("")}</select></div><div class="field"><label class="lbl">Laskutusperuste</label><select id="inv-mode">${[{v:"customer",l:"Osallistuja"},{v:"company",l:"Yritys"}].map(o=>`<option value="${o.v}" ${state.invoice.mode===o.v?"selected":""}>${o.l}</option>`).join("")}</select></div></div>${state.invoice.source==="sailing"?`<div class="field"><label class="lbl">Purjehdus</label><select id="inv-sailing">${state.sailings.map(s=>`<option value="${s.id}" ${state.invoice.sailingId===s.id?"selected":""}>${esc(s.name)} (${fmtDate(s.date)})</option>`).join("")}</select></div>`:""}${state.invoice.source==="tutkinto"?`<div class="field"><label class="lbl">Tutkinto</label><select id="inv-tutkinto">${state.tutkinnot.map(t=>`<option value="${t.id}" ${state.invoice.tutkintoId===t.id?"selected":""}>${esc(t.name)} (${fmtDate(t.date)})</option>`).join("")}</select></div>`:""}${state.invoice.mode==="customer"?`<div class="field"><label class="lbl">Osallistuja</label><select id="inv-customer">${state.customers.map(c=>`<option value="${c.id}" ${state.invoice.customerId===c.id?"selected":""}>${esc(c.name)}</option>`).join("")}</select></div>`:""}${state.invoice.mode==="company"?`<div class="field"><label class="lbl">Yritys</label><select id="inv-company">${state.companies.map(c=>`<option value="${c.id}" ${state.invoice.companyId===c.id?"selected":""}>${esc(c.name)}</option>`).join("")}</select></div>`:""}${state.invoice.type==="partial"?`<div class="field"><label class="lbl">Osittaisen laskun summa</label><input type="number" step="0.01" id="inv-partial" value="${state.invoice.partialAmount||""}"/></div>`:""}<div class="field"><label class="lbl">Laskun pvm</label><input type="date" id="inv-date" value="${state.invoice.invoiceDate}"/></div><div class="row" style="gap:10px;margin-top:20px"><button class="btn btn-primary" data-action="create-invoice">Luo lasku</button><button class="btn btn-secondary" data-action="close-modal">Peruuta</button></div></div></div></div>`;return html;}function renderInvoicePreviewModal(){const inv=state.previewInvoiceId?state.invoices.find(i=>i.id===state.previewInvoiceId):null;if(!inv)return"";const payer=state.customers.find(c=>c.name===inv.payerName)||state.companies.find(c=>c.name===inv.payerName)||{};const netTotal=Number(inv.netTotal||0);const vatTotal=Number(inv.vatTotal||0);const grossTotal=Number(inv.grossTotal||0);let html=`<div class="overlay" data-action="close-modal"><div class="modal" onclick="event.stopPropagation()" style="width:min(950px,100%)"><div class="modal-body"><div class="invoice-box noPrint" style="border:none;padding:0;margin-bottom:20px"><div style="display:flex;justify-content:space-between;align-items:center;gap:20px"><div><h1 style="font-size:24px;font-weight:700;color:#0a4272;margin:0">LASKU</h1><p style="font-size:12px;color:#6b7280;margin:4px 0 0">Numero: <strong>${esc(inv.invoiceNo)}</strong></p><p style="font-size:12px;color:#6b7280;margin:4px 0 0">Pvm: <strong>${fmtDate(inv.invoiceDate)}</strong></p></div><div style="text-align:right"><h2 style="font-size:18px;font-weight:600;color:#111827">${ISSUER.name}</h2><p style="font-size:11px;color:#6b7280;line-height:1.4">Y-tunnus: ${ISSUER.businessId}<br/>${ISSUER.address}</p></div></div></div><div style="text-align:center;margin:16px 0"><div style="margin-bottom:12px"><canvas id="barcodeCanvas" style="max-width:100%;height:60px"></canvas></div><div><canvas id="qrcodeCanvas" style="width:140px;height:140px"></canvas></div></div><table class="table" style="margin-top:20px"><thead><tr style="background:#f3f4f6"><th style="text-align:left">Kuvaus</th><th style="text-align:right">Hinta</th><th style="text-align:right">Yhteensä</th></tr></thead><tbody><tr><td>${esc(inv.description||"Palvelut")}</td><td class="r">${netTotal.toFixed(2)} EUR</td><td class="r">${netTotal.toFixed(2)} EUR</td></tr></tbody></table><div style="text-align:right;padding-top:20px;border-top:2px solid #d1d5db;margin-top:20px"><div style="display:grid;grid-template-columns:150px 1fr;gap:20px;margin-top:10px;font-size:14px"><div style="text-align:right"><strong>Yhteensä:</strong><br/><strong style="font-size:18px;color:#0a4272">${grossTotal.toFixed(2)} EUR</strong></div></div></div><div style="margin-top:30px;padding:15px;background:#faf8f3;border-radius:10px;border:1px solid #e5d4b8"><p style="font-size:11px;color:#111827;margin:0;line-height:1.6"><strong>Maksutiedot:</strong><br/>Saaja: ${esc(ISSUER.name)}<br/>Tilinumero: ${ISSUER.iban}<br/>BIC: ${ISSUER.bic}<br/>Viitenumero: ${esc(inv.reference||\"\")}</p></div><div style="margin-top:20px;text-align:center"><button class="btn btn-secondary btn-sm noPrint" onclick="window.print()">🖨️ Tulosta</button><button class="btn btn-secondary btn-sm noPrint" data-action="close-modal" style="margin-left:8px">Sulje</button>${inv.isPaid?'':`<button class="btn btn-primary btn-sm noPrint" data-action="mark-paid" data-id="${inv.id}" style="margin-left:8px">✓ Merkitse maksetuksi</button>`}</div></div></div></div>`;return html;}function bind(){document.getElementById("btn-login")?.addEventListener("click",async()=>{try{const provider=new GoogleAuthProvider();const result=await signInWithPopup(auth,result.user);if(result.user.email!==ALLOWED_EMAIL)throw new Error("Unauthorized email");state.user=result.user;render();}catch(e){alert("Kirjautuminen epäonnistui: "+e.message);}});document.getElementById("btn-signout")?.addEventListener("click",async()=>{try{await signOut(auth);state.user=null;render();}catch(e){alert("Kirjautuminen ulos epäonnistui: "+e.message);}});document.querySelectorAll("[data-action]").forEach(el=>{el.addEventListener("click",async(ev)=>{ev.stopPropagation();const action=el.getAttribute("data-action");const itemId=el.getAttribute("data-id");const idx=el.getAttribute("data-idx");if(action==="new-sailing"){state.editId=null;state.modal="edit-sailing";render();}if(action==="save-sailing"){const sailData={name:document.getElementById("sail-name").value,type:document.getElementById("sail-type").value,date:document.getElementById("sail-date").value,startTime:document.getElementById("sail-start")?.value||"",endTime:document.getElementById("sail-end")?.value||"",reitti:document.getElementById("sail-reitti")?.value||"",notes:document.getElementById("sail-notes").value};if(document.getElementById("sail-multiday")?.checked){sailData.endDate=document.getElementById("sail-enddate").value;delete sailData.startTime;delete sailData.endTime;}sailData.maxPersons=Number(document.getElementById("sail-maxpersons")?.value||0);sailData.reserveSlots=Number(document.getElementById("sail-reserve")?.value||0);sailData.price=Number(document.getElementById("sail-price")?.value||0);if(state.editId){const existing=state.sailings.find(s=>s.id===state.editId);if(existing){Object.assign(existing,sailData);await fsSet("sailings",state.editId,sailData);}state.editId=null;}else{const id=await fsAdd("sailings",sailData);}state.modal=null;render();}if(action==="open-sailing"){state.editId=itemId;state.modal="edit-sailing";render();}if(action==="delete-sailing"){if(!confirm("Poistetaanko purjehdus?"))return;const sail=state.sailings.find(s=>s.id===state.editId);if(sail)await fsDel("sailings",sail.id);state.editId=null;state.modal=null;render();}if(action==="new-tutkinto"){state.editId=null;state.modal="edit-tutkinto";render();}if(action==="save-tutkinto"){const tutData={name:document.getElementById("tut-name").value,type:document.getElementById("tut-type").value,date:document.getElementById("tut-date").value,notes:document.getElementById("tut-notes").value,participants:[]};if(state.editId){const existing=state.tutkinnot.find(t=>t.id===state.editId);if(existing){Object.assign(existing,tutData);await fsSet("tutkinnot",state.editId,tutData);}state.editId=null;}else{const id=await fsAdd("tutkinnot",tutData);}state.modal=null;render();}if(action==="edit-tutkinto"){state.editId=itemId;state.modal="edit-tutkinto";render();}if(action==="delete-tutkinto"){if(!confirm("Poistetaanko tutkinto?"))return;await fsDel("tutkinnot",state.editId);state.editId=null;state.modal=null;render();}if(action==="new-invoice"){state.modal="invoice";render();}if(action==="create-invoice"){const cusId=document.getElementById("inv-customer")?.value;const compId=document.getElementById("inv-company")?.value;const sailId=document.getElementById("inv-sailing")?.value;const tutId=document.getElementById("inv-tutkinto")?.value;const payer=cusId?state.customers.find(c=>c.id===cusId):compId?state.companies.find(c=>c.id===compId):null;if(!payer){alert("Valitse maksaja");return;}const invData={invoiceNo:nextInvoiceNumber(),invoiceDate:document.getElementById("inv-date").value,payerName:payer.name,eventId:sailId||tutId,netTotal:100,vatTotal:25,grossTotal:125,reference:finnishReference(Math.random().toString(36).slice(2,11)),isPaid:false};await fsAdd("invoices",invData);state.modal=null;state.invoice={mode:"customer",source:"sailing",sailingId:"",tutkintoId:"",customerId:"",companyId:"",invoiceDate:today(),type:"full",partialAmount:"",creditRefId:"",issuer:"tmi"};render();}if(action==="preview-invoice"){state.previewInvoiceId=itemId;state.modal="preview-invoice";render();setTimeout(()=>{const barCanvas=document.getElementById("barcodeCanvas");const qrCanvas=document.getElementById("qrcodeCanvas");if(barCanvas){try{JsBarcode(barCanvas,state.previewInvoiceId?state.invoices.find(x=>x.id===state.previewInvoiceId)?.reference||"":"",{format:"CODE128",width:2,height:50});}catch(e){}}if(qrCanvas&&state.previewInvoiceId){const inv=state.invoices.find(x=>x.id===state.previewInvoiceId);if(inv){const qrText=`BCD\n001\n1\n${ISSUER.iban}\n\n${Number(inv.grossTotal||0).toFixed(2)}\nEUR\n\n\n${inv.reference||\"\"}`;try{QRCode.toCanvas(qrCanvas,qrText,{width:140,margin:1,color:{dark:"#000",light:"#fff"}});}catch(e){}}}}},200);}if(action==="mark-paid"){const inv=state.invoices.find(i=>i.id===itemId);if(inv){inv.isPaid=true;await fsSet("invoices",itemId,{isPaid:true});}render();}if(action==="close-modal"){state.modal=null;state.editId=null;state.previewInvoiceId=null;render();}if(action==="confirm-payment"){const cust=state.customers.find(c=>c.id===itemId);if(cust){cust.reservationStatus="paid";await fsSet("customers",itemId,{reservationStatus:"paid"});}render();}if(action==="promote-reserve"){const cust=state.customers.find(c=>c.id===itemId);if(cust){cust.reservationStatus="paid";await fsSet("customers",itemId,{reservationStatus:"paid"});}render();}if(action==="make-credit-invoice"){const cust=state.customers.find(c=>c.id===itemId);if(!cust)return;const ref=finnishReference(Math.random().toString(36).slice(2,11));const invData={invoiceNo:nextInvoiceNumber(),invoiceDate:today(),payerName:cust.name,eventId:cust.sailingId||cust.tutkintoId,netTotal:-100,vatTotal:-25,grossTotal:-125,reference:ref,isPaid:false};await fsAdd("invoices",invData);render();}if(action==="delete-invoice"){const inv=state.invoices.find(x=>x.id===itemId);if(!inv)return;if(!confirm(`Poistetaanko lasku ${inv.invoiceNo}?`))return;await fsDel("invoices",itemId);render();}if(action==="transfer-customer"){const cust=state.customers.find(c=>c.id===itemId);if(cust)state.transferCustomerId=itemId;render();}if(action==="cal-prev"){const[y,m]=state.calendarMonth.split("-");const d=new Date(y,m-2,1);state.calendarMonth=d.toISOString().slice(0,7);render();}if(action==="cal-next"){const[y,m]=state.calendarMonth.split("-");const d=new Date(y,Number(m),1);state.calendarMonth=d.toISOString().slice(0,7);render();}if(action==="tab"){const tab=el.getAttribute("data-tab");if(tab)state.tab=tab;render();}if(action==="search-customers"){const q=document.getElementById("search-customers");if(q)state.searchCustomers=q.value;render();}if(action==="search-tutkinnot"){const q=document.getElementById("search-tutkinnot");if(q)state.searchTutkinnot=q.value;render();}if(action==="gcal-mark"){const sailing=state.sailings.find(s=>s.id===itemId);if(!sailing)return;const gcKey=idx!==""?`gcal_${itemId}_${idx}`:`gcal_${itemId}`;const updates={[gcKey]:true,[gcKey+"_date"]:today()};await fsSet("sailings",itemId,updates);render();}if(action==="gcal-unmark"){const sailing=state.sailings.find(s=>s.id===itemId);if(!sailing)return;const gcKey=idx!==""?`gcal_${itemId}_${idx}`:`gcal_${itemId}`;const updates={[gcKey]:false,[gcKey+"_date"]:null};await fsSet("sailings",itemId,updates);render();}});});document.querySelectorAll("[data-tab]").forEach(tab=>{tab.addEventListener("click",()=>{state.tab=tab.getAttribute("data-tab");render();});});}onAuthStateChanged(auth,user=>{if(user&&user.email===ALLOWED_EMAIL){state.user=user;onDbSnapshot();render();}else{state.user=null;render();}});
</script>
