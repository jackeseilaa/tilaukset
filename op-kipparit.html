<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OP Kipparit — osallistujien hallinta</title>
<style>
  body{font-family:system-ui;background:#f0f4f8;margin:0;padding:16px}
  .hdr{background:linear-gradient(135deg,#0a4272,#0d5a9e);color:white;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
  .hdr h1{margin:0;font-size:18px}.hdr p{margin:2px 0 0;opacity:.75;font-size:12px}
  .card{background:white;border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid #ddd}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#0a4272;color:white;padding:7px 10px;text-align:left}
  td{padding:6px 10px;border-bottom:1px solid #eee;vertical-align:top}
  tr:last-child td{border-bottom:none}
  tr:nth-child(even){background:#f5f8ff}
  .pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700;margin:1px 2px}
  .rvk{background:#e3f2fd;color:#1565c0}
  .pyy{background:#e8f5e9;color:#2e7d32}
  .nm{background:#d4af3722;border:1px solid #d4af37;border-radius:8px;display:inline-block;padding:1px 6px;font-size:11px;margin:1px 2px}
  .btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin:4px}
  .btn-go{background:#2e7d32;color:white;width:100%;padding:14px;font-size:15px;display:block;margin:0}
  .btn-blue{background:#0a4272;color:white}
  .btn:disabled{opacity:.5;cursor:default}
  .log{background:#0d1b2a;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;max-height:280px;overflow-y:auto;margin-top:10px}
  .log div{margin-bottom:2px}
  .ok{color:#b9f6ca}.warn{color:#ffe082}.err{color:#ff8a80}.info{color:#a8d8ea}
  .done-box{background:#e8f5e9;border:2px solid #4caf50;border-radius:10px;padding:14px;margin-top:10px}
  .warn-box{background:#fff8e1;border:2px solid #ffc107;border-radius:10px;padding:12px;margin-bottom:10px}
  .badge-ok{background:#e8f5e9;color:#2e7d32;border:1px solid #4caf50;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700}
  .badge-warn{background:#ffebee;color:#c62828;border:1px solid #f44336;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700}
</style>
</head>
<body>
<div class="hdr">
  <div style="font-size:32px">⚓</div>
  <div><h1>OP Kipparit — vuorojen hallinta</h1>
  <p>J Sailing Hallintapaneeli · Firebase jsailing-f716c · V9.150</p></div>
</div>
<div id="app"><div class="card" style="text-align:center;padding:30px">⏳ Ladataan Firebase SDK...</div></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,getDocs,addDoc,setDoc,deleteDoc,doc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const CFG={apiKey:"AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63UO0",authDomain:"jsailing-f716c.firebaseapp.com",projectId:"jsailing-f716c",storageBucket:"jsailing-f716c.firebasestorage.app",messagingSenderId:"543523103696",appId:"1:543523103696:web:439a312efa6aec398a8fd5"};

// ---- Oikea kurssitaulukko ----
const VUOROT=[
  {key:"ti",   label:"Ti 2.6.",      pvm:"2026-06-02",satama:"RVK",      alk:"17:00",lop:"21:00",nimet:["Jaana","Petra","Rebekka","Sini","Tuomas"]},
  {key:"ke",   label:"Ke 3.6.",      pvm:"2026-06-03",satama:"RVK",      alk:"17:00",lop:"21:00",nimet:["Annaliina","Arto","Emilia","Liisa","Niina"]},
  {key:"to",   label:"To 4.6.",      pvm:"2026-06-04",satama:"RVK",      alk:"17:00",lop:"21:00",nimet:["Jari","Markus","Miro","Sauli","Timo"]},
  {key:"la_am",label:"La aamu 7.6.", pvm:"2026-06-07",satama:"Pyysaari", alk:"10:00",lop:"14:00",nimet:["Annaliina","Antti","Emilia","Liisa","Sauli"]},
  {key:"la_ip",label:"La ip. 7.6.",  pvm:"2026-06-07",satama:"Pyysaari", alk:"14:00",lop:"18:00",nimet:["Arto","Jaana","Markus","Rebekka","Tuomas"]},
  {key:"su_am",label:"Su aamu 8.6.", pvm:"2026-06-08",satama:"Pyysaari", alk:"10:00",lop:"14:00",nimet:["Emilia","Liisa","Miro","Nicke","Niina"]},
  {key:"su_ip",label:"Su ip. 8.6.",  pvm:"2026-06-08",satama:"Pyysaari", alk:"14:00",lop:"18:00",nimet:["Markus","Onni","Petra","Timo","Tuomas"]},
];

const app=initializeApp(CFG);
const db=getFirestore(app);
const el=document.getElementById("app");
let logEl=null;

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function log(msg,t="info"){if(!logEl)return;const d=document.createElement("div");d.className=t;d.textContent=new Date().toLocaleTimeString("fi")+" "+msg;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;}

async function getAll(col){const s=await getDocs(collection(db,col));return s.docs.map(d=>({id:d.id,...d.data()}));}

// ---- Hae ja analysoi nykytilanne ----
async function scan(){
  el.innerHTML=`<div class="card" style="text-align:center;padding:20px">⏳ Haetaan Firestoresta...</div>`;
  const sailings=await getAll("sailings");
  const customers=await getAll("customers");

  const opS=sailings.filter(s=>(s.name||"").toLowerCase().includes("op kippar"));
  const opIds=new Set(opS.map(s=>s.id));
  const opC=customers.filter(c=>opIds.has(c.sailingId));

  // Yritä matchata jokainen VUORO olemassa olevaan sailingiin
  const matched=VUOROT.map(v=>{
    // Hae kaikki sailingit joilla sama päivämäärä
    const samePvm=opS.filter(s=>s.date===v.pvm);
    // Täsmäys ajalla
    const exact=samePvm.find(s=>s.startTime===v.alk);
    // Jos ei täsmää ajalla, katso onko vain yksi tällä pvmillä
    const solo=samePvm.length===1?samePvm[0]:null;
    const sailing=exact||solo||null;
    const existingC=sailing?opC.filter(c=>c.sailingId===sailing.id):[];
    return{...v,sailing,existingC,samePvm};
  });

  renderAnalysis(matched,opS,opC);
}

function renderAnalysis(matched,opS,opC){
  // Laske ongelmat: La ja Su tarvitsevat kaksi erillistä sailingia
  const problems=[];
  // Tarkista onko La 7.6. vain yksi sailing molemmille vuoroille
  const la_am=matched.find(m=>m.key==="la_am");
  const la_ip=matched.find(m=>m.key==="la_ip");
  const su_am=matched.find(m=>m.key==="su_am");
  const su_ip=matched.find(m=>m.key==="su_ip");

  const laOneSailing=la_am?.sailing&&la_ip?.sailing&&la_am.sailing.id===la_ip.sailing.id;
  const suOneSailing=su_am?.sailing&&su_ip?.sailing&&su_am.sailing.id===su_ip.sailing.id;

  if(laOneSailing)problems.push("⚠️ La 7.6.: aamu ja ip. osoittavat samaan sailingiin — tarvitaan kaksi erillistä");
  if(suOneSailing)problems.push("⚠️ Su 8.6.: aamu ja ip. osoittavat samaan sailingiin — tarvitaan kaksi erillistä");

  const rows=matched.map(m=>{
    const badge=m.sailing
      ?`<span class="badge-ok">✓ ${esc(m.sailing.name||m.sailing.id)}<br><small>${esc(m.sailing.startTime||"?")}–${esc(m.sailing.endTime||"?")}</small></span>`
      :`<span class="badge-warn">Ei löydy</span>`;
    const curC=m.existingC.map(c=>`<span class="nm">${esc(c.name)}</span>`).join(" ")||`<span style="color:#999;font-size:11px">tyhjä</span>`;
    const newC=m.nimet.map(n=>`<span class="nm">${esc(n)}</span>`).join(" ");
    const match=m.existingC.length===m.nimet.length&&m.nimet.every(n=>m.existingC.some(c=>c.name===n));
    return`<tr>
      <td><strong>${esc(m.label)}</strong></td>
      <td><span class="pill ${m.satama==="RVK"?"rvk":"pyy"}">${esc(m.satama)}</span></td>
      <td style="font-family:monospace">${esc(m.alk)}–${esc(m.lop)}</td>
      <td>${badge}</td>
      <td>${curC}</td>
      <td>${match?'<span style="color:#2e7d32;font-size:14px">✅</span>':newC}</td>
    </tr>`;
  }).join("");

  el.innerHTML=`
    ${problems.length>0?`<div class="warn-box">${problems.map(p=>`<div>${p}</div>`).join("")}</div>`:""}
    <div class="card">
      <div style="font-weight:700;color:#0a4272;margin-bottom:10px">Nykytilanne vs. tavoite</div>
      <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Vuoro</th><th>Satama</th><th>Aika</th><th>Sailing Firestoressa</th><th>Nykyiset osallistujat</th><th>Tavoite / OK</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
    <div class="card">
      <div style="font-weight:700;color:#0a4272;margin-bottom:8px">Mitä tehdään:</div>
      <div style="font-size:13px;line-height:1.7">
        ${problems.includes("⚠️ La 7.6.")||problems.find(p=>p.includes("La"))?`<div>📅 <strong>La 7.6.</strong>: luodaan/päivitetään kaksi erillistä sailingia (10–14 ja 14–18)</div>`:""}
        ${problems.includes("⚠️ Su 8.6.")||problems.find(p=>p.includes("Su"))?`<div>📅 <strong>Su 8.6.</strong>: luodaan/päivitetään kaksi erillistä sailingia (10–14 ja 14–18)</div>`:""}
        <div>👥 Varmistetaan että kaikilla 7 vuorolla on oikeat osallistujat</div>
        <div>🗑️ Poistetaan väärät/ylimääräiset osallistujat</div>
      </div>
    </div>
    <button class="btn btn-go" id="goBtn">✅ Korjaa kaikki automaattisesti</button>
    <div class="log" id="logBox" style="display:none"></div>
  `;
  document.getElementById("goBtn").onclick=()=>runFix(matched,opS,opC);
}

async function runFix(matched,opS,opC){
  document.getElementById("goBtn").disabled=true;
  const logBox=document.getElementById("logBox");
  logBox.style.display="block";
  logEl=logBox;

  // Rakennetaan ID-map: key -> sailingId (luodaan tarvittaessa)
  const keyToSailingId={};

  // Käy läpi kaikki vuorot — luo sailing jos puuttuu tai on väärä
  for(const v of matched){
    // Tarvitaanko uusi sailing?
    let sid=v.sailing?.id||null;

    // Tarkista onko tämä jaettu sailing (La/Su sama sailing molemmille vuoroille)
    const twin=matched.find(m=>m!==v&&m.pvm===v.pvm&&m.sailing?.id===sid&&sid!==null);
    const needNew=!sid||twin;

    if(needNew){
      // Etsi onko jo olemassa exact match ajalla
      const exact=opS.find(s=>s.date===v.pvm&&s.startTime===v.alk);
      if(exact&&!matched.some(m=>m!==v&&m.sailing?.id===exact.id)){
        sid=exact.id;
        log(`Löytyi olemassa oleva sailing ${v.label}: ${exact.id}`,"ok");
        // Varmista ajat oikein
        await setDoc(doc(db,"sailings",sid),{startTime:v.alk,endTime:v.lop,updatedAt:serverTimestamp()},{merge:true});
      } else {
        // Luo uusi sailing
        log(`Luodaan uusi sailing: ${v.label} (${v.alk}–${v.lop})`);
        const baseS=opS.find(s=>s.date===v.pvm)||opS[0]||{};
        const newRef=await addDoc(collection(db,"sailings"),{
          name:"OP Kipparit",
          date:v.pvm,
          startTime:v.alk,
          endTime:v.lop,
          type:baseS.type||"Kurssi",
          reitti:v.satama||baseS.reitti||"",
          endDate:"",
          maxPersons:v.nimet.length,
          reserveSlots:0,
          pricePerPerson:baseS.pricePerPerson||0,
          reservationFee:baseS.reservationFee||0,
          sessions:[],
          teoria:null,
          updatedAt:serverTimestamp()
        });
        sid=newRef.id;
        log(`  ✅ Luotu: ${sid}`,"ok");
      }
    } else if(sid){
      // Päivitä ajat jos väärät
      const s=opS.find(x=>x.id===sid);
      if(s&&(s.startTime!==v.alk||s.endTime!==v.lop)){
        log(`Päivitetään ajat: ${v.label} ${v.alk}–${v.lop}`);
        await setDoc(doc(db,"sailings",sid),{startTime:v.alk,endTime:v.lop,updatedAt:serverTimestamp()},{merge:true});
        log(`  ✅ Ajat päivitetty`,"ok");
      } else {
        log(`${v.label}: sailing OK (${sid})`,"ok");
      }
    }
    keyToSailingId[v.key]=sid;
  }

  log("---");

  // Nyt käy osallistujat: poista väärät, lisää puuttuvat
  for(const v of matched){
    const sid=keyToSailingId[v.key];
    if(!sid){log(`⚠️ ${v.label}: ei sailingId, ohitetaan`,"warn");continue;}

    // Hae tuoreet customers tälle sailingille
    const allC=await getAll("customers");
    const curC=allC.filter(c=>c.sailingId===sid);
    const curNames=curC.map(c=>c.name);
    const wantNames=v.nimet;

    // Poista ne joita ei pitäisi olla
    const toRemove=curC.filter(c=>!wantNames.includes(c.name));
    for(const c of toRemove){
      await deleteDoc(doc(db,"customers",c.id));
      log(`  🗑️ Poistettu ${v.label}: ${c.name}`,"warn");
    }

    // Lisää puuttuvat
    const toAdd=wantNames.filter(n=>!curNames.includes(n));
    for(const name of toAdd){
      await addDoc(collection(db,"customers"),{
        name,phone:"",email:"",
        sailingId:sid,tutkintoId:"",
        billTo:"self",companyId:"",
        reservationStatus:"paid",laskutusosio:"",
        updatedAt:serverTimestamp()
      });
      log(`  ✅ Lisätty ${v.label}: ${name}`,"ok");
    }

    if(toRemove.length===0&&toAdd.length===0){
      log(`  ✓ ${v.label}: osallistujat jo oikein (${wantNames.join(", ")})`,"ok");
    }
  }

  logEl=null;
  const done=document.createElement("div");
  done.className="done-box";
  done.innerHTML=`<strong style="color:#2e7d32;font-size:16px">🏁 Kaikki korjattu!</strong>
    <div style="margin-top:6px;font-size:13px">Tarkista hallintapaneelissa:<br>
    <a href="https://jackeseilaa.github.io/tilaukset" target="_blank" style="color:#0a4272;font-weight:700">jackeseilaa.github.io/tilaukset</a></div>`;
  document.getElementById("app").appendChild(done);
}

try{await scan();}catch(e){el.innerHTML=`<div class="card" style="border:2px solid #f44336"><strong style="color:#c62828">❌ ${esc(e.message)}</strong></div>`;}
</script>
</body>
</html>
